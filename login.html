<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOKAMIG | Gestão de Frotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d1122a;
            --bg: #0f172a;
            --text: #f8fafc;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('Faça_uma_montagem_202604121721.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 95%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #fff;
        }

        .sub {
            font-size: 10px;
            color: #94a3b8;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 11px;
        }

        .hidden {
            display: none !important;
        }

        .form-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: left;
        }

        .prog-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid var(--primary);
            font-size: 12px;
            position: relative;
        }

        .badge {
            font-size: 9px;
            padding: 3px 6px;
            border-radius: 4px;
            background: var(--primary);
            margin-bottom: 5px;
            display: inline-block;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            overflow-x: auto;
        }

        .tab-btn {
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            color: #fff;
            cursor: pointer;
            white-space: nowrap;
            flex: 1;
            font-size: 10px;
        }

        .tab-active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .btn-prog {
            background: var(--warning);
            color: #000;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

    <section id="scr-login" class="container">
        <h1>LOKAMIG</h1>
        <div class="sub">Logística & Programação</div>
        <input type="text" id="user" placeholder="Matrícula ou Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="handleLogin()">Entrar</button>
        <div style="margin: 10px; font-size: 9px; color: #64748b;">COLABORADORES, CLIENTES E FORNECEDORES</div>
    </section>

    <section id="scr-admin" class="container hidden" style="max-width: 800px;">
        <h1>ADMINISTRAÇÃO</h1>
        <div class="tabs">
            <button class="tab-btn tab-active" onclick="switchTab('mon', event)">Monitoramento</button>
            <button class="tab-btn" onclick="switchTab('forn', event)">Fornecedores</button>
            <button class="tab-btn" onclick="switchTab('veic', event)">Veículos</button>
        </div>
        <div id="area-forn" class="hidden">
            <div class="form-section">
                <input type="text" id="f-nome" placeholder="NOME DA EMPRESA">
                <input type="text" id="f-user" placeholder="LOGIN (PARA O FORNECEDOR)">
                <input type="text" id="f-pass" placeholder="SENHA">
                <select id="f-tipo">
                    <option value="Limpeza">Limpeza</option>
                    <option value="Oficina">Oficina</option>
                </select>
                <button onclick="salvarForn()" style="background:var(--success)">Cadastrar Fornecedor</button>
            </div>
            <div id="list-forn"></div>
        </div>
        <button onclick="location.reload()" style="background:#334155; margin-top:10px;">Sair</button>
    </section>

    <section id="scr-cliente" class="container hidden">
        <h1>PROGRAMAÇÃO DO DIA</h1>
        <div class="sub">Inserir dados do WhatsApp</div>
        <div class="form-section">
            <input type="text" id="p-placa" placeholder="PLACA">
            <select id="p-destino">
                <option value="Limpeza">Limpeza</option>
                <option value="Oficina">Oficina</option>
            </select>
            <textarea id="p-obs" placeholder="OBSERVAÇÕES (EX: TROCA DE ÓLEO, HIGIENIZAR)"></textarea>
            <button onclick="lancarProgramacao()" style="background:var(--success)">Adicionar à Lista</button>
        </div>
        <div id="lista-programacao-cliente" style="max-height: 250px; overflow-y: auto;"></div>
        <button onclick="location.reload()" style="background:#334155; margin-top:20px;">Sair</button>
    </section>

    <section id="scr-form" class="container hidden">
        <h1 id="display-nome">---</h1>
        <div class="sub" id="display-perfil">---</div>

        <button id="btn-ver-prog" class="btn-prog hidden" onclick="toggleProgView()">Ver Programação do Dia 📅</button>

        <div id="prog-view" class="form-section hidden"
            style="background: rgba(245, 158, 11, 0.15); border: 1px solid var(--warning);">
            <div id="prog-list-content"></div>
        </div>

        <div class="form-section">
            <input type="text" id="v-placa-check" placeholder="CONFIRMAR PLACA">
            <input type="number" id="v-km" placeholder="KM ATUAL">
            <textarea id="v-obs-relatorio" placeholder="RELATÓRIO DO SERVIÇO..."></textarea>
            <button onclick="alert('Salvo no Banco de Dados!')">Finalizar Checklist</button>
        </div>
        <button onclick="location.reload()" style="background:#334155;">Sair</button>
    </section>

    <script>
        const FORN_DB = 'lokamig_forn_v6';
        const PROG_DB = 'lokamig_prog_v6';
        const CLIENTE_USER = { user: "CLIENTE", pass: "LOKAMIG2026" };

        function handleLogin() {
            const u = document.getElementById('user').value.toUpperCase();
            const p = document.getElementById('pass').value;

            if (u === 'ADMIN' && p === '1234') { show('scr-admin'); return; }
            if (u === CLIENTE_USER.user && p === CLIENTE_USER.pass) { show('scr-cliente'); carregarProgCliente(); return; }

            const forn = JSON.parse(localStorage.getItem(FORN_DB) || '[]').find(f => f.user.toUpperCase() === u && f.pass === p);
            if (forn) { logar(forn, 'forn'); return; }

            alert("Usuário ou Senha incorretos.");
        }

        function logar(user, tipo) {
            document.getElementById('display-nome').innerText = user.nome;
            document.getElementById('display-perfil').innerText = "Acesso Fornecedor: " + user.tipo;
            show('scr-form');
            if (tipo === 'forn') {
                document.getElementById('btn-ver-prog').classList.remove('hidden');
                window.userFornTipo = user.tipo; // Salva se é limpeza ou oficina
            }
        }

        // Ações do Cliente
        function lancarProgramacao() {
            const p = document.getElementById('p-placa').value.toUpperCase();
            const d = document.getElementById('p-destino').value;
            const o = document.getElementById('p-obs').value;
            if (!p) return alert("Insira a Placa!");

            const lista = JSON.parse(localStorage.getItem(PROG_DB) || '[]');
            lista.push({ id: Date.now(), placa: p, destino: d, obs: o, data: new Date().toLocaleDateString() });
            localStorage.setItem(PROG_DB, JSON.stringify(lista));

            carregarProgCliente();
            document.getElementById('p-placa').value = '';
            document.getElementById('p-obs').value = '';
        }

        function carregarProgCliente() {
            const lista = JSON.parse(localStorage.getItem(PROG_DB) || '[]');
            document.getElementById('lista-programacao-cliente').innerHTML = lista.map(i => `
            <div class="prog-item">
                <div class="badge">${i.destino}</div>
                <div style="font-weight:bold">${i.placa}</div>
                <div style="font-size:10px; color:#94a3b8">${i.obs}</div>
                <button onclick="cancelarProg(${i.id})" style="width:30px; padding:5px; position:absolute; top:5px; right:5px; background:none; color:red; border:none; cursor:pointer;">X</button>
            </div>
        `).join('');
        }

        function cancelarProg(id) {
            let lista = JSON.parse(localStorage.getItem(PROG_DB));
            lista = lista.filter(i => i.id !== id);
            localStorage.setItem(PROG_DB, JSON.stringify(lista));
            carregarProgCliente();
        }

        // Ações do Fornecedor
        function toggleProgView() {
            const box = document.getElementById('prog-view');
            box.classList.toggle('hidden');
            if (!box.classList.contains('hidden')) {
                const lista = JSON.parse(localStorage.getItem(PROG_DB) || '[]');
                const filtrada = lista.filter(i => i.destino === window.userFornTipo);
                document.getElementById('prog-list-content').innerHTML = filtrada.length ? filtrada.map(i => `
                <div style="border-bottom:1px solid rgba(255,255,255,0.1); padding:8px 0;">
                    <span style="color:var(--warning); font-weight:bold;">${i.placa}</span><br>
                    <small style="color:#cbd5e1;">📌 ${i.obs || 'Sem observações específicas.'}</small>
                </div>
            `).join('') : '<div style="font-size:11px;">Sem programação pendente.</div>';
            }
        }

        // Funções de Interface
        function show(id) { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function switchTab(t, e) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            e.target.classList.add('tab-active');
            document.getElementById('area-forn').classList.toggle('hidden', t !== 'forn');
            if (t === 'forn') carregarListaForn();
        }
        function salvarForn() {
            const f = JSON.parse(localStorage.getItem(FORN_DB) || '[]');
            f.push({ nome: document.getElementById('f-nome').value, user: document.getElementById('f-user').value, pass: document.getElementById('f-pass').value, tipo: document.getElementById('f-tipo').value });
            localStorage.setItem(FORN_DB, JSON.stringify(f)); carregarListaForn();
            document.getElementById('f-nome').value = ''; document.getElementById('f-user').value = ''; document.getElementById('f-pass').value = '';
        }
        function carregarListaForn() {
            const f = JSON.parse(localStorage.getItem(FORN_DB) || '[]');
            document.getElementById('list-forn').innerHTML = f.map(x => `<div class="prog-item">${x.nome} - Login: ${x.user} (${x.tipo})</div>`).join('');
        }
    </script>
</body>

</html>
