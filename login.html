<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOKAMIG | Gestão de Frotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d1122a;
            --bg: #0f172a;
            --text: #f8fafc;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)),
                url('Faça_uma_montagem_202604121721.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 5px;
            color: #fff;
        }

        .sub {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-nfc {
            background: #1e293b;
            margin-top: 10px;
            border: 1px dashed var(--primary);
        }

        .btn-vincular {
            background: #3b82f6;
            margin-bottom: 10px;
            font-size: 12px;
            padding: 10px;
        }

        .hidden {
            display: none !important;
        }

        /* Estilo Admin */
        .admin-box {
            max-width: 850px;
            width: 95%;
            height: 90vh;
            overflow-y: auto;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: #1e293b;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            color: #fff;
            cursor: pointer;
            flex: 1;
            font-size: 10px;
            font-weight: 700;
        }

        .tab-active {
            background: var(--primary);
            border-color: var(--primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            margin-top: 10px;
        }

        th {
            background: #0f172a;
            padding: 10px;
            text-align: left;
            color: var(--primary);
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #334155;
            cursor: pointer;
        }

        /* Dossiê */
        .modal-detalhes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }

        .photo-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 5px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .photo-card img {
            width: 100%;
            border-radius: 5px;
        }

        .photo-card span {
            font-size: 9px;
            display: block;
            text-align: center;
            margin-top: 4px;
        }

        @media print {
            .btn-print-hide {
                display: none;
            }

            body {
                background: white;
                color: black;
            }

            .modal-detalhes {
                position: static;
                background: white;
                padding: 0;
            }
        }
    </style>
</head>

<body>

    <section id="scr-login" class="container">
        <h1>LOKAMIG</h1>
        <div class="sub">Vistoria e Logística de Pátio</div>
        <input type="text" id="user" placeholder="Usuário / Matrícula">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="handleLogin()">Entrar</button>
        <button class="btn-nfc" onclick="lerCrachaNFC('login')">📲 ACESSAR VIA CRACHÁ</button>
    </section>

    <section id="scr-admin" class="container admin-box hidden">
        <h1>PAINEL DE CONTROLE</h1>
        <div class="tabs">
            <button id="btn-tab-mon" class="tab-btn tab-active" onclick="switchTab('mon')">Monitoramento</button>
            <button id="btn-tab-cad" class="tab-btn" onclick="switchTab('cad')">Colaboradores</button>
        </div>

        <div id="area-cadastro" class="hidden">
            <div
                style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: left;">
                <input type="text" id="reg-mat" placeholder="MATRÍCULA">
                <input type="text" id="reg-nome" placeholder="NOME COMPLETO">
                <button class="btn-vincular" onclick="lerCrachaNFC('vincular')">APROXIMAR CRACHÁ PARA VINCULAR</button>
                <input type="text" id="reg-id" placeholder="Código do Chip" readonly style="color: var(--success);">
                <button onclick="salvarColaborador()" style="background: var(--success);">SALVAR CADASTRO</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>NOME</th>
                        <th>MATRÍCULA</th>
                        <th>CHIP</th>
                        <th>AÇÃO</th>
                    </tr>
                </thead>
                <tbody id="colab-body"></tbody>
            </table>
        </div>

        <div id="area-monitor">
            <table>
                <thead>
                    <tr>
                        <th>HORA</th>
                        <th>PLACA</th>
                        <th>MOTORISTA</th>
                        <th>TIPO</th>
                    </tr>
                </thead>
                <tbody id="logs-body"></tbody>
            </table>
        </div>
        <button onclick="location.reload()" style="background:#334155; margin-top:20px;">Sair</button>
    </section>

    <section id="scr-form" class="container hidden">
        <h1 id="display-nome">---</h1>
        <div class="sub" id="display-mat">Matrícula: ---</div>
        <input type="text" id="v-placa" placeholder="PLACA DO VEÍCULO">
        <input type="number" id="v-km" placeholder="KM ATUAL">
        <select id="v-comb">
            <option value="Vazio">Vazio</option>
            <option value="1/4">1/4</option>
            <option value="1/2">1/2</option>
            <option value="3/4">3/4</option>
            <option value="Cheio">Cheio</option>
        </select>
        <textarea id="v-obs" placeholder="Observações..."></textarea>
        <button onclick="alert('Iniciando Câmera...')">Tirar Fotos</button>
    </section>

    <div id="scr-detalhes" class="modal-detalhes hidden">
        <h1 id="det-placa">Dossiê</h1>
        <div id="det-info" style="text-align: left; margin: 20px 0;"></div>
        <div class="photo-grid" id="det-fotos"></div>
        <button onclick="window.print()" style="background:var(--success);">Gerar PDF</button>
        <button onclick="show('scr-admin')">Voltar</button>
    </div>

    <script>
        const USER_DB = 'lokamig_users_v5';
        const LOG_DB = 'lokamig_logs_v5';

        if (!localStorage.getItem(USER_DB)) localStorage.setItem(USER_DB, JSON.stringify([{ nome: "LUCAS LIMA", mat: "T531971", id: "D3C776D2" }]));

        function show(id) {
            document.querySelectorAll('section, .modal-detalhes').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function switchTab(t) {
            document.getElementById('area-monitor').classList.toggle('hidden', t !== 'mon');
            document.getElementById('area-cadastro').classList.toggle('hidden', t !== 'cad');
            document.getElementById('btn-tab-mon').classList.toggle('tab-active', t === 'mon');
            document.getElementById('btn-tab-cad').classList.toggle('tab-active', t === 'cad');
            if (t === 'cad') carregarListaColaboradores();
        }

        function handleLogin() {
            const u = document.getElementById('user').value.toUpperCase();
            const p = document.getElementById('pass').value;
            if (u === 'ADMIN' && p === '1234') { show('scr-admin'); carregarAdmin(); }
            else {
                const user = JSON.parse(localStorage.getItem(USER_DB)).find(x => x.mat.toUpperCase() === u);
                if (user) logar(user); else alert("Não cadastrado.");
            }
        }

        async function lerCrachaNFC(modo) {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    alert("Aproxime o crachá...");
                    ndef.onreading = event => {
                        const idLido = event.serialNumber.replace(/:/g, "").toUpperCase();
                        if (modo === 'vincular') {
                            document.getElementById('reg-id').value = idLido;
                        } else {
                            const user = JSON.parse(localStorage.getItem(USER_DB)).find(u => u.id === idLido);
                            if (user) logar(user); else alert("ID: " + idLido + " não vinculado.");
                        }
                    };
                } catch (e) { alert("NFC Erro."); }
            }
        }

        function logar(user) {
            document.getElementById('display-nome').innerText = user.nome;
            document.getElementById('display-mat').innerText = "Matrícula: " + user.mat;
            show('scr-form');
        }

        function carregarAdmin() {
            const logs = JSON.parse(localStorage.getItem(LOG_DB) || '[]');
            document.getElementById('logs-body').innerHTML = logs.map(l => `
            <tr onclick='verDossie(${JSON.stringify(l)})'>
                <td>${l.hora}</td><td>${l.placa}</td><td>${l.op}</td><td>${l.tipo || 'Vistoria'}</td>
            </tr>
        `).join('');
        }

        function verDossie(log) {
            show('scr-detalhes');
            document.getElementById('det-placa').innerText = "PLACA: " + log.placa;
            document.getElementById('det-info').innerHTML = `<p><b>Motorista:</b> ${log.op}</p><p><b>KM:</b> ${log.km}</p><p><b>Obs:</b> ${log.obs}</p>`;
            // Lógica de fotos aqui...
        }

        function salvarColaborador() {
            const m = document.getElementById('reg-mat').value.toUpperCase(), n = document.getElementById('reg-nome').value.toUpperCase(), c = document.getElementById('reg-id').value.toUpperCase();
            if (!m || !n || !c) return alert("Preencha tudo!");
            const u = JSON.parse(localStorage.getItem(USER_DB));
            u.push({ nome: n, mat: m, id: c });
            localStorage.setItem(USER_DB, JSON.stringify(u));
            carregarListaColaboradores();
        }

        function carregarListaColaboradores() {
            const u = JSON.parse(localStorage.getItem(USER_DB));
            document.getElementById('colab-body').innerHTML = u.map((x, i) => `<tr><td>${x.nome}</td><td>${x.mat}</td><td>${x.id}</td><td><button onclick="removerColaborador(${i})">X</button></td></tr>`).join('');
        }

        function removerColaborador(i) {
            const u = JSON.parse(localStorage.getItem(USER_DB)); u.splice(i, 1);
            localStorage.setItem(USER_DB, JSON.stringify(u)); carregarListaColaboradores();
        }
    </script>
</body>

</html>
