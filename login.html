<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub de Acesso | Grupo LOKAMIG</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .role-btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(30, 41, 59, 0.5);
            color: #94a3b8;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .role-btn.active {
            background: #d1122a;
            color: white;
            border-color: #d1122a;
            box-shadow: 0 5px 15px rgba(209, 18, 42, 0.3);
        }

        .auth-container {
            display: none;
            text-align: left;
            animation: fadeIn 0.3s forwards;
        }

        .auth-container.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2" style="background:var(--accent-blue);"></div>
    <main class="app-container glass-panel"
        style="max-width: 420px; text-align: center; padding: 40px; margin: 40px auto;">
        <h1 class="brand-title"
            style="font-size: 28px; margin-bottom: 5px; display: flex; justify-content: center; align-items: center;">
            <img src="https://img.icons8.com/color/64/000000/car-rental.png" style="height:32px; margin-right:10px;" />
            LOKAMIG
        </h1>
        <p class="subtitle" style="margin-bottom: 30px; color: #64748b;">Identifique seu Nível de Operação</p>
        <div class="role-selector">
            <button class="role-btn active" onclick="selectRole('collaborator', this)">👷🏽 CHECKLIST</button>
            <button class="role-btn" onclick="selectRole('vendor', this)">🏢 Fornecedor</button>
            <button class="role-btn" onclick="selectRole('admin', this)">🛡️ ADM</button>
        </div>
        <div id="form-collaborator" class="auth-container active">
            <input type="text" id="collab-login" class="premium-input" placeholder="Login" style="margin-bottom: 15px;">
            <input type="password" id="collab-pass" class="premium-input" placeholder="Senha"
                style="margin-bottom: 20px;">
            <button class="btn-primary" style="width: 100%; margin-bottom:15px;"
                onclick="mockLogin('COLLABORATOR')">Acessar Pátio</button>
        </div>
        <div id="form-vendor" class="auth-container">
            <input type="text" id="vendor-email" class="premium-input" placeholder="Login" style="margin-bottom: 15px;">
            <input type="password" id="vendor-pass" class="premium-input" placeholder="Senha"
                style="margin-bottom: 20px;">
            <button class="btn-primary" style="width: 100%;" onclick="mockLogin('VENDOR')">Acessar Painel</button>
        </div>
        <div id="form-admin" class="auth-container">
            <input type="text" id="admin-email" class="premium-input" placeholder="Login" style="margin-bottom: 15px;">
            <input type="password" id="admin-pass" class="premium-input" placeholder="Senha"
                style="margin-bottom: 20px;">
            <button class="btn-primary" style="width: 100%; background: #0f172a;"
                onclick="mockLogin('ADMIN')">Autenticação Administrativa</button>
        </div>
    </main>
    <script>
        // Usei nomes de variáveis que NÃO conflitam com a biblioteca 'supabase'
        var DB_URL = 'https://guvapvlbqofnkbvibnci.supabase.co';
        var DB_KEY = 'sb_publishable_ahwcIYfy3WkFZZ9x7TbzdA_anSph1I2';
        var lokamigClient;

        if (window.supabase) {
            lokamigClient = window.supabase.createClient(DB_URL, DB_KEY);
        }

        function selectRole(roleId, btn) {
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.auth-container').forEach(f => f.classList.remove('active'));
            document.getElementById('form-' + roleId).classList.add('active');
        }

        function mockLogin(role) {
            let u = ''; let p = '';
            if (role === 'ADMIN') {
                u = document.getElementById('admin-email').value.toLowerCase().trim();
                p = document.getElementById('admin-pass').value;
            } else if (role === 'VENDOR') {
                u = document.getElementById('vendor-email').value.toLowerCase().trim();
                p = document.getElementById('vendor-pass').value;
            } else {
                u = document.getElementById('collab-login').value.toLowerCase().trim();
                p = document.getElementById('collab-pass').value;
            }

            if (u === 'admin' && p === '1234') {
                localStorage.setItem('user_role', role);
                localStorage.setItem('session_username', 'Admin LOKAMIG');
                window.location.href = 'index.html';
            } else if (u === 'lucas lima' && p === 'mudar@23') {
                localStorage.setItem('user_role', 'SUPER_ADMIN');
                localStorage.setItem('session_username', 'LUCAS LIMA');
                window.location.href = 'admin.html';
            } else {
                alert("Acesso Negado.");
            }
        }
    </script>
</body>

</html>
