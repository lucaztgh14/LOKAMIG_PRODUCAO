<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOKAMIG | Gestão de Frotas Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d1122a;
            --bg: #0f172a;
            --text: #f8fafc;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray: #94a3b8;
            --joint: #8b5cf6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), url('https://images.unsplash.com/photo-1506521781263-d8422e82f27a?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            max-height: 95vh;
            overflow-y: auto;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 5px;
            color: var(--primary);
            font-weight: 700;
            letter-spacing: 2px;
        }

        .sub {
            font-size: 10px;
            color: var(--gray);
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 10px;
            transition: 0.3s;
            margin-bottom: 5px;
        }

        .btn-success {
            background: var(--success);
        }

        .btn-warning {
            background: var(--warning);
            color: #000;
        }

        .btn-danger {
            background: var(--danger);
            width: auto;
            padding: 5px 10px;
        }

        .btn-info {
            background: #3b82f6;
        }

        .hidden {
            display: none !important;
        }

        .form-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            text-align: left;
        }

        .prog-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 5px solid var(--danger);
            font-size: 12px;
            text-align: left;
            position: relative;
        }

        .status-badge {
            padding: 3px 7px;
            border-radius: 4px;
            font-size: 8px;
            font-weight: bold;
            float: right;
            text-transform: uppercase;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }

        .tab-btn {
            background: rgba(30, 41, 59, 0.8);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            white-space: nowrap;
            font-size: 9px;
        }

        .tab-active {
            background: var(--primary);
            font-weight: bold;
        }

        .critical-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin: 10px 0;
        }

        .critical-btn {
            background: rgba(255, 255, 255, 0.05);
            font-size: 8px;
            padding: 10px;
            border: 1px dashed var(--gray);
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
        }

        .budget-builder {
            background: rgba(139, 92, 246, 0.1);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--joint);
            margin: 10px 0;
        }
    </style>
</head>

<body>

    <!-- TELA LOGIN -->
    <section id="scr-login" class="container">
        <h1>LOKAMIG</h1>
        <div class="sub">Logística & Gestão Operacional</div>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="handleLogin()">Entrar no Sistema</button>
    </section>

    <!-- ADMIN COMPLETO -->
    <section id="scr-admin" class="container hidden">
        <h1>ADMINISTRAÇÃO</h1>
        <div class="tabs">
            <button class="tab-btn tab-active" onclick="switchTab('monitor', event)">Monitor</button>
            <button class="tab-btn" onclick="switchTab('history', event)">Histórico</button>
            <button class="tab-btn" onclick="switchTab('budgets', event)">Orçamentos</button>
            <button class="tab-btn" onclick="switchTab('forn', event)">Fornecedores</button>
            <button class="tab-btn" onclick="switchTab('colab', event)">Equipe</button>
            <button class="tab-btn" onclick="switchTab('veic', event)">Frota</button>
            <button class="tab-btn" onclick="switchTab('progs', event)">Gestores</button>
            <button class="tab-btn" onclick="switchTab('config', event)">Backup</button>
        </div>
        <div id="area-monitor">
            <div id="list-prog-admin"></div>
        </div>
        <div id="area-history" class="hidden">
            <div id="list-history-admin"></div>
        </div>
        <div id="area-budgets" class="hidden">
            <div id="list-budgets-admin"></div>
        </div>
        <div id="area-forn" class="hidden">
            <div id="forn-main-view">
                <div class="form-section"><input type="text" id="f-nome" placeholder="NOME EMPRESA"><button
                        onclick="salvarNovoFornecedor()" class="btn-success">Cadastrar</button></div>
                <div id="list-forn"></div>
            </div>
            <div id="forn-detail-view" class="hidden"><button onclick="fecharDetalhesForn()"
                    style="width:auto">Voltar</button>
                <h3 id="view-forn-title"></h3>
                <div id="list-forn-users"></div>
            </div>
        </div>
        <div id="area-colab" class="hidden">
            <div class="form-section"><input type="text" id="c-mat" placeholder="MATRÍCULA"><input type="text"
                    id="c-nome" placeholder="NOME"><button
                    onclick="salvarItem('colab', {mat:document.getElementById('c-mat').value, nome:document.getElementById('c-nome').value})"
                    class="btn-success">Salvar</button></div>
            <div id="list-colab"></div>
        </div>
        <div id="area-veic" class="hidden">
            <div class="form-section"><input type="text" id="v-placa" placeholder="PLACA"><button
                    onclick="salvarItem('veic', {placa:document.getElementById('v-placa').value})"
                    class="btn-success">Salvar</button></div>
            <div id="list-veic"></div>
        </div>
        <div id="area-progs" class="hidden">
            <div id="list-progs"></div>
        </div>
        <div id="area-config" class="hidden"><button onclick="exportarDados()">📥 Exportar Backup</button></div>
        <button onclick="handleLogout()" style="background:#334155; margin-top:20px;">Sair</button>
    </section>

    <!-- GESTOR -->
    <section id="scr-programador" class="container hidden">
        <h1>LANÇAR AGENDA</h1>
        <div class="form-section">
            <input type="text" id="p-placa" placeholder="PLACA">
            <select id="p-fornecedor-select"></select>
            <button onclick="lancarProgramacao()" class="btn-success">Enviar para Fornecedor</button>
        </div>
        <input type="date" id="p-filter-date" onchange="carregarProgGeral()" style="margin-bottom:10px;">
        <div id="list-prog-geral"></div>
        <button onclick="handleLogout()" style="background:#334155;">Sair</button>
    </section>

    <!-- FORNECEDOR -->
    <section id="scr-fornecedor" class="container hidden">
        <h1 id="forn-name-screen"></h1>
        <input type="date" id="forn-filter-date" onchange="carregarServicosForn(currentUser)"
            style="margin-bottom:15px;">
        <div id="list-forn-servicos"></div>
        <button onclick="handleLogout()" style="background:#334155; margin-top:20px;">Sair</button>
    </section>

    <script>
        const DB = { prog: 'l_prog_v21', forn: 'l_forn_v21', fornUsers: 'l_fusers_v21', progs: 'l_progs_v21', colab: 'l_colab_v21', veic: 'l_veic_v21' };
        let currentUser = null;
        let selectedForn = null;
        let tempBudgetItems = [];

        window.onload = () => {
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('p-filter-date').value = hoje;
            document.getElementById('forn-filter-date').value = hoje;
            if (!localStorage.getItem(DB.progs)) {
                localStorage.setItem(DB.forn, JSON.stringify([{ "nome": "AGSN" }, { "nome": "MEGA CENTER" }, { "nome": "Lava jato Maximu's" }]));
                localStorage.setItem(DB.fornUsers, JSON.stringify([{ "user": "rodolfo", "pass": "1234", "empresa": "MEGA CENTER", "tipo": "Oficina" }, { "user": "fiu", "pass": "1234", "empresa": "Lava jato Maximu's", "tipo": "Limpeza" }, { "user": "taty", "pass": "1234", "empresa": "AGSN", "tipo": "Oficina" }]));
                localStorage.setItem(DB.progs, JSON.stringify([{ "nome": "Paulista", "user": "paulista", "pass": "1234" }]));
            }
            popularSeletorFornecedores();
        };

        function handleLogin() {
            const u = document.getElementById('user').value.trim().toUpperCase();
            const p = document.getElementById('pass').value.trim();
            if (u === 'ADMIN' && p === '1234') { show('scr-admin'); carregarProgAdmin(); return; }
            const gestores = JSON.parse(localStorage.getItem(DB.progs) || '[]');
            const gestor = gestores.find(x => x.user.toUpperCase() === u && x.pass === p);
            if (gestor) { show('scr-programador'); carregarProgGeral(); return; }
            const fUsers = JSON.parse(localStorage.getItem(DB.fornUsers) || '[]');
            const fUser = fUsers.find(x => x.user.toUpperCase() === u && x.pass === p);
            if (fUser) { currentUser = fUser; show('scr-fornecedor'); document.getElementById('forn-name-screen').innerText = fUser.empresa; carregarServicosForn(fUser); return; }
            alert("Usuário ou Senha incorretos.");
        }

        function carregarServicosForn(user) {
            const list = JSON.parse(localStorage.getItem(DB.prog) || '[]');
            const dt = document.getElementById('forn-filter-date').value;
            const meus = list.filter(s => ((user.empresa === "MEGA CENTER" || user.empresa.includes('Max')) ? (s.fornecedor === user.empresa || s.fornecedor.includes('+')) : s.fornecedor === user.empresa) && s.data === dt);
            document.getElementById('list-forn-servicos').innerHTML = meus.map((s) => {
                const gIdx = list.indexOf(s);
                let html = `<div class="prog-item" style="border-left-color:${s.status_flow === 'CONCLUÍDO' ? 'var(--success)' : 'var(--danger)'}">
                    <span class="status-badge">${s.status_flow}</span><b>${s.placa}</b><br>`;
                if (s.status_flow === 'PENDENTE') {
                    html += `<div class="critical-grid"><div class="critical-btn" onclick="this.style.color='var(--success)'">📸 FRENTE</div><div class="critical-btn" onclick="this.style.color='var(--success)'">📸 TRASEIRA</div><div class="critical-btn" onclick="alert('Gravando...')">🎥 VÍDEO</div></div><button class="btn-warning" onclick="atualizarStatus(${gIdx}, 'EM EXECUÇÃO')">Iniciar Atendimento</button>`;
                } else if (s.status_flow === 'EM EXECUÇÃO') {
                    if (user.tipo === 'Oficina') html += `<div class="budget-builder"><input type="text" id="it-d-${gIdx}" placeholder="Item"><input type="number" id="it-v-${gIdx}" placeholder="R$"><button onclick="addBudgetItem(${gIdx})" class="btn-info">+</button><div id="temp-${gIdx}"></div><button onclick="subOrcamento(${gIdx})">Enviar Orçamento</button></div>`;
                    html += `<button class="btn-success" onclick="atualizarStatus(${gIdx}, 'CONCLUÍDO')">Finalizar Tudo</button>`;
                } else { html += `<p style="color:var(--success)">✓ Concluído às ${s.hora_fim}</p><button class="btn-warning" style="background:#64748b" onclick="atualizarStatus(${gIdx}, 'EM EXECUÇÃO')">↩ Voltar</button>`; }
                return html + `</div>`;
            }).join('') || "Sem veículos.";
        }

        function addBudgetItem(gIdx) {
            const d = document.getElementById(`it-d-${gIdx}`).value; const v = document.getElementById(`it-v-${gIdx}`).value;
            if (!d || !v) return; tempBudgetItems.push({ d, v: parseFloat(v) });
            document.getElementById(`temp-${gIdx}`).innerHTML = tempBudgetItems.map(i => `<div>• ${i.d}: R$ ${i.v}</div>`).join('');
        }

        function subOrcamento(gIdx) {
            let list = JSON.parse(localStorage.getItem(DB.prog)); list[gIdx].budget_items = tempBudgetItems; list[gIdx].budget_status = 'AGUARDANDO';
            localStorage.setItem(DB.prog, JSON.stringify(list)); tempBudgetItems = []; alert("Enviado!"); carregarServicosForn(currentUser);
        }

        function lancarProgramacao() {
            const p = document.getElementById('p-placa').value.toUpperCase(); if (!p) return alert("Digite a placa!");
            const agora = new Date(); let list = JSON.parse(localStorage.getItem(DB.prog) || '[]');
            list.push({ data: agora.toISOString().split('T')[0], timestamp: agora.toLocaleTimeString(), placa: p, fornecedor: document.getElementById('p-fornecedor-select').value, status_flow: 'PENDENTE' });
            localStorage.setItem(DB.prog, JSON.stringify(list)); document.getElementById('p-placa').value = ""; carregarProgGeral();
        }

        function carregarProgGeral() {
            const list = JSON.parse(localStorage.getItem(DB.prog) || '[]'); const dt = document.getElementById('p-filter-date').value;
            document.getElementById('list-prog-geral').innerHTML = list.filter(i => i.data === dt).map((i) => `
                <div class="prog-item"><b>${i.placa}</b> - ${i.status_flow} 
                <button class="btn-danger" style="float:right; padding:2px 8px;" onclick="cancelarCarro(${list.indexOf(i)})">X</button>
                </div>`).reverse().join('') || "Agenda vazia.";
        }

        function cancelarCarro(idx) { let list = JSON.parse(localStorage.getItem(DB.prog)); list.splice(idx, 1); localStorage.setItem(DB.prog, JSON.stringify(list)); carregarProgGeral(); }
        function switchTab(id, e) { document.querySelectorAll('[id^="area-"]').forEach(a => a.classList.add('hidden')); document.getElementById('area-' + id).classList.remove('hidden'); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active')); if (e) e.target.classList.add('tab-active'); if (id === 'monitor') carregarProgAdmin(); else if (id === 'history') carregarHistoryAdmin(); else renderAdminList(id); }
        function carregarProgAdmin() { const list = JSON.parse(localStorage.getItem(DB.prog) || '[]'); document.getElementById('list-prog-admin').innerHTML = list.filter(s => s.status_flow !== 'CONCLUÍDO').map(s => `<div class="prog-item"><span class="status-badge">${s.status_flow}</span><b>${s.placa}</b><br><small>${s.fornecedor}</small></div>`).reverse().join(''); }
        function carregarHistoryAdmin() { const list = JSON.parse(localStorage.getItem(DB.prog) || '[]'); document.getElementById('list-history-admin').innerHTML = list.filter(s => s.status_flow === 'CONCLUÍDO').map(s => `<div class="prog-item" style="border-color:var(--success)"><b>${s.placa}</b> - ${s.fornecedor}</div>`).reverse().join(''); }
        function renderAdminList(key) { const list = JSON.parse(localStorage.getItem(DB[key]) || '[]'); const cont = document.getElementById('list-' + key); if (cont) cont.innerHTML = list.map((i, idx) => `<div class="prog-item"><span>${i.nome || i.placa || i.mat || i.user}</span> <button class="btn-danger" onclick="excluirItem('${key}',${idx})">X</button></div>`).join(''); }
        function verDetalhesForn(n) { selectedForn = n; document.getElementById('forn-main-view').classList.add('hidden'); document.getElementById('forn-detail-view').classList.remove('hidden'); document.getElementById('view-forn-title').innerText = n; renderFornUsers(); }
        function popularSeletorFornecedores() { const forns = JSON.parse(localStorage.getItem(DB.forn) || '[]'); let o = forns.map(f => `<option value="${f.nome}">${f.nome}</option>`).join(''); o += `<option value="MEGA CENTER + MAXIMU'S">🤝 Parceria</option>`; document.getElementById('p-fornecedor-select').innerHTML = o; }
        function show(id) { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function handleLogout() { show('scr-login'); }
        function salvarItem(k, v) { let list = JSON.parse(localStorage.getItem(DB[k]) || '[]'); list.push(v); localStorage.setItem(DB[k], JSON.stringify(list)); renderAdminList(k); }
        function excluirItem(k, i) { let list = JSON.parse(localStorage.getItem(DB[k])); list.splice(i, 1); localStorage.setItem(DB[k], JSON.stringify(list)); renderAdminList(k); }
        function atualizarStatus(idx, novo) { let list = JSON.parse(localStorage.getItem(DB.prog)); list[idx].status_flow = novo; if (novo === 'CONCLUÍDO') list[idx].hora_fim = new Date().toLocaleTimeString(); localStorage.setItem(DB.prog, JSON.stringify(list)); carregarServicosForn(currentUser); }
        function exportarDados() { const data = {}; Object.keys(DB).forEach(k => data[k] = localStorage.getItem(DB[k])); const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], { type: 'application/json' })); a.download = 'backup.json'; a.click(); }
        function fecharDetalhesForn() { document.getElementById('forn-main-view').classList.remove('hidden'); document.getElementById('forn-detail-view').classList.add('hidden'); }
        function salvarNovoFornecedor() { const n = document.getElementById('f-nome').value.trim(); if (!n) return; let list = JSON.parse(localStorage.getItem(DB.forn) || '[]'); list.push({ nome: n }); localStorage.setItem(DB.forn, JSON.stringify(list)); renderAdminList('forn'); popularSeletorFornecedores(); }
        function renderFornUsers() { const all = JSON.parse(localStorage.getItem(DB.fornUsers) || '[]'); const f = all.filter(u => u.empresa === selectedForn); document.getElementById('list-forn-users').innerHTML = f.map(u => `<div class="prog-item">👤 ${u.user}</div>`).join(''); }
        function salvarUsuarioForn() { const u = document.getElementById('fu-user').value.trim(); const p = document.getElementById('fu-pass').value.trim(); if (!u || !p) return; let list = JSON.parse(localStorage.getItem(DB.fornUsers) || '[]'); list.push({ user: u, pass: p, empresa: selectedForn, tipo: (selectedForn.includes('Lava') ? 'Limpeza' : 'Oficina') }); localStorage.setItem(DB.fornUsers, JSON.stringify(list)); renderFornUsers(); }
    </script>
</body>

</html>
