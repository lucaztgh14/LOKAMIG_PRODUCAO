<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOKAMIG | Sistema Integrado de Frotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d1122a;
            --bg: #0f172a;
            --text: #f8fafc;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('Faça_uma_montagem_202604121721.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            width: 95%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Câmera e Fotos */
        .cam-box {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid var(--primary);
        }

        video {
            width: 100%;
            display: block;
        }

        canvas {
            display: none;
        }

        .cam-nav {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-sec {
            background: #334155;
        }

        .btn-avaria {
            background: #f59e0b;
            margin-top: 5px;
            font-size: 12px;
        }

        /* Admin */
        .admin-box {
            max-width: 900px;
            height: 90vh;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            cursor: pointer;
        }

        th {
            background: #0f172a;
            color: var(--primary);
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #334155;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Modal Detalhes */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a;
            z-index: 100;
            padding: 20px;
            overflow-y: auto;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }

        .photo-item {
            width: 100%;
            border-radius: 10px;
            border: 1px solid var(--primary);
        }
    </style>
</head>

<body>

    <section id="scr-login" class="container">
        <h1>LOKAMIG</h1>
        <div style="font-size: 10px; margin-bottom: 20px; color: #94a3b8;">SISTEMA INTEGRADO V5</div>
        <input type="text" id="user" placeholder="Matrícula ou Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="handleLogin()">Entrar</button>
    </section>

    <section id="scr-form" class="container hidden">
        <h1>DADOS DO VEÍCULO</h1>
        <select id="v-tipo">
            <option value="Operacional">Operacional</option>
            <option value="Reserva">Reserva</option>
            <option value="Gerencial">Gerencial</option>
        </select>
        <input type="text" id="v-placa" placeholder="PLACA (Ex: ABC1234)">
        <input type="number" id="v-km" placeholder="KM ATUAL (Manual)">
        <select id="v-comb">
            <option value="Vazio">Vazio</option>
            <option value="1/4">1/4</option>
            <option value="1/2">1/2</option>
            <option value="3/4">3/4</option>
            <option value="Cheio">Cheio</option>
        </select>
        <textarea id="v-obs" placeholder="Observações de Manutenção..."></textarea>
        <button onclick="iniciarFluxoFotos()">Ir para Fotos</button>
    </section>

    <section id="scr-camera" class="container hidden">
        <h2 id="cam-label" style="color: var(--primary);">FOTO DA FRENTE</h2>
        <div class="cam-box">
            <video id="vid" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
        </div>
        <button class="btn-avaria" onclick="marcarAvaria()">⚠️ REGISTRAR AVARIA NESTE ÂNGULO</button>

        <div class="cam-nav">
            <button class="btn-sec" onclick="mudarFoto(-1)">Voltar</button>
            <button onclick="capturarEFotoProxima()">Próximo / Tirar Foto</button>
        </div>
        <div id="foto-count" style="font-size: 11px; margin-top: 10px;">Foto 1 de 7</div>
    </section>

    <section id="scr-admin" class="container admin-box hidden">
        <h1>CONTROLE OPERACIONAL</h1>
        <div class="cam-nav" style="margin-bottom: 15px;">
            <button class="tab-btn" onclick="showCadastro()">Novo Cadastro</button>
            <button class="btn-sec" onclick="location.reload()">Sair</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>HORA</th>
                    <th>PLACA</th>
                    <th>MOTORISTA</th>
                    <th>TIPO</th>
                </tr>
            </thead>
            <tbody id="logs-body"></tbody>
        </table>
    </section>

    <section id="scr-detalhes" class="modal hidden">
        <h1 id="det-titulo">DETALHES</h1>
        <div id="det-info"
            style="text-align: left; font-size: 13px; margin: 15px 0; border-left: 3px solid var(--primary); padding-left: 10px;">
        </div>
        <div class="photo-grid" id="det-fotos"></div>
        <button onclick="gerarRelatorio()" style="background: var(--success);">Gerar Relatório PDF</button>
        <button onclick="show('scr-admin')" class="btn-sec" style="margin-top: 10px;">Voltar</button>
    </section>

    <script>
        let fluxo = ["Frente", "Lateral Esquerda", "Traseira", "Lateral Direita", "Estepe", "Painel/KM", "Motor", "Rodas"];
        let indexFoto = 0;
        let fotosCapturadas = {};
        let currentLog = null;
        let avarias = [];

        const USER_DB = 'lokamig_users_v4';
        const LOG_DB = 'lokamig_logs_v5';

        function show(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function handleLogin() {
            const u = document.getElementById('user').value.toLowerCase();
            const p = document.getElementById('pass').value;
            if (u === 'admin' && p === '1234') { carregarAdmin(); }
            else { show('scr-form'); }
        }

        async function iniciarFluxoFotos() {
            show('scr-camera');
            indexFoto = 0;
            atualizarCamInterface();
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            document.getElementById('vid').srcObject = stream;
        }

        function atualizarCamInterface() {
            document.getElementById('cam-label').innerText = "FOTO: " + fluxo[indexFoto].toUpperCase();
            document.getElementById('foto-count').innerText = `Foto ${indexFoto + 1} de ${fluxo.length}`;
        }

        function mudarFoto(dir) {
            indexFoto += dir;
            if (indexFoto < 0) indexFoto = 0;
            if (indexFoto >= fluxo.length) finalizarVistoria();
            else atualizarCamInterface();
        }

        function marcarAvaria() {
            avarias.push(fluxo[indexFoto]);
            alert("Avaria marcada para: " + fluxo[indexFoto] + ". Tire a foto normalmente.");
        }

        function capturarEFotoProxima() {
            const video = document.getElementById('vid');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            fotosCapturadas[fluxo[indexFoto]] = canvas.toDataURL('image/jpeg', 0.5);

            if (indexFoto === fluxo.length - 1) finalizarVistoria();
            else mudarFoto(1);
        }

        function finalizarVistoria() {
            const log = {
                id: Date.now(),
                hora: new Date().toLocaleString(),
                motorista: "LUCAS LIMA (T531971)",
                placa: document.getElementById('v-placa').value,
                km: document.getElementById('v-km').value,
                comb: document.getElementById('v-comb').value,
                tipo: document.getElementById('v-tipo').value,
                obs: document.getElementById('v-obs').value,
                fotos: fotosCapturadas,
                avarias: avarias
            };
            const logs = JSON.parse(localStorage.getItem(LOG_DB) || '[]');
            logs.unshift(log);
            localStorage.setItem(LOG_DB, JSON.stringify(logs));
            alert("Vistoria Concluída e enviada ao escritório!");
            location.reload();
        }

        function carregarAdmin() {
            show('scr-admin');
            const logs = JSON.parse(localStorage.getItem(LOG_DB) || '[]');
            document.getElementById('logs-body').innerHTML = logs.map(l => `
            <tr onclick='verDetalhes(${JSON.stringify(l)})'>
                <td>${l.hora.split(',')[1]}</td>
                <td>${l.placa}</td>
                <td>${l.motorista}</td>
                <td>${l.tipo}</td>
            </tr>
        `).join('');
        }

        function verDetalhes(log) {
            currentLog = log;
            show('scr-detalhes');
            document.getElementById('det-titulo').innerText = "VISTORIA: " + log.placa;
            document.getElementById('det-info').innerHTML = `
            <b>Motorista:</b> ${log.motorista}<br>
            <b>KM:</b> ${log.km} | <b>Combustível:</b> ${log.comb}<br>
            <b>Tipo:</b> ${log.tipo}<br>
            <b>Avarias em:</b> ${log.avarias.join(', ') || 'Nenhuma'}<br>
            <b>Obs:</b> ${log.obs}
        `;

            let htmlFotos = "";
            for (let key in log.fotos) {
                htmlFotos += `<div><small>${key}</small><img src="${log.fotos[key]}" class="photo-item"></div>`;
            }
            document.getElementById('det-fotos').innerHTML = htmlFotos;
        }

        function gerarRelatorio() {
            window.print();
        }
    </script>
</body>

</html>
