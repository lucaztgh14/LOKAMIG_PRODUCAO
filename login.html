<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOKAMIG | Gestão de Frotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d1122a;
            --bg: #0f172a;
            --text: #f8fafc;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)),
                url('Faça_uma_montagem_202604121721.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 5px;
            color: #fff;
        }

        .sub {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-nfc {
            background: #1e293b;
            margin-top: 10px;
            border: 1px dashed var(--primary);
        }

        .hidden {
            display: none !important;
        }

        .user-card {
            background: rgba(209, 18, 42, 0.15);
            border: 1px solid var(--primary);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            text-align: left;
        }

        .user-photo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #334155;
            border: 2px solid var(--primary);
        }

        .cam-box {
            position: relative;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid var(--primary);
            background: #000;
            margin-bottom: 15px;
        }

        video {
            width: 100%;
            display: block;
        }

        canvas {
            display: none;
        }

        .cam-nav {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-sec {
            background: #334155;
        }

        .btn-avaria {
            background: #f59e0b;
            font-size: 12px;
            margin-top: 10px;
        }

        .admin-box {
            max-width: 850px;
            width: 95%;
            height: 90vh;
            overflow-y: auto;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: #1e293b;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            color: #fff;
            cursor: pointer;
            flex: 1;
            font-size: 10px;
            font-weight: 700;
        }

        .tab-active {
            background: var(--primary);
            border-color: var(--primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            margin-top: 10px;
        }

        th {
            background: #0f172a;
            padding: 10px;
            text-align: left;
            color: var(--primary);
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #334155;
        }

        .modal-detalhes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }

        .photo-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 5px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .photo-card img {
            width: 100%;
            border-radius: 5px;
        }

        .photo-card span {
            font-size: 9px;
            display: block;
            text-align: center;
            margin-top: 4px;
        }

        @media print {
            .btn-print-hide {
                display: none;
            }

            body {
                background: white;
                color: black;
            }

            .modal-detalhes {
                position: static;
                background: white;
                padding: 0;
            }
        }
    </style>
</head>

<body>

    <section id="scr-login" class="container">
        <h1>LOKAMIG</h1>
        <div class="sub">Vistoria e Logística de Pátio</div>
        <input type="text" id="user" placeholder="Usuário / Matrícula">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="handleLogin()">Entrar</button>
        <button class="btn-nfc" onclick="lerCrachaNFC()">📲 ACESSAR VIA CRACHÁ</button>
    </section>

    <section id="scr-form" class="container hidden">
        <h1>CHECKLIST</h1>
        <div class="user-card">
            <div class="user-photo"></div>
            <div>
                <b id="display-nome">---</b><br>
                <small id="display-mat">Matrícula: ---</small>
            </div>
        </div>
        <select id="v-tipo">
            <option value="Operacional">Operacional</option>
            <option value="Reserva">Reserva</option>
            <option value="Gerencial">Gerencial</option>
        </select>
        <input type="text" id="v-placa" placeholder="PLACA DO VEÍCULO">
        <input type="number" id="v-km" placeholder="KM ATUAL (Manual)">
        <select id="v-comb">
            <option value="Vazio">Nível Combustível: Vazio</option>
            <option value="1/4">1/4</option>
            <option value="1/2">1/2</option>
            <option value="3/4">3/4</option>
            <option value="Cheio">Cheio</option>
        </select>
        <textarea id="v-obs" placeholder="Observações de manutenção..."></textarea>
        <button onclick="iniciarFluxoFotos()">Acessar Câmera</button>
    </section>

    <section id="scr-camera" class="container hidden">
        <h1 id="cam-label">FOTO</h1>
        <div class="cam-box">
            <video id="vid" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
        </div>
        <button class="btn-avaria" onclick="marcarAvaria()">⚠️ REGISTRAR AVARIA NESTE ÂNGULO</button>
        <div class="cam-nav">
            <button class="btn-sec" onclick="mudarFoto(-1)">Voltar</button>
            <button onclick="capturarEProxima()">Próximo / Tirar Foto</button>
        </div>
        <div id="foto-info" style="font-size: 11px; margin-top: 10px;">Ângulo 1 de 8</div>
    </section>

    <section id="scr-admin" class="container admin-box hidden">
        <h1 style="color: var(--primary);">PAINEL DE CONTROLE</h1>
        <div class="tabs">
            <button id="btn-tab-mon" class="tab-btn tab-active" onclick="switchTab('mon')">Monitoramento</button>
            <button id="btn-tab-cad" class="tab-btn" onclick="switchTab('cad')">Colaboradores</button>
        </div>
        <div id="area-monitor">
            <table>
                <thead>
                    <tr>
                        <th>HORA</th>
                        <th>PLACA</th>
                        <th>MOTORISTA</th>
                        <th>TIPO</th>
                    </tr>
                </thead>
                <tbody id="logs-body"></tbody>
            </table>
        </div>
        <div id="area-cadastro" class="hidden">
            <input type="text" id="reg-nome" placeholder="ex: nome completo">
            <input type="text" id="reg-mat" placeholder="ex: T123456">
            <input type="text" id="reg-id" placeholder="123456789">
            <button onclick="salvarColaborador()" style="background: var(--success);">Cadastrar</button>
            <table style="margin-top:20px;">
                <thead>
                    <tr>
                        <th>NOME</th>
                        <th>MATRÍCULA</th>
                        <th>AÇÃO</th>
                    </tr>
                </thead>
                <tbody id="colab-body"></tbody>
            </table>
        </div>
        <button onclick="location.reload()" class="btn-sec" style="margin-top:20px;">Sair</button>
    </section>

    <div id="scr-detalhes" class="modal-detalhes hidden">
        <h1 id="det-placa">Dossiê</h1>
        <div id="det-info"></div>
        <div class="photo-grid" id="det-fotos"></div>
        <button onclick="window.print()">Gerar PDF</button>
        <button onclick="show('scr-admin')">Voltar</button>
    </div>

    <script>
        const LOG_DB = 'lokamig_logs_v5';
        const USER_DB = 'lokamig_users_v5';
        let fluxo = ["Frente", "Lateral Esquerda", "Traseira", "Lateral Direita", "Estepe", "Painel/KM", "Motor", "Rodas"];
        let indexFoto = 0, fotosCapturadas = {}, avariasEncontradas = [], currentUser = null;

        if (!localStorage.getItem(USER_DB)) localStorage.setItem(USER_DB, JSON.stringify([{ nome: "LUCAS LIMA", mat: "T531971", id: "295698351" }]));

        function show(id) {
            document.querySelectorAll('section, .modal-detalhes').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function switchTab(t) {
            document.getElementById('area-monitor').classList.toggle('hidden', t !== 'mon');
            document.getElementById('area-cadastro').classList.toggle('hidden', t !== 'cad');
            document.getElementById('btn-tab-mon').classList.toggle('tab-active', t === 'mon');
            document.getElementById('btn-tab-cad').classList.toggle('tab-active', t === 'cad');
            if (t === 'cad') carregarListaColaboradores();
        }

        function handleLogin() {
            const u = document.getElementById('user').value.toLowerCase(), p = document.getElementById('pass').value;
            if (u === 'admin' && p === '1234') carregarAdmin();
            else {
                const user = JSON.parse(localStorage.getItem(USER_DB)).find(x => x.mat.toLowerCase() === u);
                if (user) logar(user); else alert("Não encontrado.");
            }
        }

        async function lerCrachaNFC() {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    alert("Aproxime o crachá...");
                    await ndef.scan();
                    ndef.onreading = event => {
                        const id = event.serialNumber.replace(/:/g, "").toUpperCase();
                        const user = JSON.parse(localStorage.getItem(USER_DB)).find(u => u.id === id);
                        if (user) logar(user); else alert("Crachá ID: " + id + " não cadastrado.");
                    };
                } catch (e) { alert("NFC erro."); }
            } else {
                const id = prompt("Digite o ID do Crachá:");
                const user = JSON.parse(localStorage.getItem(USER_DB)).find(u => u.id === id);
                if (user) logar(user); else alert("ID não cadastrado.");
            }
        }

        function logar(user) {
            currentUser = user;
            document.getElementById('display-nome').innerText = user.nome;
            document.getElementById('display-mat').innerText = "Matrícula: " + user.mat;
            show('scr-form');
        }

        function salvarColaborador() {
            const n = document.getElementById('reg-nome').value.toUpperCase(), m = document.getElementById('reg-mat').value.toUpperCase(), i = document.getElementById('reg-id').value;
            if (!n || !m || !i) return alert("Erro");
            const u = JSON.parse(localStorage.getItem(USER_DB));
            u.push({ nome: n, mat: m, id: i });
            localStorage.setItem(USER_DB, JSON.stringify(u));
            carregarListaColaboradores();
        }

        function carregarListaColaboradores() {
            const u = JSON.parse(localStorage.getItem(USER_DB));
            document.getElementById('colab-body').innerHTML = u.map((x, i) => `<tr><td>${x.nome}</td><td>${x.mat}</td><td><button onclick="removerColaborador(${i})">X</button></td></tr>`).join('');
        }

        function removerColaborador(i) {
            const u = JSON.parse(localStorage.getItem(USER_DB)); u.splice(i, 1);
            localStorage.setItem(USER_DB, JSON.stringify(u)); carregarListaColaboradores();
        }

        async function iniciarFluxoFotos() {
            show('scr-camera'); indexFoto = 0; atualizarInterfaceCam();
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            document.getElementById('vid').srcObject = s;
        }

        function atualizarInterfaceCam() {
            document.getElementById('cam-label').innerText = "FOTO: " + fluxo[indexFoto].toUpperCase();
            document.getElementById('foto-info').innerText = `Ângulo ${indexFoto + 1} de ${fluxo.length}`;
        }

        function mudarFoto(d) {
            indexFoto += d;
            if (indexFoto < 0) indexFoto = 0;
            else if (indexFoto >= fluxo.length) finalizarVistoria();
            else atualizarInterfaceCam();
        }

        function marcarAvaria() { avariasEncontradas.push(fluxo[indexFoto]); alert("Avaria!"); }

        function capturarEProxima() {
            const v = document.getElementById('vid'), c = document.getElementById('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            fotosCapturadas[fluxo[indexFoto]] = c.toDataURL('image/jpeg', 0.5);
            if (indexFoto === fluxo.length - 1) finalizarVistoria(); else mudarFoto(1);
        }

        function finalizarVistoria() {
            const l = {
                id: Date.now(), hora: new Date().toLocaleTimeString(), op: currentUser.nome,
                placa: document.getElementById('v-placa').value, km: document.getElementById('v-km').value,
                comb: document.getElementById('v-comb').value, tipo: document.getElementById('v-tipo').value,
                obs: document.getElementById('v-obs').value, fotos: fotosCapturadas, avarias: avariasEncontradas
            };
            const logs = JSON.parse(localStorage.getItem(LOG_DB) || '[]');
            logs.unshift(l); localStorage.setItem(LOG_DB, JSON.stringify(logs));
            alert("Enviado!"); location.reload();
        }

        function carregarAdmin() {
            show('scr-admin');
            const l = JSON.parse(localStorage.getItem(LOG_DB) || '[]');
            document.getElementById('logs-body').innerHTML = l.map(x => `<tr onclick='verDossie(${JSON.stringify(x)})'><td>${x.hora}</td><td>${x.placa}</td><td>${x.op}</td><td>${x.tipo}</td></tr>`).join('');
        }

        function verDossie(l) {
            show('scr-detalhes');
            document.getElementById('det-placa').innerText = "PLACA: " + l.placa;
            document.getElementById('det-info').innerHTML = `<p><b>Motorista:</b> ${l.op}</p><p><b>KM:</b> ${l.km} | <b>Comb:</b> ${l.comb}</p>`;
            let h = ""; for (let k in l.fotos) h += `<div class="photo-card"><img src="${l.fotos[k]}"><span>${k}</span></div>`;
            document.getElementById('det-fotos').innerHTML = h;
        }
    </script>
</body>

</html>
