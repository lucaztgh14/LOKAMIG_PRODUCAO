<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOKAMIG | Gestão de Frotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d1122a;
            --bg: #0f172a;
            --text: #f8fafc;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('Faça_uma_montagem_202604121721.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 95%;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #fff;
        }

        .sub {
            font-size: 10px;
            color: #94a3b8;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 11px;
        }

        .hidden {
            display: none !important;
        }

        .form-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: left;
        }

        .prog-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 6px solid var(--warning);
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .status-pendente {
            border-left-color: var(--warning);
        }

        .status-execucao {
            border-left-color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .status-concluido {
            border-left-color: var(--success);
            background: rgba(16, 185, 129, 0.1);
        }

        .badge {
            font-size: 8px;
            padding: 3px 6px;
            border-radius: 4px;
            background: var(--primary);
            color: #fff;
            text-transform: uppercase;
            margin-right: 5px;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tab-btn {
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            color: #fff;
            cursor: pointer;
            white-space: nowrap;
            flex: 1;
            font-size: 9px;
        }

        .tab-active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .btn-del {
            background: none;
            border: none;
            color: #ff4444;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10px;
            margin-top: 10px;
        }

        th {
            border-bottom: 1px solid var(--primary);
            padding: 8px;
            color: var(--primary);
            text-align: left;
        }

        td {
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nfc-reading {
            animation: blink 1s infinite;
            border-color: var(--warning) !important;
            color: var(--warning) !important;
        }

        @keyframes blink {
            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>

<body>

    <section id="scr-login" class="container">
        <h1>LOKAMIG</h1>
        <div class="sub">Logística & Programação</div>
        <input type="text" id="user" placeholder="Matrícula / Usuário / Clique para Crachá"
            onclick="ativarLeituraNFCLogin()">
        <input type="password" id="pass" placeholder="Senha (Se houver)">
        <button onclick="handleLogin()">Entrar</button>
        <div id="status-nfc-login" style="margin-top: 10px; font-size: 9px; color: var(--warning);" class="hidden">
            AGUARDANDO APROXIMAÇÃO DO CRACHÁ...</div>
    </section>

    <section id="scr-admin" class="container hidden" style="max-width: 800px;">
        <h1>ADMINISTRAÇÃO</h1>
        <div class="tabs">
            <button class="tab-btn tab-active" onclick="switchTab('prog-view-admin', event)">Programação</button>
            <button class="tab-btn" onclick="switchTab('mon', event)">Monitoramento</button>
            <button class="tab-btn" onclick="switchTab('colab', event)">Equipe</button>
            <button class="tab-btn" onclick="switchTab('forn', event)">Fornecedores</button>
            <button class="tab-btn" onclick="switchTab('veic', event)">Veículos</button>
        </div>

        <div id="area-prog-view-admin">
            <div class="form-section" style="display: flex; gap: 10px; align-items: center;">
                <span style="font-size: 11px;">Data:</span>
                <input type="date" id="filtro-data-admin" onchange="carregarProgAdmin()" style="margin-bottom: 0;">
            </div>
            <div id="list-prog-admin"></div>
        </div>

        <div id="area-mon" class="hidden">
            <table>
                <thead>
                    <tr>
                        <th>DATA</th>
                        <th>PLACA</th>
                        <th>RESP.</th>
                        <th>TIPO</th>
                    </tr>
                </thead>
                <tbody id="list-mon"></tbody>
            </table>
        </div>

        <div id="area-colab" class="hidden">
            <div class="form-section">
                <input type="text" id="c-mat" placeholder="MATRÍCULA">
                <input type="text" id="c-nome" placeholder="NOME COMPLETO">
                <input type="text" id="c-nfc" placeholder="CLIQUE AQUI E APROXIME O CRACHÁ" readonly
                    onclick="ativarLeituraNFCCadastro()">
                <button onclick="salvarColab()" style="background:var(--success)">Cadastrar Colaborador</button>
            </div>
            <div id="list-colab"></div>
        </div>

        <div id="area-forn" class="hidden">
            <div class="form-section">
                <input type="text" id="f-nome" placeholder="NOME DA EMPRESA">
                <input type="text" id="f-user" placeholder="LOGIN">
                <input type="text" id="f-pass" placeholder="SENHA">
                <select id="f-tipo">
                    <option value="Limpeza">Limpeza</option>
                    <option value="Oficina">Oficina</option>
                </select>
                <button onclick="salvarForn()" style="background:var(--success)">Cadastrar Fornecedor</button>
            </div>
            <div id="list-forn"></div>
        </div>

        <div id="area-veic" class="hidden">
            <div class="form-section">
                <input type="text" id="v-reg-placa" placeholder="PLACA">
                <select id="v-reg-tipo">
                    <option value="Operacional">Operacional</option>
                    <option value="Reserva">Reserva</option>
                    <option value="Gerencial">Gerencial</option>
                </select>
                <button onclick="salvarVeiculo()" style="background:var(--success)">Cadastrar Veículo</button>
            </div>
            <div id="list-veic"></div>
        </div>

        <button onclick="location.reload()" style="background:#334155; margin-top:10px;">Sair</button>
    </section>

    <section id="scr-cliente" class="container hidden">
        <h1>PROGRAMAÇÃO DIÁRIA</h1>
        <div class="sub">Área do Cliente</div>
        <div class="form-section">
            <input type="text" id="p-placa" placeholder="PLACA DO VEÍCULO" onblur="buscarInfoVeiculo(this.value)">
            <div id="info-veiculo-status" style="font-size: 10px; margin-bottom: 10px; color: var(--warning);"></div>
            <select id="p-destino">
                <option value="Limpeza">Para Limpeza</option>
                <option value="Oficina">Para Oficina</option>
            </select>
            <textarea id="p-obs" placeholder="OBSERVAÇÕES DE MANUTENÇÃO..."></textarea>
            <button onclick="lancarProgramacao()" style="background:var(--success)">Lançar na Agenda</button>
        </div>
        <div id="lista-programacao-cliente" style="max-height: 250px; overflow-y: auto;"></div>
        <button onclick="location.reload()" style="background:#334155; margin-top:20px;">Sair</button>
    </section>

    <section id="scr-form" class="container hidden">
        <h1 id="display-nome">---</h1>
        <div id="area-fornecedor-prog" class="hidden">
            <div class="sub">Serviços Designados</div>
            <div id="prog-list-forn"></div>
        </div>

        <div class="form-section">
            <div class="sub">Realizar Checklist</div>
            <input type="text" id="v-placa-check" placeholder="PLACA">
            <input type="number" id="v-km" placeholder="KM ATUAL">
            <textarea id="v-obs-check" placeholder="Relatório do serviço..."></textarea>
            <button onclick="finalizarChecklist()">Finalizar Serviço</button>
        </div>
        <button onclick="location.reload()" style="background:#334155;">Sair</button>
    </section>

    <script>
        const DB = { colab: 'l_colab_v7', forn: 'l_forn_v7', veic: 'l_veic_v7', prog: 'l_prog_v7', logs: 'l_logs_v7' };
        const CLIENTE_USER = { user: "CLIENTE", pass: "LOKAMIG2026", nome: "CLIENTE MASTER" };

        // Inicializa data de hoje nos filtros
        window.onload = () => {
            const hoje = new Date().toISOString().split('T')[0];
            if (document.getElementById('filtro-data-admin')) document.getElementById('filtro-data-admin').value = hoje;
        };

        function handleLogin() {
            const u = document.getElementById('user').value.toUpperCase();
            const p = document.getElementById('pass').value;
            if (u === 'ADMIN' && p === '1234') { show('scr-admin'); carregarProgAdmin(); return; }
            if (u === CLIENTE_USER.user && p === CLIENTE_USER.pass) { show('scr-cliente'); carregarProgCliente(); return; }
            const colab = JSON.parse(localStorage.getItem(DB.colab) || '[]').find(c => c.mat === u || c.nfc === u);
            if (colab) { logar(colab, 'COLABORADOR'); return; }
            const forn = JSON.parse(localStorage.getItem(DB.forn) || '[]').find(f => f.user.toUpperCase() === u && f.pass === p);
            if (forn) { logar(forn, 'FORNECEDOR'); return; }
            alert("Acesso Negado.");
        }

        function logar(user, tipo) {
            window.sessao = { user, tipo };
            document.getElementById('display-nome').innerText = user.nome;
            show('scr-form');
            if (tipo === 'FORNECEDOR') {
                document.getElementById('area-fornecedor-prog').classList.remove('hidden');
                carregarProgFornecedor();
            }
        }

        // LOGICA DE PROGRAMAÇÃO E CORES
        function lancarProgramacao() {
            const p = document.getElementById('p-placa').value.toUpperCase();
            if (!p) return;
            const veiculos = JSON.parse(localStorage.getItem(DB.veic) || '[]');
            const vInfo = veiculos.find(v => v.placa === p) || { tipo: 'N/I' };

            const d = JSON.parse(localStorage.getItem(DB.prog) || '[]');
            d.push({
                id: Date.now(),
                data: new Date().toISOString().split('T')[0],
                placa: p,
                tipoVeic: vInfo.tipo,
                destino: document.getElementById('p-destino').value,
                obs: document.getElementById('p-obs').value,
                status: 'PENDENTE' // PENDENTE (Laranja), EXECUCAO (Vermelho), CONCLUIDO (Verde)
            });
            localStorage.setItem(DB.prog, JSON.stringify(d));
            carregarProgCliente();
            document.getElementById('p-placa').value = ''; document.getElementById('p-obs').value = '';
        }

        function carregarProgAdmin() {
            const filtro = document.getElementById('filtro-data-admin').value;
            const dados = JSON.parse(localStorage.getItem(DB.prog) || '[]').filter(x => x.data === filtro);
            const lista = document.getElementById('list-prog-admin');

            if (dados.length === 0) {
                lista.innerHTML = "<div class='sub'>Nenhuma programação para este dia.</div>";
                return;
            }

            lista.innerHTML = dados.map(i => {
                let corClass = i.status === 'PENDENTE' ? 'status-pendente' : (i.status === 'EXECUCAO' ? 'status-execucao' : 'status-concluido');
                return `
                <div class="prog-item ${corClass}">
                    <div>
                        <span class="badge">${i.tipoVeic}</span>
                        <span class="badge" style="background:#334155">${i.destino}</span>
                        <b>${i.placa}</b><br>
                        <small>${i.status} - ${i.obs}</small>
                    </div>
                    <button class="btn-del" onclick="excluirProgAdmin(${i.id})">×</button>
                </div>
            `;
            }).join('');
        }

        function carregarProgFornecedor() {
            const hoje = new Date().toISOString().split('T')[0];
            const dados = JSON.parse(localStorage.getItem(DB.prog) || '[]').filter(x => x.data === hoje && x.destino === window.sessao.user.tipo);
            const lista = document.getElementById('prog-list-forn');

            lista.innerHTML = dados.map(i => `
            <div class="prog-item ${i.status === 'PENDENTE' ? 'status-pendente' : (i.status === 'EXECUCAO' ? 'status-execucao' : 'status-concluido')}">
                <div><b>${i.placa}</b> (${i.tipoVeic})<br><small>${i.obs}</small></div>
                <div style="display:flex; gap:5px;">
                    ${i.status === 'PENDENTE' ? `<button onclick="alterarStatus(${i.id}, 'EXECUCAO')" style="padding:5px; background:var(--danger); font-size:8px;">INICIAR</button>` : ''}
                    ${i.status === 'EXECUCAO' ? `<button onclick="alterarStatus(${i.id}, 'CONCLUIDO')" style="padding:5px; background:var(--success); font-size:8px;">FINALIZAR</button>` : ''}
                </div>
            </div>
        `).join('');
        }

        function alterarStatus(id, novoStatus) {
            let d = JSON.parse(localStorage.getItem(DB.prog));
            const idx = d.findIndex(x => x.id === id);
            if (idx !== -1) {
                d[idx].status = novoStatus;
                localStorage.setItem(DB.prog, JSON.stringify(d));
                carregarProgFornecedor();
            }
        }

        // UTILITÁRIOS
        function buscarInfoVeiculo(placa) {
            const v = JSON.parse(localStorage.getItem(DB.veic) || '[]').find(x => x.placa === placa.toUpperCase());
            document.getElementById('info-veiculo-status').innerText = v ? `Veículo ${v.tipo} identificado.` : "Placa não cadastrada na frota.";
        }

        function excluirProgAdmin(id) {
            if (!confirm("Remover esta programação?")) return;
            let d = JSON.parse(localStorage.getItem(DB.prog));
            localStorage.setItem(DB.prog, JSON.stringify(d.filter(x => x.id !== id)));
            carregarProgAdmin();
        }

        // MANTENDO AS FUNÇÕES ANTERIORES (NFC, CADASTROS, ETC)
        async function ativarLeituraNFCLogin() {
            if (!('NDEFReader' in window)) return;
            try {
                const ndef = new NDEFReader(); await ndef.scan();
                document.getElementById('user').classList.add('nfc-reading');
                document.getElementById('status-nfc-login').classList.remove('hidden');
                ndef.onreading = event => {
                    document.getElementById('user').value = event.serialNumber.toUpperCase();
                    handleLogin();
                };
            } catch (e) { console.error(e); }
        }

        async function ativarLeituraNFCCadastro() {
            const campo = document.getElementById('c-nfc');
            if (!('NDEFReader' in window)) { alert("NFC não suportado."); return; }
            try {
                const ndef = new NDEFReader(); await ndef.scan();
                campo.classList.add('nfc-reading'); campo.value = "AGUARDANDO...";
                ndef.onreading = event => { campo.value = event.serialNumber.toUpperCase(); campo.classList.remove('nfc-reading'); };
            } catch (e) { alert(e); }
        }

        function salvarColab() {
            const d = JSON.parse(localStorage.getItem(DB.colab) || '[]');
            d.push({ mat: document.getElementById('c-mat').value.toUpperCase(), nome: document.getElementById('c-nome').value, nfc: document.getElementById('c-nfc').value.toUpperCase() });
            localStorage.setItem(DB.colab, JSON.stringify(d)); carregarListaColab();
        }
        function carregarListaColab() {
            const d = JSON.parse(localStorage.getItem(DB.colab) || '[]');
            document.getElementById('list-colab').innerHTML = d.map(x => `<div class="prog-item"><span>${x.nome} (ID: ${x.nfc || x.mat})</span><button class="btn-del" onclick="excluirItem('${DB.colab}', 'mat', '${x.mat}')">×</button></div>`).join('');
        }
        function salvarVeiculo() {
            const d = JSON.parse(localStorage.getItem(DB.veic) || '[]');
            d.push({ placa: document.getElementById('v-reg-placa').value.toUpperCase(), tipo: document.getElementById('v-reg-tipo').value });
            localStorage.setItem(DB.veic, JSON.stringify(d)); carregarListaVeic();
        }
        function carregarListaVeic() {
            const d = JSON.parse(localStorage.getItem(DB.veic) || '[]');
            document.getElementById('list-veic').innerHTML = d.map(x => `<div class="prog-item"><span>${x.placa} - ${x.tipo}</span><button class="btn-del" onclick="excluirItem('${DB.veic}', 'placa', '${x.placa}')">×</button></div>`).join('');
        }
        function carregarLogs() {
            const d = JSON.parse(localStorage.getItem(DB.logs) || '[]');
            document.getElementById('list-mon').innerHTML = d.map(x => `<tr><td>${x.data}</td><td>${x.placa}</td><td>${x.user}</td><td>${x.tipo}</td></tr>`).join('');
        }
        function carregarProgCliente() {
            const hoje = new Date().toISOString().split('T')[0];
            const d = JSON.parse(localStorage.getItem(DB.prog) || '[]').filter(x => x.data === hoje);
            document.getElementById('lista-programacao-cliente').innerHTML = d.map(i => `<div class="prog-item"><div><span class="badge">${i.destino}</span><b>${i.placa}</b></div><button class="btn-del" onclick="excluirProgAdmin(${i.id})">×</button></div>`).join('');
        }

        function excluirItem(db, chave, valor) {
            if (!confirm("Excluir item?")) return;
            let d = JSON.parse(localStorage.getItem(db));
            localStorage.setItem(db, JSON.stringify(d.filter(x => x[chave] !== valor)));
            if (db === DB.colab) carregarListaColab();
            if (db === DB.veic) carregarListaVeic();
        }

        function finalizarChecklist() {
            const p = document.getElementById('v-placa-check').value.toUpperCase();
            const logs = JSON.parse(localStorage.getItem(DB.logs) || '[]');
            logs.push({ data: new Date().toLocaleString(), placa: p, user: window.sessao.user.nome, tipo: window.sessao.tipo });
            localStorage.setItem(DB.logs, JSON.stringify(logs));
            alert("Checklist Salvo!"); location.reload();
        }

        function show(id) { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function switchTab(t, e) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            e.target.classList.add('tab-active');
            document.getElementById('area-prog-view-admin').classList.toggle('hidden', t !== 'prog-view-admin');
            document.getElementById('area-mon').classList.toggle('hidden', t !== 'mon');
            document.getElementById('area-colab').classList.toggle('hidden', t !== 'colab');
            document.getElementById('area-forn').classList.toggle('hidden', t !== 'forn');
            document.getElementById('area-veic').classList.toggle('hidden', t !== 'veic');
            if (t === 'prog-view-admin') carregarProgAdmin();
            if (t === 'colab') carregarListaColab();
            if (t === 'veic') carregarListaVeic();
        }
        function salvarForn() {
            const f = JSON.parse(localStorage.getItem(DB.forn) || '[]');
            f.push({ nome: document.getElementById('f-nome').value, user: document.getElementById('f-user').value, pass: document.getElementById('f-pass').value, tipo: document.getElementById('f-tipo').value });
            localStorage.setItem(DB.forn, JSON.stringify(f)); carregarListaForn();
        }
        function carregarListaForn() {
            const f = JSON.parse(localStorage.getItem(DB.forn) || '[]');
            document.getElementById('list-forn').innerHTML = f.map(x => `<div class="prog-item"><span>${x.nome} (${x.tipo})</span><button class="btn-del" onclick="excluirItem('${DB.forn}', 'user', '${x.user}')">×</button></div>`).join('');
        }
    </script>
</body>

</html>
