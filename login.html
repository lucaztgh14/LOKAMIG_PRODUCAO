<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vistoria LOKAMIG | Acesso</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #f4f4f4;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 350px;
        }

        .logo {
            width: 60px;
            margin-bottom: 10px;
        }

        .premium-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .btn-red {
            width: 100%;
            padding: 12px;
            background: #b91c1c;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
        }

        .btn-red:hover {
            background: #991b1b;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <img src="https://img.icons8.com/color/96/000000/car-key.png" class="logo" alt="LOKAMIG">
        <h2 style="margin: 0 0 5px 0;">LOKAMIG</h2>
        <p style="color: #666; margin-bottom: 30px; font-size: 14px;">Acesso ao Pátio de Vistoria</p>

        <input type="text" id="user_input" class="premium-input" placeholder="Login">
        <input type="password" id="pass_input" class="premium-input" placeholder="Senha">
        <button class="btn-red" onclick="handleLogin()">Acessar Pátio</button>
    </div>

    <script>
        function handleLogin() {
            // Captura os valores dos campos
            const u = document.getElementById('user_input').value.toLowerCase().trim();
            const p = document.getElementById('pass_input').value;

            console.log("Tentativa de acesso para:", u);

            // Lógica de login simples sem dependência de bibliotecas externas travando
            if (u === 'admin' && p === '1234') {
                localStorage.setItem('user_role', 'ADMIN');
                localStorage.setItem('session_username', 'Admin LOKAMIG');
                window.location.href = 'index.html';
            } else if (u === 'lucas lima' && p === 'mudar@23') {
                localStorage.setItem('user_role', 'SUPER_ADMIN');
                localStorage.setItem('session_username', 'LUCAS LIMA');
                window.location.href = 'admin.html';
            } else {
                alert("Acesso Negado: Usuário ou senha incorretos.");
            }
        }
    </script>
</body>

</html>
