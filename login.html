<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOKAMIG | Gestão de Frotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d1122a;
            --bg: #0f172a;
            --text: #f8fafc;
            --success: #10b981;
            --warning: #f59e0b;
            --info: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)),
                url('Faça_uma_montagem_202604121721.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 95%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 5px;
            color: #fff;
        }

        .sub {
            font-size: 10px;
            color: #94a3b8;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 11px;
        }

        .hidden {
            display: none !important;
        }

        /* Tabelas e Admin */
        .admin-box {
            max-width: 850px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .tab-btn {
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            color: #fff;
            cursor: pointer;
            white-space: nowrap;
            font-size: 10px;
            flex: 1;
        }

        .tab-active {
            background: var(--primary);
            border-color: var(--primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            margin-top: 10px;
        }

        th {
            background: #0f172a;
            padding: 10px;
            text-align: left;
            color: var(--primary);
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #334155;
            text-align: left;
        }

        /* Estilo da Programação */
        .prog-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid var(--primary);
            text-align: left;
            position: relative;
        }

        .prog-card b {
            color: var(--warning);
            font-size: 14px;
        }

        .prog-card small {
            display: block;
            color: #94a3b8;
            margin-top: 4px;
        }

        .btn-del {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #ef4444;
            cursor: pointer;
            font-weight: bold;
        }

        .form-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: left;
        }

        .section-title {
            font-size: 11px;
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        .btn-prog-view {
            background: var(--warning);
            color: #000;
            margin-bottom: 15px;
            font-size: 10px;
        }
    </style>
</head>

<body>

    <section id="scr-login" class="container">
        <h1>LOKAMIG</h1>
        <div class="sub">Logística & Gestão de Pátio</div>
        <input type="text" id="user" placeholder="Matrícula ou Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="handleLogin()">Entrar no Sistema</button>
        <div style="margin: 15px 0; font-size: 9px; color: #64748b;">ACESSO RESTRITO</div>
    </section>

    <section id="scr-admin" class="container admin-box hidden">
        <h1>PAINEL DE CONTROLE</h1>
        <div class="tabs">
            <button class="tab-btn tab-active" onclick="switchTab('mon', event)">Monitoramento</button>
            <button class="tab-btn" onclick="switchTab('cad', event)">Equipe</button>
            <button class="tab-btn" onclick="switchTab('veic', event)">Frotas</button>
            <button class="tab-btn" onclick="switchTab('forn', event)">Fornecedores</button>
        </div>

        <div id="area-mon">
            <table id="tbl-logs">
                <thead>
                    <tr>
                        <th>DATA/HORA</th>
                        <th>PLACA</th>
                        <th>RESPONSÁVEL</th>
                        <th>TIPO</th>
                    </tr>
                </thead>
                <tbody id="body-logs"></tbody>
            </table>
        </div>

        <div id="area-cad" class="hidden">
            <div class="form-section">
                <span class="section-title">CADASTRAR COLABORADOR</span>
                <input type="text" id="reg-mat" placeholder="Matrícula">
                <input type="text" id="reg-nome" placeholder="Nome Completo">
                <button onclick="salvarColab()" style="background:var(--success)">Salvar no Sistema</button>
            </div>
            <table id="tbl-colabs">
                <tbody></tbody>
            </table>
        </div>

        <div id="area-veic" class="hidden">
            <div class="form-section">
                <span class="section-title">CADASTRAR VEÍCULO</span>
                <input type="text" id="v-reg-placa" placeholder="PLACA">
                <select id="v-reg-tipo">
                    <option value="Operacional">Operacional</option>
                    <option value="Reserva">Reserva (Gera substituição)</option>
                </select>
                <button onclick="salvarVeiculo()" style="background:var(--success)">Cadastrar Carro</button>
            </div>
            <table id="tbl-veics">
                <tbody></tbody>
            </table>
        </div>

        <div id="area-forn" class="hidden">
            <div class="form-section">
                <span class="section-title">ACESSO PARA FORNECEDORES</span>
                <input type="text" id="f-reg-nome" placeholder="NOME DA EMPRESA">
                <input type="text" id="f-reg-user" placeholder="LOGIN">
                <input type="text" id="f-reg-pass" placeholder="SENHA">
                <select id="f-reg-tipo">
                    <option value="Limpeza">Limpeza / Estética</option>
                    <option value="Oficina">Oficina / Mecânica</option>
                </select>
                <button onclick="salvarForn()" style="background:var(--success)">Criar Login Fornecedor</button>
            </div>
            <table id="tbl-forns">
                <tbody></tbody>
            </table>
        </div>

        <button onclick="location.reload()" style="background:#334155; margin-top:20px;">Sair do Painel</button>
    </section>

    <section id="scr-cliente" class="container hidden">
        <h1>PROGRAMAÇÃO DO DIA</h1>
        <div class="sub">Lançamento de Demandas (WhatsApp)</div>

        <div class="form-section">
            <span class="section-title">NOVA ENTRADA</span>
            <input type="text" id="p-placa" placeholder="PLACA DO VEÍCULO">
            <select id="p-destino">
                <option value="Limpeza">Encaminhar para Limpeza</option>
                <option value="Oficina">Encaminhar para Oficina</option>
            </select>
            <textarea id="p-obs" placeholder="OBSERVAÇÕES (EX: TROCA DE ÓLEO, BANCO SUJO, ETC)"></textarea>
            <button onclick="lancarProg()" style="background:var(--success)">Adicionar à Programação</button>
        </div>

        <div id="lista-prog-cliente" style="max-height: 300px; overflow-y: auto;">
        </div>

        <button onclick="location.reload()" style="background:#334155; margin-top:20px;">Sair</button>
    </section>

    <section id="scr-form" class="container hidden">
        <h1 id="user-display">---</h1>
        <div id="perfil-display" class="sub">---</div>

        <button id="btn-prog-forn" class="btn-prog-view hidden" onclick="toggleProg()">
            VER PROGRAMAÇÃO DO DIA: <span id="data-atual"></span> 📅
        </button>

        <div id="box-prog-forn" class="form-section hidden"
            style="background: rgba(245, 158, 11, 0.1); border: 1px solid var(--warning);">
            <div id="conteudo-prog-forn"></div>
        </div>

        <div class="form-section">
            <span class="section-title">DADOS DA VISTORIA</span>
            <input type="text" id="f-placa" placeholder="PLACA DO CARRO">
            <div id="box-reserva" class="hidden">
                <input type="text" id="f-placa-sub" placeholder="PLACA DO CARRO SUBSTITUÍDO">
            </div>
            <input type="number" id="f-km" placeholder="KM ATUAL">
            <select id="f-combustivel">
                <option value="Cheio">Tanque Cheio</option>
                <option value="1/2">Meio Tanque (1/2)</option>
                <option value="Reserva">Na Reserva</option>
            </select>
            <textarea id="f-relatorio" placeholder="RELATÓRIO / OBSERVAÇÕES..."></textarea>
            <button onclick="salvarChecklist()">Finalizar e Enviar</button>
        </div>

        <button onclick="location.reload()" style="background:#334155; margin-top:10px;">Sair</button>
    </section>

    <script>
        // BANCOS DE DADOS LOCAIS
        const DB_LOGS = 'db_logs_v10';
        const DB_USERS = 'db_users_v10';
        const DB_VEICS = 'db_veics_v10';
        const DB_FORNS = 'db_forns_v10';
        const DB_PROG = 'db_prog_v10';

        let userLogado = null;

        function handleLogin() {
            const u = document.getElementById('user').value.toUpperCase();
            const p = document.getElementById('pass').value;

            // 1. ADMIN
            if (u === 'ADMIN' && p === '1234') { show('scr-admin'); carregarAdmin(); return; }

            // 2. CLIENTE
            if (u === 'CLIENTE' && p === 'LOKAMIG2026') { show('scr-cliente'); carregarProgCliente(); return; }

            // 3. FORNECEDORES
            const forn = JSON.parse(localStorage.getItem(DB_FORNS) || '[]').find(x => x.user.toUpperCase() === u && x.pass === p);
            if (forn) { abrirApp(forn, 'FORNECEDOR'); return; }

            // 4. COLABORADORES
            const colab = JSON.parse(localStorage.getItem(DB_USERS) || '[]').find(x => x.mat.toUpperCase() === u);
            if (colab) { abrirApp(colab, 'EQUIPE'); return; }

            alert("Acesso Negado!");
        }

        function abrirApp(user, tipo) {
            userLogado = user;
            document.getElementById('user-display').innerText = user.nome;
            document.getElementById('perfil-display').innerText = tipo + ": " + (user.tipo || user.mat);
            document.getElementById('data-atual').innerText = new Date().toLocaleDateString();

            show('scr-form');

            if (tipo === 'FORNECEDOR') {
                document.getElementById('btn-prog-forn').classList.remove('hidden');
            }
        }

        // LOGICA DO CLIENTE (LANÇAR LISTA)
        function lancarProg() {
            const placa = document.getElementById('p-placa').value.toUpperCase();
            const dest = document.getElementById('p-destino').value;
            const obs = document.getElementById('p-obs').value;
            if (!placa) return;

            const lista = JSON.parse(localStorage.getItem(DB_PROG) || '[]');
            lista.push({ id: Date.now(), placa, dest, obs, data: new Date().toLocaleDateString() });
            localStorage.setItem(DB_PROG, JSON.stringify(lista));

            document.getElementById('p-placa').value = '';
            document.getElementById('p-obs').value = '';
            carregarProgCliente();
        }

        function carregarProgCliente() {
            const lista = JSON.parse(localStorage.getItem(DB_PROG) || '[]');
            document.getElementById('lista-prog-cliente').innerHTML = lista.map(i => `
            <div class="prog-card">
                <span class="btn-del" onclick="excluirProg(${i.id})">X</span>
                <small style="color:var(--primary)">DESTINO: ${i.dest.toUpperCase()}</small>
                <b>${i.placa}</b>
                <small>${i.obs || 'Sem observações'}</small>
            </div>
        `).join('');
        }

        function excluirProg(id) {
            let lista = JSON.parse(localStorage.getItem(DB_PROG));
            lista = lista.filter(x => x.id !== id);
            localStorage.setItem(DB_PROG, JSON.stringify(lista));
            carregarProgCliente();
        }

        // LOGICA DO FORNECEDOR (VER LISTA)
        function toggleProg() {
            const box = document.getElementById('box-prog-forn');
            box.classList.toggle('hidden');
            if (!box.classList.contains('hidden')) {
                const lista = JSON.parse(localStorage.getItem(DB_PROG) || '[]');
                // Filtra: só mostra o que é pro tipo de fornecedor logado (Limpeza ou Oficina)
                const filtrada = lista.filter(x => x.dest === userLogado.tipo);

                document.getElementById('conteudo-prog-forn').innerHTML = filtrada.length ? filtrada.map(i => `
                <div style="margin-bottom:10px; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:5px;">
                    <b style="color:var(--warning)">${i.placa}</b><br>
                    <small>📝 ${i.obs || 'Verificar veículo'}</small>
                </div>
            `).join('') : '<small>Nenhuma programação recebida para hoje.</small>';
            }
        }

        // FUNÇÕES DE ADMINISTRAÇÃO (CADASTROS)
        function salvarColab() {
            const mat = document.getElementById('reg-mat').value;
            const nome = document.getElementById('reg-nome').value;
            const db = JSON.parse(localStorage.getItem(DB_USERS) || '[]');
            db.push({ mat, nome });
            localStorage.setItem(DB_USERS, JSON.stringify(db));
            carregarAdmin();
        }

        function salvarVeiculo() {
            const placa = document.getElementById('v-reg-placa').value.toUpperCase();
            const tipo = document.getElementById('v-reg-tipo').value;
            const db = JSON.parse(localStorage.getItem(DB_VEICS) || '[]');
            db.push({ placa, tipo });
            localStorage.setItem(DB_VEICS, JSON.stringify(db));
            carregarAdmin();
        }

        function salvarForn() {
            const nome = document.getElementById('f-reg-nome').value;
            const user = document.getElementById('f-reg-user').value;
            const pass = document.getElementById('f-reg-pass').value;
            const tipo = document.getElementById('f-reg-tipo').value;
            const db = JSON.parse(localStorage.getItem(DB_FORNS) || '[]');
            db.push({ nome, user, pass, tipo });
            localStorage.setItem(DB_FORNS, JSON.stringify(db));
            carregarAdmin();
        }

        function carregarAdmin() {
            const colabs = JSON.parse(localStorage.getItem(DB_USERS) || '[]');
            document.getElementById('tbl-colabs').innerHTML = colabs.map(c => `<tr><td>${c.mat}</td><td>${c.nome}</td></tr>`).join('');

            const veics = JSON.parse(localStorage.getItem(DB_VEICS) || '[]');
            document.getElementById('tbl-veics').innerHTML = veics.map(v => `<tr><td>${v.placa}</td><td>${v.tipo}</td></tr>`).join('');

            const forns = JSON.parse(localStorage.getItem(DB_FORNS) || '[]');
            document.getElementById('tbl-forns').innerHTML = forns.map(f => `<tr><td>${f.nome}</td><td>${f.tipo}</td></tr>`).join('');
        }

        // UTILITÁRIOS
        function show(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function switchTab(tab, e) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            e.target.classList.add('tab-active');
            document.getElementById('area-mon').classList.toggle('hidden', tab !== 'mon');
            document.getElementById('area-cad').classList.toggle('hidden', tab !== 'cad');
            document.getElementById('area-veic').classList.toggle('hidden', tab !== 'veic');
            document.getElementById('area-forn').classList.toggle('hidden', tab !== 'forn');
        }
    </script>

</body>

</html>
