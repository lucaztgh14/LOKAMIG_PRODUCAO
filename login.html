<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOKAMIG | Gestão de Frotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d1122a;
            --bg: #0f172a;
            --text: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)),
                url('Faça_uma_montagem_202604121721.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 5px;
            color: #fff;
        }

        .sub {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input,
        select {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-nfc {
            background: #1e293b;
            margin-top: 10px;
            border: 1px dashed var(--primary);
        }

        .user-card {
            background: rgba(209, 18, 42, 0.15);
            border: 1px solid var(--primary);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            text-align: left;
        }

        .user-photo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #334155;
            border: 2px solid var(--primary);
        }

        .grid-check {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        .btn-angle {
            background: #1e293b;
            font-size: 10px;
            padding: 12px;
            border: 1px solid #334155;
            color: white;
        }

        .done {
            background: #10b981 !important;
            border-color: #10b981;
        }

        video {
            width: 100%;
            border-radius: 15px;
            margin: 10px 0;
            border: 2px solid var(--primary);
            background: #000;
        }

        .hidden {
            display: none;
        }

        /* Painel Escritório */
        .admin-box {
            max-width: 850px;
            width: 95%;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: #1e293b;
            padding: 10px;
            font-size: 12px;
            border-radius: 8px;
        }

        .tab-active {
            background: var(--primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            margin-top: 20px;
        }

        th {
            background: #0f172a;
            padding: 10px;
            text-align: left;
            color: var(--primary);
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #334155;
        }
    </style>
</head>

<body>

    <section id="scr-login" class="container">
        <h1>LOKAMIG</h1>
        <div class="sub">Vistoria e Logística de Pátio</div>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="handleLogin()">Entrar</button>
        <button class="btn-nfc" onclick="lerCrachaNFC()">📲 ACESSAR VIA CRACHÁ</button>
    </section>

    <section id="scr-welcome" class="container hidden">
        <h1>BEM-VINDO</h1>
        <div class="user-card">
            <div class="user-photo"></div>
            <div>
                <b id="user-name-display" style="font-size: 15px;">CARREGANDO...</b><br>
                <small id="user-mat-display">Matrícula: ---</small><br>
                <small id="user-id-display">Crachá: ---</small>
            </div>
        </div>
        <select id="tipo-servico">
            <option value="Saída">Checklist de Saída</option>
            <option value="Retorno">Checklist de Retorno</option>
            <option value="Manutenção">Manutenção</option>
            <option value="Limpeza">Higienização</option>
        </select>
        <button onclick="irParaCamera()">Iniciar Vistoria</button>
    </section>

    <section id="scr-camera" class="container hidden">
        <h1>CHECKLIST</h1>
        <video id="vid" autoplay playsinline></video>
        <div class="grid-check">
            <button class="btn-angle" id="f" onclick="marcar('f')">FRENTE</button>
            <button class="btn-angle" id="l" onclick="marcar('l')">LATERAL</button>
            <button class="btn-angle" id="t" onclick="marcar('t')">TRASEIRA</button>
            <button class="btn-angle" id="i" onclick="marcar('i')">INTERIOR</button>
        </div>
        <input type="text" id="placa" placeholder="PLACA DO VEÍCULO">
        <button onclick="salvarVistoria()" style="background: #10b981;">Finalizar</button>
    </section>

    <section id="scr-admin" class="container admin-box hidden">
        <h1 style="color: var(--primary);">PAINEL DE CONTROLE</h1>
        <div class="tabs">
            <button class="tab-btn tab-active" onclick="tab('monitor')">Monitoramento</button>
            <button class="tab-btn" onclick="tab('cadastro')">Cadastro Colaboradores</button>
        </div>

        <div id="tab-monitor">
            <table>
                <thead>
                    <tr>
                        <th>HORA</th>
                        <th>OPERADOR</th>
                        <th>PLACA</th>
                        <th>TIPO</th>
                        <th>STATUS</th>
                    </tr>
                </thead>
                <tbody id="logs"></tbody>
            </table>
        </div>

        <div id="tab-cadastro" class="hidden">
            <div style="background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; text-align: left;">
                <label>Nome do Colaborador</label>
                <input type="text" id="reg-nome" placeholder="Ex: Lucas Lima">
                <label>Matrícula</label>
                <input type="text" id="reg-mat" placeholder="Ex: T531971">
                <label>ID do Crachá (Aproxime do NFC ou digite)</label>
                <input type="text" id="reg-id" placeholder="Ex: 295698351">
                <button onclick="salvarColaborador()" style="background: #10b981;">Ativar e Cadastrar</button>
            </div>
        </div>

        <button onclick="location.reload()" style="background:none; margin-top:20px; color:#94a3b8;">Sair</button>
    </section>

    <script>
        const DB_KEY = 'lokamig_logs_v4';
        const USER_DB = 'lokamig_users_v4';

        // Dados Iniciais (Seu Crachá)
        if (!localStorage.getItem(USER_DB)) {
            localStorage.setItem(USER_DB, JSON.stringify([{
                nome: "LUCAS LIMA", mat: "T531971", id: "295698351"
            }]));
        }

        function show(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function tab(name) {
            document.getElementById('tab-monitor').classList.add('hidden');
            document.getElementById('tab-cadastro').classList.add('hidden');
            document.getElementById('tab-' + name).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            event.target.classList.add('tab-active');
        }

        function handleLogin() {
            const u = document.getElementById('user').value.toLowerCase();
            const p = document.getElementById('pass').value;

            if (u === 'admin' && p === '1234') {
                show('scr-admin');
                carregarLogs();
            } else {
                // Tenta login por matrícula
                const users = JSON.parse(localStorage.getItem(USER_DB));
                const found = users.find(user => user.mat.toLowerCase() === u);
                if (found) {
                    acessarApp(found);
                } else { alert("Usuário não encontrado."); }
            }
        }

        async function lerCrachaNFC() {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    alert("Aproxime o crachá do sensor NFC...");
                    await ndef.scan();
                    ndef.onreading = event => {
                        const serial = event.serialNumber.replace(/:/g, "").toUpperCase();
                        const users = JSON.parse(localStorage.getItem(USER_DB));
                        const found = users.find(u => u.id === serial);
                        if (found) acessarApp(found);
                        else alert("Crachá não cadastrado ID: " + serial);
                    };
                } catch (e) { alert("NFC não disponível ou bloqueado."); }
            } else {
                const idManual = prompt("NFC não detectado. Digite o ID do Crachá:");
                const users = JSON.parse(localStorage.getItem(USER_DB));
                const found = users.find(u => u.id === idManual);
                if (found) acessarApp(found);
                else alert("ID não cadastrado.");
            }
        }

        function acessarApp(user) {
            document.getElementById('user-name-display').textContent = user.nome;
            document.getElementById('user-mat-display').textContent = "Matrícula: " + user.mat;
            document.getElementById('user-id-display').textContent = "Crachá: " + user.id;
            show('scr-welcome');
        }

        function salvarColaborador() {
            const nome = document.getElementById('reg-nome').value;
            const mat = document.getElementById('reg-mat').value;
            const id = document.getElementById('reg-id').value;

            if (!nome || !mat || !id) return alert("Preencha todos os campos.");

            const users = JSON.parse(localStorage.getItem(USER_DB));
            users.push({ nome, mat, id });
            localStorage.setItem(USER_DB, JSON.stringify(users));
            alert("Colaborador " + nome + " cadastrado com sucesso!");
            document.getElementById('reg-nome').value = '';
            document.getElementById('reg-mat').value = '';
            document.getElementById('reg-id').value = '';
        }

        async function irParaCamera() {
            show('scr-camera');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            document.getElementById('vid').srcObject = stream;
        }

        function marcar(id) { document.getElementById(id).classList.add('done'); }

        function salvarVistoria() {
            const user = document.getElementById('user-name-display').textContent;
            const log = {
                h: new Date().toLocaleTimeString(),
                op: user,
                pl: document.getElementById('placa').value || '---',
                tp: document.getElementById('tipo-servico').value,
            };
            const logs = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
            logs.unshift(log);
            localStorage.setItem(DB_KEY, JSON.stringify(logs));
            alert("Enviado para o escritório!");
            location.reload();
        }

        function carregarLogs() {
            const logs = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
            document.getElementById('logs').innerHTML = logs.map(l => `
            <tr><td>${l.h}</td><td>${l.op}</td><td>${l.pl}</td><td>${l.tp}</td><td style="color:#10b981">● ATIVO</td></tr>
        `).join('');
        }
    </script>
</body>

</html>
