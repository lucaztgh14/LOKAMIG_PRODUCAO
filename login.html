<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOKAMIG | Gestão de Frotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d1122a;
            --bg: #0f172a;
            --text: #f8fafc;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)),
                url('Faça_uma_montagem_202604121721.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 5px;
            color: #fff;
        }

        .sub {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-nfc {
            background: #1e293b;
            margin-top: 10px;
            border: 1px dashed var(--primary);
        }

        .btn-vincular {
            background: #3b82f6;
            margin-bottom: 10px;
            font-size: 12px;
            padding: 10px;
        }

        .hidden {
            display: none !important;
        }

        /* Estilo da Tabela e Abas */
        .admin-box {
            max-width: 850px;
            width: 95%;
            height: 90vh;
            overflow-y: auto;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: #1e293b;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            color: #fff;
            cursor: pointer;
            flex: 1;
            font-size: 10px;
            font-weight: 700;
        }

        .tab-active {
            background: var(--primary);
            border-color: var(--primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            margin-top: 10px;
        }

        th {
            background: #0f172a;
            padding: 10px;
            text-align: left;
            color: var(--primary);
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #334155;
        }
    </style>
</head>

<body>

    <section id="scr-login" class="container">
        <h1>LOKAMIG</h1>
        <div class="sub">Vistoria e Logística de Pátio</div>
        <input type="text" id="user" placeholder="Usuário / Matrícula">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="handleLogin()">Entrar</button>
        <button class="btn-nfc" onclick="lerCrachaNFC('login')">📲 ACESSAR VIA CRACHÁ</button>
    </section>

    <section id="scr-admin" class="container admin-box hidden">
        <h1>PAINEL DE CONTROLE</h1>
        <div class="tabs">
            <button id="btn-tab-mon" class="tab-btn tab-active" onclick="switchTab('mon')">Monitoramento</button>
            <button id="btn-tab-cad" class="tab-btn" onclick="switchTab('cad')">Colaboradores</button>
        </div>

        <div id="area-cadastro" class="hidden">
            <div
                style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: left;">
                <label style="font-size: 10px; margin-left: 5px;">1. DIGITE A MATRÍCULA E NOME</label>
                <input type="text" id="reg-mat" placeholder="MATRÍCULA (ex: T531971)">
                <input type="text" id="reg-nome" placeholder="NOME COMPLETO">

                <label style="font-size: 10px; margin-left: 5px;">2. VINCULE O CHIP DO CRACHÁ</label>
                <button class="btn-vincular" onclick="lerCrachaNFC('vincular')">APROXIMAR CRACHÁ PARA VINCULAR</button>
                <input type="text" id="reg-id" placeholder="Código do Chip (Lido automaticamente)" readonly
                    style="color: var(--success);">

                <button onclick="salvarColaborador()" style="background: var(--success); margin-top: 10px;">SALVAR
                    CADASTRO</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>NOME</th>
                        <th>MATRÍCULA</th>
                        <th>CHIP</th>
                        <th>AÇÃO</th>
                    </tr>
                </thead>
                <tbody id="colab-body"></tbody>
            </table>
        </div>

        <div id="area-monitor">
            <table id="tbl-logs">
                <thead>
                    <tr>
                        <th>HORA</th>
                        <th>PLACA</th>
                        <th>MOTORISTA</th>
                        <th>TIPO</th>
                    </tr>
                </thead>
                <tbody id="logs-body"></tbody>
            </table>
        </div>
        <button onclick="location.reload()" class="btn-sec" style="margin-top:20px;">Sair</button>
    </section>

    <section id="scr-form" class="container hidden">
        <h1 id="display-nome">---</h1>
        <div class="sub" id="display-mat">Matrícula: ---</div>
        <input type="text" id="v-placa" placeholder="PLACA DO VEÍCULO">
        <button onclick="alert('Iniciando Fotos...')">Avançar para Fotos</button>
        <button onclick="location.reload()" class="btn-sec" style="margin-top:10px;">Cancelar</button>
    </section>

    <script>
        const USER_DB = 'lokamig_users_v5';
        const LOG_DB = 'lokamig_logs_v5';

        if (!localStorage.getItem(USER_DB)) {
            localStorage.setItem(USER_DB, JSON.stringify([{ nome: "LUCAS LIMA", mat: "T531971", id: "D3C776D2" }]));
        }

        function show(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function switchTab(t) {
            document.getElementById('area-monitor').classList.toggle('hidden', t !== 'mon');
            document.getElementById('area-cadastro').classList.toggle('hidden', t !== 'cad');
            document.getElementById('btn-tab-mon').classList.toggle('tab-active', t === 'mon');
            document.getElementById('btn-tab-cad').classList.toggle('tab-active', t === 'cad');
            if (t === 'cad') carregarListaColaboradores();
        }

        function handleLogin() {
            const u = document.getElementById('user').value.toUpperCase();
            const p = document.getElementById('pass').value;
            if (u === 'ADMIN' && p === '1234') { show('scr-admin'); carregarAdmin(); }
            else {
                const user = JSON.parse(localStorage.getItem(USER_DB)).find(x => x.mat.toUpperCase() === u);
                if (user) logar(user); else alert("Matrícula não cadastrada.");
            }
        }

        async function lerCrachaNFC(modo) {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    alert("Aproxime o crachá...");
                    ndef.onreading = event => {
                        const idLido = event.serialNumber.replace(/:/g, "").toUpperCase();

                        if (modo === 'vincular') {
                            document.getElementById('reg-id').value = idLido;
                            alert("Chip detectado: " + idLido + "\nAgora clique em Salvar Cadastro.");
                        } else {
                            const user = JSON.parse(localStorage.getItem(USER_DB)).find(u => u.id === idLido);
                            if (user) {
                                document.getElementById('user').value = user.mat;
                                logar(user);
                            } else {
                                alert("Crachá não reconhecido (ID: " + idLido + "). Cadastre-o no painel admin primeiro.");
                            }
                        }
                    };
                } catch (e) { alert("Erro NFC. Verifique as permissões."); }
            } else {
                const mock = prompt("NFC não disponível. Digite o ID do chip:");
                if (mock) {
                    if (modo === 'vincular') document.getElementById('reg-id').value = mock.toUpperCase();
                    else handleLogin();
                }
            }
        }

        function logar(user) {
            document.getElementById('display-nome').innerText = user.nome;
            document.getElementById('display-mat').innerText = "Matrícula: " + user.mat;
            show('scr-form');
        }

        function salvarColaborador() {
            const mat = document.getElementById('reg-mat').value.toUpperCase();
            const nome = document.getElementById('reg-nome').value.toUpperCase();
            const chip = document.getElementById('reg-id').value.toUpperCase();

            if (!mat || !nome || !chip) return alert("Preencha Matrícula, Nome e aproxime o Crachá!");

            const users = JSON.parse(localStorage.getItem(USER_DB));
            users.push({ nome: nome, mat: mat, id: chip });
            localStorage.setItem(USER_DB, JSON.stringify(users));

            alert("Sucesso! O crachá agora está vinculado à matrícula " + mat);
            document.getElementById('reg-mat').value = '';
            document.getElementById('reg-nome').value = '';
            document.getElementById('reg-id').value = '';
            carregarListaColaboradores();
        }

        function carregarListaColaboradores() {
            const u = JSON.parse(localStorage.getItem(USER_DB));
            document.getElementById('colab-body').innerHTML = u.map((x, i) => `
            <tr>
                <td>${x.nome}</td>
                <td>${x.mat}</td>
                <td>${x.id}</td>
                <td><button onclick="removerColaborador(${i})" style="background:var(--primary); padding:5px; font-size:9px;">X</button></td>
            </tr>
        `).join('');
        }

        function removerColaborador(i) {
            const u = JSON.parse(localStorage.getItem(USER_DB)); u.splice(i, 1);
            localStorage.setItem(USER_DB, JSON.stringify(u)); carregarListaColaboradores();
        }

        function carregarAdmin() {
            const logs = JSON.parse(localStorage.getItem(LOG_DB) || '[]');
            document.getElementById('logs-body').innerHTML = logs.map(l => `<tr><td>${l.hora}</td><td>${l.placa}</td><td>${l.op}</td><td>${l.tipo}</td></tr>`).join('');
        }
    </script>
</body>

</html>
