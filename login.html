<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOKAMIG | Gestão Operacional 360°</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <!-- Bibliotecas para PDF Profissional -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary: #d1122a;
            --bg: #0f172a;
            --text: #f8fafc;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray: #94a3b8;
            --joint: #8b5cf6;
            --return: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), url('https://images.unsplash.com/photo-1506521781263-d8422e82f27a?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            max-height: 95vh;
            overflow-y: auto;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 5px;
            color: var(--primary);
            font-weight: 700;
            letter-spacing: 2px;
        }

        .sub {
            font-size: 10px;
            color: var(--gray);
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 10px;
            transition: 0.3s;
            margin-bottom: 5px;
        }

        .btn-success {
            background: var(--success);
        }

        .btn-warning {
            background: var(--warning);
            color: #000;
        }

        .btn-danger {
            background: var(--danger);
            width: auto;
            padding: 6px 12px;
        }

        .btn-info {
            background: #3b82f6;
            width: auto;
            padding: 6px 12px;
        }

        .btn-pdf {
            background: #ff5722;
            width: auto;
            padding: 6px 12px;
        }

        .hidden {
            display: none !important;
        }

        .form-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            text-align: left;
        }

        .prog-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 5px solid var(--danger);
            font-size: 12px;
            text-align: left;
            position: relative;
        }

        .status-badge {
            padding: 3px 7px;
            border-radius: 4px;
            font-size: 8px;
            font-weight: bold;
            float: right;
            text-transform: uppercase;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }

        .tab-btn {
            background: rgba(30, 41, 59, 0.8);
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            white-space: nowrap;
            font-size: 9px;
        }

        .tab-active {
            background: var(--primary);
            font-weight: bold;
        }

        .preview-area {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 10px 0;
        }

        .photo-card {
            position: relative;
            width: 100%;
            height: 65px;
        }

        .thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 5px;
            border: 1px solid var(--primary);
        }

        .del-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 10px;
            border: 2px solid #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
            display: none;
        }
    </style>
</head>

<body>

    <section id="scr-login" class="container">
        <h1>LOKAMIG</h1>
        <div class="sub">Logística & Gestão Operacional</div>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="handleLogin()">Entrar</button>
    </section>

    <!-- ADMIN -->
    <section id="scr-admin" class="container hidden">
        <h1>ADMINISTRAÇÃO</h1>
        <div class="tabs">
            <button class="tab-btn tab-active" onclick="switchTab('monitor', event)">Monitor</button>
            <button class="tab-btn" onclick="switchTab('history', event)">Histórico</button>
            <button class="tab-btn" onclick="switchTab('forn', event)">Fornecedores</button>
            <button class="tab-btn" onclick="switchTab('config', event)">Backup</button>
        </div>
        <div id="area-monitor">
            <div id="list-prog-admin"></div>
        </div>
        <div id="area-history" class="hidden">
            <div id="list-history-admin"></div>
        </div>
        <div id="area-forn" class="hidden">
            <div id="list-forn"></div>
        </div>
        <div id="area-config" class="hidden"><button onclick="exportarDados()">📥 Exportar Backup</button></div>
        <button onclick="handleLogout()" style="background:#334155; margin-top:20px;">Sair</button>
    </section>

    <!-- TELA GESTOR (PAULISTA) -->
    <section id="scr-programador" class="container hidden">
        <h1>CHECKLIST & LANÇAMENTOS</h1>

        <div class="form-section">
            <label style="font-size: 10px; color: var(--gray);">TIPO DE OPERAÇÃO:</label>
            <select id="p-tipo-op" onchange="toggleFornSelect(this.value)">
                <option value="SAÍDA">SAÍDA (Enviar para Fornecedor)</option>
                <option value="RETORNO">RETORNO (Entrada no Pátio)</option>
            </select>

            <input type="text" id="p-placa" placeholder="PLACA">
            <input type="number" id="p-km" placeholder="KM ATUAL">

            <div id="p-forn-div">
                <label style="font-size: 10px; color: var(--gray);">FORNECEDOR DESTINO:</label>
                <select id="p-fornecedor-select"></select>
            </div>

            <textarea id="p-obs" placeholder="Relato de Avarias / Peças / Observações..."></textarea>

            <input type="file" id="p-fotos" multiple accept="image/*" class="hidden" onchange="handleNewUpload(this)">
            <button onclick="document.getElementById('p-fotos').click()" style="background:var(--joint)">📷 Tirar Fotos
                do Checklist</button>
            <div id="p-preview-fotos" class="preview-area"></div>

            <button onclick="lancarProgramacao()" class="btn-success">Finalizar Checklist</button>
        </div>

        <input type="date" id="p-filter-date" onchange="carregarProgGeral()" style="margin-bottom:10px;">
        <div id="list-prog-geral"></div>
        <button onclick="handleLogout()" style="background:#334155;">Sair</button>
    </section>

    <!-- MODAL GALERIA -->
    <div id="modal-galeria" class="modal">
        <h2 style="color:var(--primary)">Galeria do Veículo</h2>
        <p id="galeria-placa" style="font-size:12px;"></p>
        <button onclick="document.getElementById('add-more-photos').click()" class="btn-success">➕ Adicionar Mais
            Fotos</button>
        <input type="file" id="add-more-photos" multiple accept="image/*" class="hidden"
            onchange="adicionarFotosGaleria(this)">
        <div id="grid-fotos-galeria" class="preview-area" style="grid-template-columns: repeat(3, 1fr);"></div>
        <button onclick="fecharGaleria()" style="background:#334155; margin-top:20px;">Fechar Galeria</button>
    </div>

    <!-- TEMPLATE PDF (COM LOGO) -->
    <div id="pdf-template"
        style="position:fixed; left:-9999px; width:800px; background:#fff; color:#000; padding:40px;">
        <div
            style="display:flex; justify-content:space-between; align-items:center; border-bottom:4px solid #d1122a; padding-bottom:15px; margin-bottom:20px;">
            <img src="https://www.lokamig.com.br/wp-content/themes/lokamig/img/logo-lokamig.png" style="width:180px;">
            <div style="text-align:right;">
                <h2 id="pdf-titulo" style="margin:0; color:#d1122a;">RELATÓRIO DE CHECKLIST</h2>
                <p id="pdf-data-geracao" style="margin:0; font-size:12px;"></p>
            </div>
        </div>
        <div id="pdf-body" style="font-size:14px; line-height:1.6;"></div>
        <div id="pdf-photos" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:20px;"></div>
        <div style="margin-top:50px; border-top:1px solid #000; padding-top:10px; text-align:center; font-size:12px;">
            <b>Responsável Operacional:</b> <span id="pdf-programador"></span>
        </div>
    </div>

    <script>
        const DB = { prog: 'l_prog_v45', forn: 'l_forn_v45', fornUsers: 'l_fusers_v45', progs: 'l_progs_v45' };
        let tempFotos = [];
        let galeriaAtivaIdx = null;
        let programadorLogado = "Paulista";

        window.onload = () => {
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('p-filter-date').value = hoje;
            if (!localStorage.getItem(DB.progs)) {
                localStorage.setItem(DB.progs, JSON.stringify([{ "nome": "Paulista", "user": "paulista", "pass": "1234" }]));
                localStorage.setItem(DB.forn, JSON.stringify([{ "nome": "AGSN" }, { "nome": "MEGA CENTER" }, { "nome": "Lava jato Maximu's" }]));
            }
            popularSeletorFornecedores();
        };

        function toggleFornSelect(val) {
            document.getElementById('p-forn-div').classList.toggle('hidden', val === 'RETORNO');
        }

        function handleLogin() {
            const u = document.getElementById('user').value.trim().toUpperCase();
            const p = document.getElementById('pass').value.trim();
            if (u === 'ADMIN' && p === '1234') { show('scr-admin'); carregarProgAdmin(); return; }
            const gestores = JSON.parse(localStorage.getItem(DB.progs) || '[]');
            const g = gestores.find(x => x.user.toUpperCase() === u && x.pass === p);
            if (g) { programadorLogado = g.nome; show('scr-programador'); carregarProgGeral(); return; }
            alert("Acesso Negado.");
        }

        // --- GESTÃO PAULISTA ---
        function handleNewUpload(input) {
            [...input.files].forEach(file => {
                const reader = new FileReader();
                reader.onload = e => { tempFotos.push(e.target.result); renderNewPreviews(); };
                reader.readAsDataURL(file);
            });
        }
        function renderNewPreviews() {
            document.getElementById('p-preview-fotos').innerHTML = tempFotos.map((f, i) => `<div class="photo-card"><img src="${f}" class="thumb"><button class="del-btn" onclick="tempFotos.splice(${i},1); renderNewPreviews()">X</button></div>`).join('');
        }

        function lancarProgramacao() {
            const p = document.getElementById('p-placa').value.toUpperCase();
            const tipoOp = document.getElementById('p-tipo-op').value;
            if (!p) return alert("Digite a placa!");

            let list = JSON.parse(localStorage.getItem(DB.prog) || '[]');
            list.push({
                id: Date.now(),
                tipo: tipoOp,
                data: new Date().toISOString().split('T')[0],
                timestamp: new Date().toLocaleString(),
                placa: p,
                km: document.getElementById('p-km').value,
                fornecedor: tipoOp === 'RETORNO' ? 'LOKAMIG PÁTIO' : document.getElementById('p-fornecedor-select').value,
                obs: document.getElementById('p-obs').value,
                fotos: [...tempFotos],
                programador: programadorLogado,
                status_flow: tipoOp === 'RETORNO' ? 'FINALIZADO' : 'PENDENTE'
            });
            localStorage.setItem(DB.prog, JSON.stringify(list));
            tempFotos = []; renderNewPreviews();
            document.getElementById('p-placa').value = ""; document.getElementById('p-km').value = ""; document.getElementById('p-obs').value = "";
            carregarProgGeral();
            alert(tipoOp === 'RETORNO' ? "Retorno registrado!" : "Veículo enviado para fornecedor!");
        }

        function carregarProgGeral() {
            const list = JSON.parse(localStorage.getItem(DB.prog) || '[]');
            const dt = document.getElementById('p-filter-date').value;
            document.getElementById('list-prog-geral').innerHTML = list.filter(i => i.data === dt).map((i) => {
                const gIdx = list.indexOf(i);
                const isRetorno = i.tipo === 'RETORNO';
                return `
                <div class="prog-item" style="border-left-color:${isRetorno ? 'var(--return)' : 'var(--primary)'}">
                    <span class="status-badge" style="background:${isRetorno ? 'var(--return)' : 'var(--danger)'}">${isRetorno ? 'RETORNO' : i.status_flow}</span>
                    <b>🚗 ${i.placa}</b><br>
                    <small>📍 ${i.fornecedor} | 🕒 ${i.timestamp}</small><br>
                    <small style="color:var(--warning)">📝 Obs: ${i.obs || 'Nenhuma'}</small><br>
                    <div style="display:flex; gap:5px; margin-top:10px; flex-wrap:wrap;">
                        <button class="btn-info" onclick="abrirGaleria(${gIdx})">📸 FOTOS (${i.fotos.length})</button>
                        <button class="btn-pdf" onclick="gerarPDFProfissional(${gIdx})">📄 PDF</button>
                        <button class="btn-info" style="background:var(--joint)" onclick="editarObs(${gIdx})">✏️ EDITAR</button>
                        <button class="btn-danger" onclick="cancelarCarro(${gIdx})">❌ CANCELAR</button>
                    </div>
                </div>`;
            }).reverse().join('') || "Sem registros.";
        }

        // --- GALERIA & PDF ---
        function abrirGaleria(idx) { galeriaAtivaIdx = idx; const item = JSON.parse(localStorage.getItem(DB.prog))[idx]; document.getElementById('galeria-placa').innerText = `Veículo: ${item.placa}`; document.getElementById('modal-galeria').style.display = 'block'; renderGaleriaItems(); }
        function fecharGaleria() { document.getElementById('modal-galeria').style.display = 'none'; carregarProgGeral(); }
        function renderGaleriaItems() { const item = JSON.parse(localStorage.getItem(DB.prog))[galeriaAtivaIdx]; document.getElementById('grid-fotos-galeria').innerHTML = item.fotos.map((f, i) => `<div class="photo-card" style="height:120px;"><img src="${f}" class="thumb"><button class="del-btn" onclick="removerFotoGaleria(${i})">X</button></div>`).join(''); }
        function removerFotoGaleria(i) { let list = JSON.parse(localStorage.getItem(DB.prog)); list[galeriaAtivaIdx].fotos.splice(i, 1); localStorage.setItem(DB.prog, JSON.stringify(list)); renderGaleriaItems(); }
        function adicionarFotosGaleria(input) { let list = JSON.parse(localStorage.getItem(DB.prog));[...input.files].forEach(file => { const reader = new FileReader(); reader.onload = e => { list[galeriaAtivaIdx].fotos.push(e.target.result); localStorage.setItem(DB.prog, JSON.stringify(list)); renderGaleriaItems(); }; reader.readAsDataURL(file); }); }

        async function gerarPDFProfissional(idx) {
            const item = JSON.parse(localStorage.getItem(DB.prog))[idx];
            const { jsPDF } = window.jspdf;
            document.getElementById('pdf-titulo').innerText = `CHECKLIST DE ${item.tipo || 'SAÍDA'}`;
            document.getElementById('pdf-data-geracao').innerText = item.timestamp;
            document.getElementById('pdf-programador').innerText = item.programador;
            document.getElementById('pdf-body').innerHTML = `
                <p><b>PLACA DO VEÍCULO:</b> ${item.placa} &nbsp;&nbsp;&nbsp; <b>KM NO REGISTRO:</b> ${item.km || 'N/I'}</p>
                <p><b>LOCAL/FORNECEDOR:</b> ${item.fornecedor}</p>
                <p><b>OBSERVAÇÕES REGISTRADAS:</b> ${item.obs || 'Nenhuma.'}</p>
            `;
            const grid = document.getElementById('pdf-photos'); grid.innerHTML = '';
            item.fotos.forEach(f => { grid.innerHTML += `<img src="${f}" style="width:100%; border:1px solid #ddd; border-radius:5px;">`; });
            html2canvas(document.getElementById('pdf-template'), { scale: 2, useCORS: true }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const doc = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = doc.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                doc.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                doc.save(`${item.tipo}_LOKAMIG_${item.placa}.pdf`);
            });
        }

        // --- AUXILIARES ---
        function popularSeletorFornecedores() { const forns = JSON.parse(localStorage.getItem(DB.forn) || '[]'); let o = forns.map(f => `<option value="${f.nome}">${f.nome}</option>`).join(''); o += `<option value="MEGA CENTER + MAXIMU'S">🤝 Parceria</option>`; document.getElementById('p-fornecedor-select').innerHTML = o; }
        function show(id) { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function handleLogout() { show('scr-login'); }
        function editarObs(idx) { let list = JSON.parse(localStorage.getItem(DB.prog)); const n = prompt("Nova observação:", list[idx].obs); if (n !== null) { list[idx].obs = n; localStorage.setItem(DB.prog, JSON.stringify(list)); carregarProgGeral(); } }
        function cancelarCarro(idx) { if (confirm("Remover registro?")) { let list = JSON.parse(localStorage.getItem(DB.prog)); list.splice(idx, 1); localStorage.setItem(DB.prog, JSON.stringify(list)); carregarProgGeral(); } }
        function switchTab(id, e) { document.querySelectorAll('[id^="area-"]').forEach(a => a.classList.add('hidden')); document.getElementById('area-' + id).classList.remove('hidden'); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active')); if (e) e.target.classList.add('tab-active'); }
        function carregarProgAdmin() { const list = JSON.parse(localStorage.getItem(DB.prog) || '[]'); document.getElementById('list-prog-admin').innerHTML = list.map(s => `<div class="prog-item"><b>${s.placa}</b> - ${s.status_flow}</div>`).reverse().join(''); }
        function exportarDados() { const data = {}; Object.keys(DB).forEach(k => data[k] = localStorage.getItem(DB[k])); const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], { type: 'application/json' })); a.download = 'backup.json'; a.click(); }
        function renderAdminList(key) { const list = JSON.parse(localStorage.getItem(DB[key]) || '[]'); const cont = document.getElementById('list-' + key); if (cont) cont.innerHTML = list.map((i, idx) => `<div class="prog-item"><span>${i.nome || i.placa || i.mat}</span><button class="btn-danger" onclick="excluirItem('${key}',${idx})">X</button></div>`).join(''); }
        function salvarItem(k, v) { let list = JSON.parse(localStorage.getItem(DB[k]) || '[]'); list.push(v); localStorage.setItem(DB[k], JSON.stringify(list)); carregarProgAdmin(); }
        function excluirItem(k, i) { let list = JSON.parse(localStorage.getItem(DB[k])); list.splice(i, 1); localStorage.setItem(DB[k], JSON.stringify(list)); renderAdminList(k); }
        function salvarNovoFornecedor() { const n = document.getElementById('f-nome').value.trim(); if (!n) return; let list = JSON.parse(localStorage.getItem(DB.forn) || '[]'); list.push({ nome: n }); localStorage.setItem(DB.forn, JSON.stringify(list)); renderAdminList('forn'); popularSeletorFornecedores(); }
        function verDetalhesForn(n) { selectedForn = n; document.getElementById('forn-main-view').classList.add('hidden'); document.getElementById('forn-detail-view').classList.remove('hidden'); document.getElementById('view-forn-title').innerText = n; renderFornUsers(); }
        function fecharDetalhesForn() { document.getElementById('forn-main-view').classList.remove('hidden'); document.getElementById('forn-detail-view').classList.add('hidden'); }
        function renderFornUsers() { const all = JSON.parse(localStorage.getItem(DB.fornUsers) || '[]'); const f = all.filter(u => u.empresa === selectedForn); document.getElementById('list-forn-users').innerHTML = f.map(u => `<div class="prog-item">👤 ${u.user}</div>`).join(''); }
        function salvarUsuarioForn() { const u = document.getElementById('fu-user').value.trim(); const p = document.getElementById('fu-pass').value.trim(); if (!u || !p) return; let list = JSON.parse(localStorage.getItem(DB.fornUsers) || '[]'); list.push({ user: u, pass: p, empresa: selectedForn, tipo: 'Mista' }); localStorage.setItem(DB.fornUsers, JSON.stringify(list)); renderFornUsers(); }
    </script>
</body>

</html>
