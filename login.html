<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOKAMIG | Gestão de Frotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d1122a;
            --bg: #0f172a;
            --text: #f8fafc;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('Faça_uma_montagem_202604121721.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 95%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #fff;
        }

        .sub {
            font-size: 10px;
            color: #94a3b8;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 11px;
        }

        .hidden {
            display: none !important;
        }

        .form-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: left;
        }

        .prog-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid var(--primary);
            font-size: 12px;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            font-size: 9px;
            padding: 3px 6px;
            border-radius: 4px;
            background: var(--primary);
            margin-bottom: 5px;
            display: inline-block;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tab-btn {
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            color: #fff;
            cursor: pointer;
            white-space: nowrap;
            flex: 1;
            font-size: 9px;
        }

        .tab-active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .btn-del {
            background: none;
            border: none;
            color: #ff4444;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            padding: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10px;
            margin-top: 10px;
        }

        th {
            border-bottom: 1px solid var(--primary);
            padding: 8px;
            color: var(--primary);
            text-align: left;
        }

        td {
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nfc-reading {
            animation: blink 1s infinite;
            border-color: var(--warning) !important;
            color: var(--warning) !important;
        }

        @keyframes blink {
            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>

<body>

    <section id="scr-login" class="container">
        <h1>LOKAMIG</h1>
        <div class="sub">Logística & Programação</div>
        <input type="text" id="user" placeholder="Matrícula / Usuário / Clique para Crachá"
            onclick="ativarLeituraNFCLogin()">
        <input type="password" id="pass" placeholder="Senha (Se houver)">
        <button onclick="handleLogin()">Entrar</button>
        <div id="status-nfc-login" style="margin-top: 10px; font-size: 9px; color: var(--warning);" class="hidden">
            AGUARDANDO APROXIMAÇÃO DO CRACHÁ...</div>
        <div style="margin: 15px; font-size: 9px; color: #64748b;">ACESSO PARA COLABORADORES, CLIENTES E FORNECEDORES
        </div>
    </section>

    <section id="scr-admin" class="container hidden" style="max-width: 800px;">
        <h1>ADMINISTRAÇÃO</h1>
        <div class="tabs">
            <button class="tab-btn tab-active" onclick="switchTab('mon', event)">Monitoramento</button>
            <button class="tab-btn" onclick="switchTab('colab', event)">Equipe</button>
            <button class="tab-btn" onclick="switchTab('forn', event)">Fornecedores</button>
            <button class="tab-btn" onclick="switchTab('veic', event)">Veículos</button>
        </div>

        <div id="area-mon">
            <table>
                <thead>
                    <tr>
                        <th>DATA</th>
                        <th>PLACA</th>
                        <th>RESP.</th>
                        <th>TIPO</th>
                    </tr>
                </thead>
                <tbody id="list-mon"></tbody>
            </table>
        </div>

        <div id="area-colab" class="hidden">
            <div class="form-section">
                <input type="text" id="c-mat" placeholder="MATRÍCULA">
                <input type="text" id="c-nome" placeholder="NOME COMPLETO">
                <input type="text" id="c-nfc" placeholder="CLIQUE AQUI E APROXIME O CRACHÁ" readonly
                    onclick="ativarLeituraNFCCadastro()">
                <button onclick="salvarColab()" style="background:var(--success)">Cadastrar Colaborador</button>
            </div>
            <div id="list-colab"></div>
        </div>

        <div id="area-forn" class="hidden">
            <div class="form-section">
                <input type="text" id="f-nome" placeholder="NOME DA EMPRESA">
                <input type="text" id="f-user" placeholder="LOGIN">
                <input type="text" id="f-pass" placeholder="SENHA">
                <select id="f-tipo">
                    <option value="Limpeza">Limpeza</option>
                    <option value="Oficina">Oficina</option>
                </select>
                <button onclick="salvarForn()" style="background:var(--success)">Cadastrar Fornecedor</button>
            </div>
            <div id="list-forn"></div>
        </div>

        <div id="area-veic" class="hidden">
            <div class="form-section">
                <input type="text" id="v-reg-placa" placeholder="PLACA">
                <select id="v-reg-tipo">
                    <option value="Operacional">Operacional</option>
                    <option value="Reserva">Reserva</option>
                </select>
                <button onclick="salvarVeiculo()" style="background:var(--success)">Cadastrar Veículo</button>
            </div>
            <div id="list-veic"></div>
        </div>

        <button onclick="location.reload()" style="background:#334155; margin-top:10px;">Sair</button>
    </section>

    <section id="scr-cliente" class="container hidden">
        <h1>PROGRAMAÇÃO DIÁRIA</h1>
        <div class="sub">Área do Cliente</div>
        <div class="form-section">
            <input type="text" id="p-placa" placeholder="PLACA">
            <select id="p-destino">
                <option value="Limpeza">Para Limpeza</option>
                <option value="Oficina">Para Oficina</option>
            </select>
            <textarea id="p-obs" placeholder="OBSERVAÇÕES DE MANUTENÇÃO..."></textarea>
            <button onclick="lancarProgramacao()" style="background:var(--success)">Adicionar à Lista</button>
        </div>
        <div id="lista-programacao-cliente" style="max-height: 250px; overflow-y: auto;"></div>
        <button onclick="location.reload()" style="background:#334155; margin-top:20px;">Sair</button>
    </section>

    <section id="scr-form" class="container hidden">
        <h1 id="display-nome">---</h1>
        <button id="btn-ver-prog" class="btn-prog hidden" onclick="toggleProgView()">Ver Programação do Dia 📅</button>
        <div id="prog-view" class="form-section hidden"
            style="background: rgba(245, 158, 11, 0.15); border: 1px solid var(--warning);">
            <div id="prog-list-content"></div>
        </div>

        <div class="form-section">
            <input type="text" id="v-placa-check" placeholder="PLACA DO VEÍCULO">
            <input type="number" id="v-km" placeholder="KM ATUAL">
            <textarea id="v-obs-check" placeholder="Relatório do serviço..."></textarea>
            <button onclick="finalizarChecklist()">Finalizar e Salvar</button>
        </div>
        <button onclick="location.reload()" style="background:#334155;">Sair</button>
    </section>

    <script>
        const DB = { colab: 'l_colab_v7', forn: 'l_forn_v7', veic: 'l_veic_v7', prog: 'l_prog_v7', logs: 'l_logs_v7' };
        const CLIENTE_USER = { user: "CLIENTE", pass: "LOKAMIG2026", nome: "CLIENTE MASTER" };

        function handleLogin() {
            const u = document.getElementById('user').value.toUpperCase();
            const p = document.getElementById('pass').value;

            if (u === 'ADMIN' && p === '1234') { show('scr-admin'); carregarLogs(); return; }
            if (u === CLIENTE_USER.user && p === CLIENTE_USER.pass) { show('scr-cliente'); carregarProgCliente(); return; }

            const colabs = JSON.parse(localStorage.getItem(DB.colab) || '[]');
            const colab = colabs.find(c => c.mat === u || c.nfc === u);
            if (colab) { logar(colab, 'COLABORADOR'); return; }

            const forn = JSON.parse(localStorage.getItem(DB.forn) || '[]').find(f => f.user.toUpperCase() === u && f.pass === p);
            if (forn) { logar(forn, 'FORNECEDOR'); return; }

            alert("Acesso Negado.");
        }

        function logar(user, tipo) {
            window.sessao = { user, tipo };
            document.getElementById('display-nome').innerText = user.nome;
            show('scr-form');
            if (tipo === 'FORNECEDOR') {
                document.getElementById('btn-ver-prog').classList.remove('hidden');
            }
        }

        // NFC LOGIC
        async function ativarLeituraNFCLogin() {
            if (!('NDEFReader' in window)) return;
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                document.getElementById('user').classList.add('nfc-reading');
                document.getElementById('status-nfc-login').classList.remove('hidden');
                ndef.onreading = event => {
                    document.getElementById('user').value = event.serialNumber.toUpperCase();
                    handleLogin();
                };
            } catch (e) { console.error(e); }
        }

        async function ativarLeituraNFCCadastro() {
            const campo = document.getElementById('c-nfc');
            if (!('NDEFReader' in window)) { alert("NFC não suportado."); return; }
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                campo.classList.add('nfc-reading');
                campo.value = "AGUARDANDO...";
                ndef.onreading = event => {
                    campo.value = event.serialNumber.toUpperCase();
                    campo.classList.remove('nfc-reading');
                };
            } catch (e) { alert(e); }
        }

        // ADMIN - EXCLUIR GERAL
        function excluirItem(tipoDB, idProp, idValor) {
            if (!confirm("Deseja realmente excluir este item?")) return;
            let d = JSON.parse(localStorage.getItem(tipoDB) || '[]');
            d = d.filter(item => item[idProp] !== idValor);
            localStorage.setItem(tipoDB, JSON.stringify(d));
            // Recarregar a lista correta
            if (tipoDB === DB.colab) carregarListaColab();
            if (tipoDB === DB.forn) carregarListaForn();
            if (tipoDB === DB.veic) carregarListaVeic();
        }

        // LOGICA CADASTROS
        function salvarColab() {
            const d = JSON.parse(localStorage.getItem(DB.colab) || '[]');
            d.push({ mat: document.getElementById('c-mat').value.toUpperCase(), nome: document.getElementById('c-nome').value, nfc: document.getElementById('c-nfc').value.toUpperCase() });
            localStorage.setItem(DB.colab, JSON.stringify(d));
            carregarListaColab();
            document.getElementById('c-mat').value = ''; document.getElementById('c-nome').value = ''; document.getElementById('c-nfc').value = '';
        }
        function carregarListaColab() {
            const d = JSON.parse(localStorage.getItem(DB.colab) || '[]');
            document.getElementById('list-colab').innerHTML = d.map(x => `<div class="prog-item"><span>${x.nome} (ID: ${x.nfc || x.mat})</span><button class="btn-del" onclick="excluirItem(DB.colab, 'mat', '${x.mat}')">×</button></div>`).join('');
        }
        function salvarForn() {
            const f = JSON.parse(localStorage.getItem(DB.forn) || '[]');
            f.push({ nome: document.getElementById('f-nome').value, user: document.getElementById('f-user').value, pass: document.getElementById('f-pass').value, tipo: document.getElementById('f-tipo').value });
            localStorage.setItem(DB.forn, JSON.stringify(f)); carregarListaForn();
            document.getElementById('f-nome').value = ''; document.getElementById('f-user').value = ''; document.getElementById('f-pass').value = '';
        }
        function carregarListaForn() {
            const f = JSON.parse(localStorage.getItem(DB.forn) || '[]');
            document.getElementById('list-forn').innerHTML = f.map(x => `<div class="prog-item"><span>${x.nome} (${x.tipo})</span><button class="btn-del" onclick="excluirItem(DB.forn, 'user', '${x.user}')">×</button></div>`).join('');
        }
        function salvarVeiculo() {
            const d = JSON.parse(localStorage.getItem(DB.veic) || '[]');
            const placa = document.getElementById('v-reg-placa').value.toUpperCase();
            d.push({ placa: placa, tipo: document.getElementById('v-reg-tipo').value });
            localStorage.setItem(DB.veic, JSON.stringify(d)); carregarListaVeic();
            document.getElementById('v-reg-placa').value = '';
        }
        function carregarListaVeic() {
            const d = JSON.parse(localStorage.getItem(DB.veic) || '[]');
            document.getElementById('list-veic').innerHTML = d.map(x => `<div class="prog-item"><span>${x.placa} - ${x.tipo}</span><button class="btn-del" onclick="excluirItem(DB.veic, 'placa', '${x.placa}')">×</button></div>`).join('');
        }
        function carregarLogs() {
            const d = JSON.parse(localStorage.getItem(DB.logs) || '[]');
            document.getElementById('list-mon').innerHTML = d.map(x => `<tr><td>${x.data}</td><td>${x.placa}</td><td>${x.user}</td><td>${x.tipo}</td></tr>`).join('');
        }

        // CLIENTE
        function lancarProgramacao() {
            const p = document.getElementById('p-placa').value.toUpperCase();
            if (!p) return;
            const d = JSON.parse(localStorage.getItem(DB.prog) || '[]');
            d.push({ id: Date.now(), placa: p, destino: document.getElementById('p-destino').value, obs: document.getElementById('p-obs').value });
            localStorage.setItem(DB.prog, JSON.stringify(d)); carregarProgCliente();
            document.getElementById('p-placa').value = ''; document.getElementById('p-obs').value = '';
        }
        function carregarProgCliente() {
            const d = JSON.parse(localStorage.getItem(DB.prog) || '[]');
            document.getElementById('lista-programacao-cliente').innerHTML = d.map(i => `<div class="prog-item"><div><div class="badge">${i.destino}</div> <b>${i.placa}</b></div><button class="btn-del" onclick="cancelarProg(${i.id})">×</button></div>`).join('');
        }
        function cancelarProg(id) {
            if (!confirm("Remover da programação?")) return;
            let d = JSON.parse(localStorage.getItem(DB.prog));
            localStorage.setItem(DB.prog, JSON.stringify(d.filter(i => i.id !== id))); carregarProgCliente();
        }

        function finalizarChecklist() {
            const p = document.getElementById('v-placa-check').value.toUpperCase();
            const logs = JSON.parse(localStorage.getItem(DB.logs) || '[]');
            logs.push({ data: new Date().toLocaleString(), placa: p, user: window.sessao.user.nome, tipo: window.sessao.tipo });
            localStorage.setItem(DB.logs, JSON.stringify(logs));
            alert("Checklist Salvo!"); location.reload();
        }

        function show(id) { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function switchTab(t, e) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            e.target.classList.add('tab-active');
            document.getElementById('area-mon').classList.toggle('hidden', t !== 'mon');
            document.getElementById('area-colab').classList.toggle('hidden', t !== 'colab');
            document.getElementById('area-forn').classList.toggle('hidden', t !== 'forn');
            document.getElementById('area-veic').classList.toggle('hidden', t !== 'veic');
            if (t === 'colab') carregarListaColab();
            if (t === 'forn') carregarListaForn();
            if (t === 'veic') carregarListaVeic();
        }
        function toggleProgView() {
            const box = document.getElementById('prog-view'); box.classList.toggle('hidden');
            const lista = JSON.parse(localStorage.getItem(DB.prog) || '[]').filter(i => i.destino === window.sessao.user.tipo);
            document.getElementById('prog-list-content').innerHTML = lista.map(i => `<div style="margin-bottom:10px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:5px;"><b>${i.placa}</b><br><small>${i.obs}</small></div>`).join('');
        }
    </script>
</body>

</html>
