<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOKAMIG | Gestão de Frotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d1122a;
            --bg: #0f172a;
            --text: #f8fafc;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray: #64748b;
            --card: rgba(30, 41, 59, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('Faça_uma_montagem_202604121721.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 95%;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #fff;
            text-transform: uppercase;
        }

        .sub {
            font-size: 10px;
            color: #94a3b8;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 11px;
            margin-bottom: 10px;
        }

        .hidden {
            display: none !important;
        }

        .form-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: left;
        }

        /* Itens de Programação */
        .prog-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 6px solid var(--warning);
            font-size: 11px;
            text-align: left;
        }

        .status-cancelado {
            border-left-color: var(--gray);
            opacity: 0.6;
        }

        .status-concluido {
            border-left-color: var(--success);
        }

        /* Orçamento */
        .orc-item {
            display: flex;
            gap: 5px;
            margin-bottom: 5px;
        }

        .total-box {
            background: var(--success);
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 10px;
            text-align: right;
        }

        .btn-add {
            background: var(--gray);
            padding: 8px;
            font-size: 9px;
            width: auto;
        }

        input[type="file"] {
            display: none;
        }

        .file-label {
            display: block;
            background: #334155;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 10px;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

    <section id="scr-login" class="container">
        <h1>LOKAMIG</h1>
        <div class="sub">Logística & Programação</div>
        <input type="text" id="user" placeholder="USUÁRIO">
        <input type="password" id="pass" placeholder="SENHA">
        <button onclick="handleLogin()">Entrar</button>
    </section>

    <section id="scr-form" class="container hidden">
        <h1 id="display-nome">FORNECEDOR</h1>
        <div class="form-section">
            <div class="sub">Consultar Programação:</div>
            <input type="date" id="filtro-data-forn">
            <button onclick="abrirModalProg()" style="background: var(--warning); color: #000;">📋 ACESSAR
                VEÍCULOS</button>
            <button onclick="abrirModalOrcamento()" style="background: #fff; color: #000;">💰 GERAR ORÇAMENTO</button>
        </div>
        <button onclick="location.reload()" style="background:#334155;">Sair</button>
    </section>

    <section id="scr-modal-prog" class="container hidden"
        style="position: fixed; z-index: 100; height: 95vh; overflow-y: auto; top: 2.5vh;">
        <h1>VEÍCULOS DO DIA</h1>
        <div id="prog-list-forn"></div>
        <button onclick="show('scr-form')" style="background: #334155;">Voltar</button>
    </section>

    <section id="scr-modal-orc" class="container hidden"
        style="position: fixed; z-index: 101; height: 95vh; overflow-y: auto; top: 2.5vh;">
        <h1>NOVO ORÇAMENTO</h1>
        <div class="form-section">
            <input type="text" id="orc-cnpj" placeholder="CNPJ DO FORNECEDOR">
            <input type="text" id="orc-endereco" placeholder="ENDEREÇO COMPLETO">
            <input type="text" id="orc-placa" placeholder="PLACA DO VEÍCULO">

            <div class="sub">PEÇAS E SERVIÇOS:</div>
            <div id="orc-itens-container">
                <div class="orc-item">
                    <input type="text" placeholder="Item" style="flex: 2; margin-bottom:0;">
                    <input type="number" class="valor-item" placeholder="R$" style="flex: 1; margin-bottom:0;"
                        oninput="calcularOrcamento()">
                </div>
            </div>
            <button class="btn-add" onclick="addLinhaOrcamento()">+ Adicionar Item</button>

            <div class="total-box">TOTAL: R$ <span id="orc-total">0,00</span></div>

            <div class="sub" style="margin-top:15px;">FOTO DA PEÇA / NOTA:</div>
            <label class="file-label" for="orc-foto">📸 ANEXAR FOTO</label>
            <input type="file" id="orc-foto">

            <button onclick="salvarOrcamento()" style="background:var(--success); margin-top:10px;">ENVIAR PARA
                APROVAÇÃO</button>
        </div>
        <button onclick="show('scr-form')" style="background: #334155;">Cancelar</button>
    </section>

    <script>
        const DB = { prog: 'l_prog_v7', forn: 'l_forn_v7' };

        function handleLogin() {
            const u = document.getElementById('user').value.toUpperCase();
            const p = document.getElementById('pass').value;
            if (u === 'ADMIN') { show('scr-admin'); return; }
            const forn = JSON.parse(localStorage.getItem(DB.forn) || '[]').find(f => f.user.toUpperCase() === u && f.pass === p);
            if (forn) { logar(forn, 'FORNECEDOR'); return; }
            alert("Acesso Negado.");
        }

        function logar(user, tipo) {
            window.sessao = { user, tipo };
            document.getElementById('display-nome').innerText = user.nome;
            document.getElementById('filtro-data-forn').value = new Date().toISOString().split('T')[0];
            show('scr-form');
        }

        function abrirModalProg() { show('scr-modal-prog'); carregarProgFornecedor(); }

        function abrirModalOrcamento() {
            show('scr-modal-orc');
            // Reset campos
            document.getElementById('orc-itens-container').innerHTML = `
            <div class="orc-item">
                <input type="text" placeholder="Item" style="flex: 2; margin-bottom:0;">
                <input type="number" class="valor-item" placeholder="R$" style="flex: 1; margin-bottom:0;" oninput="calcularOrcamento()">
            </div>`;
            calcularOrcamento();
        }

        function addLinhaOrcamento() {
            const div = document.createElement('div');
            div.className = 'orc-item';
            div.innerHTML = `
            <input type="text" placeholder="Item" style="flex: 2; margin-bottom:0;">
            <input type="number" class="valor-item" placeholder="R$" style="flex: 1; margin-bottom:0;" oninput="calcularOrcamento()">
        `;
            document.getElementById('orc-itens-container').appendChild(div);
        }

        function calcularOrcamento() {
            let total = 0;
            document.querySelectorAll('.valor-item').forEach(input => {
                total += Number(input.value) || 0;
            });
            document.getElementById('orc-total').innerText = total.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        }

        function salvarOrcamento() {
            alert("Orçamento enviado com sucesso para a LOKAMIG!");
            show('scr-form');
        }

        function carregarProgFornecedor() {
            const dataBusca = document.getElementById('filtro-data-forn').value;
            const dados = JSON.parse(localStorage.getItem(DB.prog) || '[]').filter(x => x.data === dataBusca && x.destino === window.sessao.user.tipo);
            const lista = document.getElementById('prog-list-forn');
            lista.innerHTML = dados.length === 0 ? "<div class='sub'>Nenhum veículo encontrado.</div>" : dados.map(i => `
            <div class="prog-item ${i.status === 'CANCELADO' ? 'status-cancelado' : ''}">
                <div style="display:flex; justify-content:space-between">
                    <b>${i.placa}</b>
                    <span>${i.hora || '--:--'}</span>
                </div>
                <div class="obs-box">OBS: ${i.obs}</div>
                <div style="margin-top:10px; font-weight:bold; color:${i.status === 'CANCELADO' ? 'var(--danger)' : 'var(--warning)'}">
                    ${i.status === 'CANCELADO' ? '⚠️ CANCELADO' : 'STATUS: ' + i.status}
                </div>
            </div>
        `).join('');
        }

        function show(id) { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
    </script>
</body>

</html>
