<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOKAMIG | Gestão de Frotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d1122a;
            --bg: #0f172a;
            --text: #f8fafc;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)),
                url('Faça_uma_montagem_202604121721.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 5px;
            color: #fff;
        }

        .sub {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-nfc {
            background: #1e293b;
            margin-top: 10px;
            border: 1px dashed var(--primary);
        }

        .btn-vincular {
            background: #3b82f6;
            margin-bottom: 10px;
            font-size: 12px;
            padding: 10px;
        }

        .hidden {
            display: none !important;
        }

        /* Estilo Admin */
        .admin-box {
            max-width: 850px;
            width: 95%;
            height: 90vh;
            overflow-y: auto;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tab-btn {
            background: #1e293b;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            color: #fff;
            cursor: pointer;
            flex: 1;
            font-size: 10px;
            font-weight: 700;
            min-width: 100px;
        }

        .tab-active {
            background: var(--primary);
            border-color: var(--primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            margin-top: 10px;
        }

        th {
            background: #0f172a;
            padding: 10px;
            text-align: left;
            color: var(--primary);
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #334155;
            cursor: pointer;
        }

        /* Dossiê */
        .modal-detalhes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }

        .photo-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 5px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .photo-card img {
            width: 100%;
            border-radius: 5px;
        }

        .search-box {
            position: relative;
            width: 100%;
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: #1e293b;
            border-radius: 0 0 12px 12px;
            z-index: 100;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid var(--primary);
            border-top: none;
            display: none;
        }

        .search-item {
            padding: 12px;
            border-bottom: 1px solid #334155;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
        }

        .search-item:hover {
            background: var(--primary);
        }
    </style>
</head>

<body>

    <section id="scr-login" class="container">
        <h1>LOKAMIG</h1>
        <div class="sub">Vistoria e Logística de Pátio</div>
        <input type="text" id="user" placeholder="Usuário / Matrícula">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="handleLogin()">Entrar</button>
        <button class="btn-nfc" onclick="lerCrachaNFC('login')">📲 ACESSAR VIA CRACHÁ</button>
    </section>

    <section id="scr-admin" class="container admin-box hidden">
        <h1>PAINEL DE CONTROLE</h1>
        <div class="tabs">
            <button id="btn-tab-mon" class="tab-btn tab-active" onclick="switchTab('mon')">Monitoramento</button>
            <button id="btn-tab-cad" class="tab-btn" onclick="switchTab('cad')">Colaboradores</button>
            <button id="btn-tab-veic" class="tab-btn" onclick="switchTab('veic')">Veículos</button>
        </div>

        <div id="area-cadastro" class="hidden">
            <div
                style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: left;">
                <input type="text" id="reg-mat" placeholder="MATRÍCULA">
                <input type="text" id="reg-nome" placeholder="NOME COMPLETO">
                <button class="btn-vincular" onclick="lerCrachaNFC('vincular')">APROXIMAR CRACHÁ PARA VINCULAR</button>
                <input type="text" id="reg-id" placeholder="Código do Chip" readonly style="color: var(--success);">
                <button onclick="salvarColaborador()" style="background: var(--success);">SALVAR CADASTRO</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>NOME</th>
                        <th>MATRÍCULA</th>
                        <th>CHIP</th>
                        <th>AÇÃO</th>
                    </tr>
                </thead>
                <tbody id="colab-body"></tbody>
            </table>
        </div>

        <div id="area-veiculos" class="hidden">
            <div
                style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: left;">
                <input type="text" id="v-reg-placa" placeholder="PLACA (ex: ABC1234)">
                <select id="v-reg-tipo">
                    <option value="Operacional">Operacional</option>
                    <option value="Gerencial">Gerencial</option>
                    <option value="Reserva">Reserva</option>
                </select>
                <button onclick="salvarVeiculo()" style="background: var(--success);">CADASTRAR VEÍCULO</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>PLACA</th>
                        <th>TIPO</th>
                        <th>AÇÃO</th>
                    </tr>
                </thead>
                <tbody id="veic-body"></tbody>
            </table>
        </div>

        <div id="area-monitor">
            <table>
                <thead>
                    <tr>
                        <th>HORA</th>
                        <th>PLACA</th>
                        <th>MOTORISTA</th>
                        <th>TIPO</th>
                    </tr>
                </thead>
                <tbody id="logs-body"></tbody>
            </table>
        </div>
        <button onclick="location.reload()" style="background:#334155; margin-top:20px;">Sair</button>
    </section>

    <section id="scr-form" class="container hidden">
        <h1 id="display-nome">---</h1>
        <div class="sub" id="display-mat">Matrícula: ---</div>

        <select id="v-tipo-select" onchange="limparBuscaVeiculo()">
            <option value="Operacional">Frota Operacional</option>
            <option value="Gerencial">Frota Gerencial</option>
            <option value="Reserva">Veículo Reserva</option>
        </select>

        <div class="search-box">
            <input type="text" id="v-search-placa" placeholder="DIGITE A PLACA..." onkeyup="filtrarVeiculos()"
                autocomplete="off">
            <div id="search-results" class="search-results"></div>
        </div>

        <input type="number" id="v-km" placeholder="KM ATUAL">
        <select id="v-comb">
            <option value="Vazio">Nível Combustível: Vazio</option>
            <option value="1/4">1/4</option>
            <option value="1/2">1/2</option>
            <option value="3/4">3/4</option>
            <option value="Cheio">Cheio</option>
        </select>
        <textarea id="v-obs" placeholder="Observações..."></textarea>
        <button onclick="alert('Iniciando Fotos...')">Avançar para Fotos</button>
    </section>

    <script>
        const USER_DB = 'lokamig_users_v5';
        const LOG_DB = 'lokamig_logs_v5';
        const VEIC_DB = 'lokamig_veiculos_v1';

        if (!localStorage.getItem(VEIC_DB)) localStorage.setItem(VEIC_DB, JSON.stringify([]));
        if (!localStorage.getItem(USER_DB)) localStorage.setItem(USER_DB, JSON.stringify([{ nome: "LUCAS LIMA", mat: "T531971", id: "D3C776D2" }]));

        function show(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function switchTab(t) {
            document.getElementById('area-monitor').classList.toggle('hidden', t !== 'mon');
            document.getElementById('area-cadastro').classList.toggle('hidden', t !== 'cad');
            document.getElementById('area-veiculos').classList.toggle('hidden', t !== 'veic');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            event.target.classList.add('tab-active');
            if (t === 'cad') carregarListaColaboradores();
            if (t === 'veic') carregarListaVeiculos();
        }

        // Lógica de Veículos
        function salvarVeiculo() {
            const p = document.getElementById('v-reg-placa').value.toUpperCase();
            const t = document.getElementById('v-reg-tipo').value;
            if (!p) return alert("Digite a placa!");
            const v = JSON.parse(localStorage.getItem(VEIC_DB));
            v.push({ placa: p, tipo: t });
            localStorage.setItem(VEIC_DB, JSON.stringify(v));
            document.getElementById('v-reg-placa').value = '';
            carregarListaVeiculos();
        }

        function carregarListaVeiculos() {
            const v = JSON.parse(localStorage.getItem(VEIC_DB));
            document.getElementById('veic-body').innerHTML = v.map((x, i) => `<tr><td>${x.placa}</td><td>${x.tipo}</td><td><button onclick="removerVeiculo(${i})" style="background:var(--primary); padding:5px;">X</button></td></tr>`).join('');
        }

        function removerVeiculo(i) {
            const v = JSON.parse(localStorage.getItem(VEIC_DB)); v.splice(i, 1);
            localStorage.setItem(VEIC_DB, JSON.stringify(v)); carregarListaVeiculos();
        }

        // Busca de Veículos no Checklist
        function filtrarVeiculos() {
            const input = document.getElementById('v-search-placa').value.toUpperCase();
            const tipo = document.getElementById('v-tipo-select').value;
            const resBox = document.getElementById('search-results');
            const veiculos = JSON.parse(localStorage.getItem(VEIC_DB)).filter(v => v.tipo === tipo && v.placa.includes(input));

            if (veiculos.length > 0 && input !== "") {
                resBox.style.display = 'block';
                resBox.innerHTML = veiculos.map(v => `<div class="search-item" onclick="selecionarVeiculo('${v.placa}')">${v.placa}</div>`).join('');
            } else {
                resBox.style.display = 'none';
            }
        }

        function selecionarVeiculo(placa) {
            document.getElementById('v-search-placa').value = placa;
            document.getElementById('search-results').style.display = 'none';
        }

        function limparBuscaVeiculo() {
            document.getElementById('v-search-placa').value = '';
            document.getElementById('search-results').style.display = 'none';
        }

        // (Lógicas de Login, NFC e Admin mantidas conforme os pedidos anteriores)
        function handleLogin() {
            const u = document.getElementById('user').value.toUpperCase();
            const p = document.getElementById('pass').value;
            if (u === 'ADMIN' && p === '1234') { show('scr-admin'); carregarAdmin(); }
            else {
                const user = JSON.parse(localStorage.getItem(USER_DB)).find(x => x.mat.toUpperCase() === u);
                if (user) logar(user); else alert("Matrícula não cadastrada.");
            }
        }

        async function lerCrachaNFC(modo) {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader(); await ndef.scan();
                    alert("Aproxime o crachá...");
                    ndef.onreading = event => {
                        const idLido = event.serialNumber.replace(/:/g, "").toUpperCase();
                        if (modo === 'vincular') document.getElementById('reg-id').value = idLido;
                        else {
                            const user = JSON.parse(localStorage.getItem(USER_DB)).find(u => u.id === idLido);
                            if (user) logar(user); else alert("ID não vinculado.");
                        }
                    };
                } catch (e) { alert("NFC Erro."); }
            }
        }

        function logar(user) {
            document.getElementById('display-nome').innerText = user.nome;
            document.getElementById('display-mat').innerText = "Matrícula: " + user.mat;
            show('scr-form');
        }

        function salvarColaborador() {
            const m = document.getElementById('reg-mat').value.toUpperCase(), n = document.getElementById('reg-nome').value.toUpperCase(), c = document.getElementById('reg-id').value.toUpperCase();
            if (!m || !n || !c) return alert("Preencha tudo!");
            const u = JSON.parse(localStorage.getItem(USER_DB));
            u.push({ nome: n, mat: m, id: c });
            localStorage.setItem(USER_DB, JSON.stringify(u));
            carregarListaColaboradores();
        }

        function carregarListaColaboradores() {
            const u = JSON.parse(localStorage.getItem(USER_DB));
            document.getElementById('colab-body').innerHTML = u.map((x, i) => `<tr><td>${x.nome}</td><td>${x.mat}</td><td>${x.id}</td><td><button onclick="removerColaborador(${i})" style="background:var(--primary); padding:5px;">X</button></td></tr>`).join('');
        }

        function carregarAdmin() {
            const logs = JSON.parse(localStorage.getItem(LOG_DB) || '[]');
            document.getElementById('logs-body').innerHTML = logs.map(l => `<tr><td>${l.hora}</td><td>${l.placa}</td><td>${l.op}</td><td>${l.tipo || 'Vistoria'}</td></tr>`).join('');
        }
    </script>
</body>

</html>
