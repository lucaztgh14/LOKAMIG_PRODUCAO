<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOKAMIG | Gestão de Frotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d1122a;
            --bg: #0f172a;
            --text: #f8fafc;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('Faça_uma_montagem_202604121721.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 95%;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #fff;
        }

        .sub {
            font-size: 10px;
            color: #94a3b8;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 11px;
        }

        .hidden {
            display: none !important;
        }

        .form-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: left;
        }

        .prog-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 6px solid var(--warning);
            font-size: 11px;
            display: flex;
            flex-direction: column;
        }

        .status-pendente {
            border-left-color: var(--warning);
        }

        .status-execucao {
            border-left-color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .status-concluido {
            border-left-color: var(--success);
            background: rgba(16, 185, 129, 0.1);
        }

        .status-cancelado {
            border-left-color: var(--gray);
            background: rgba(100, 116, 139, 0.2);
            opacity: 0.7;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tab-btn {
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            color: #fff;
            cursor: pointer;
            white-space: nowrap;
            flex: 1;
            font-size: 9px;
        }

        .tab-active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .obs-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 5px;
            margin-top: 5px;
            font-size: 10px;
            color: #cbd5e1;
            border-left: 2px solid var(--primary);
            width: 100%;
        }

        .photo-area {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            border: 1px dashed #64748b;
            text-align: center;
            width: 100%;
        }

        input[type="file"] {
            display: none;
        }

        .file-label {
            display: block;
            background: #334155;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 10px;
            margin-bottom: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 10px;
            margin-top: 10px;
            color: #fff;
        }

        th {
            border-bottom: 1px solid var(--primary);
            padding: 8px;
            text-align: left;
            color: var(--primary);
        }

        td {
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Estilos Novos do Orçamento integrados ao seu CSS */
        .orc-row {
            display: flex;
            gap: 5px;
            margin-bottom: 8px;
        }

        .total-box {
            background: var(--success);
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            margin: 10px 0;
            text-align: center;
        }
    </style>
</head>

<body>

    <section id="scr-login" class="container">
        <h1>LOKAMIG</h1>
        <div class="sub">Logística & Programação</div>
        <input type="text" id="user" placeholder="Matrícula / Usuário / Crachá">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="handleLogin()">Entrar</button>
    </section>

    <section id="scr-admin" class="container hidden" style="max-width: 800px;">
        <h1>ADMINISTRAÇÃO</h1>
        <div class="tabs">
            <button class="tab-btn tab-active" onclick="switchTab('prog-view-admin', event)">Programação</button>
            <button class="tab-btn" onclick="switchTab('mon', event)">Monitoramento</button>
            <button class="tab-btn" onclick="switchTab('colab', event)">Equipe</button>
            <button class="tab-btn" onclick="switchTab('forn', event)">Fornecedores</button>
            <button class="tab-btn" onclick="switchTab('veic', event)">Veículos</button>
        </div>
        <div id="area-prog-view-admin">
            <input type="date" id="filtro-data-admin" onchange="carregarProgAdmin()">
            <div id="list-prog-admin"></div>
        </div>
        <div id="area-mon" class="hidden">
            <table>
                <thead>
                    <tr>
                        <th>DATA</th>
                        <th>PLACA</th>
                        <th>RESP.</th>
                        <th>TIPO</th>
                    </tr>
                </thead>
                <tbody id="list-mon"></tbody>
            </table>
        </div>
        <div id="area-colab" class="hidden">
            <div class="form-section"><input type="text" id="c-mat" placeholder="MATRÍCULA"><input type="text"
                    id="c-nome" placeholder="NOME COMPLETO"><input type="text" id="c-nfc" placeholder="NFC ID" readonly
                    onclick="alert('Aproxime o cartão')"><button onclick="salvarColab()"
                    style="background:var(--success)">Cadastrar</button></div>
            <div id="list-colab"></div>
        </div>
        <div id="area-forn" class="hidden">
            <div class="form-section"><input type="text" id="f-nome" placeholder="EMPRESA"><input type="text"
                    id="f-user" placeholder="LOGIN"><input type="text" id="f-pass" placeholder="SENHA"><select
                    id="f-tipo">
                    <option value="Limpeza">Limpeza</option>
                    <option value="Oficina">Oficina</option>
                </select><button onclick="salvarForn()" style="background:var(--success)">Cadastrar</button></div>
            <div id="list-forn"></div>
        </div>
        <div id="area-veic" class="hidden">
            <div class="form-section"><input type="text" id="v-reg-placa" placeholder="PLACA"><select id="v-reg-tipo">
                    <option value="Operacional">Operacional</option>
                    <option value="Reserva">Reserva</option>
                    <option value="Gerencial">Gerencial</option>
                </select><button onclick="salvarVeiculo()" style="background:var(--success)">Cadastrar</button></div>
            <div id="list-veic"></div>
        </div>
        <button onclick="location.reload()" style="background:#334155; margin-top:10px;">Sair</button>
    </section>

    <section id="scr-cliente" class="container hidden">
        <h1>PROGRAMAÇÃO DIÁRIA</h1>
        <div class="sub">Área do Cliente</div>
        <div class="form-section">
            <input type="text" id="p-placa" placeholder="PLACA">
            <select id="p-destino">
                <option value="Limpeza">Limpeza</option>
                <option value="Oficina">Oficina</option>
            </select>
            <textarea id="p-obs" placeholder="Observações..."></textarea>
            <button onclick="lancarProgramacao()" style="background:var(--success)">Lançar Agenda</button>
        </div>
        <div id="lista-programacao-cliente"></div>
        <button onclick="location.reload()" style="background:#334155; margin-top:20px;">Sair</button>
    </section>

    <section id="scr-form" class="container hidden">
        <h1 id="display-nome">---</h1>
        <div id="btn-container-forn" class="hidden">
            <div class="form-section">
                <input type="date" id="filtro-data-forn" onchange="carregarProgFornecedor()">
                <button onclick="abrirModalProg()"
                    style="background: var(--warning); color: #000; margin-bottom: 10px;">📋 ACESSAR VEÍCULOS</button>
                <button onclick="show('scr-orcamento')" style="background: #fff; color: #000;">💰 GERAR
                    ORÇAMENTO</button>
            </div>
        </div>
        <div class="form-section">
            <input type="text" id="v-placa-check" placeholder="PLACA VISTORIA">
            <button onclick="alert('Checklist salvo!')" style="background: var(--success)">Salvar Checklist</button>
        </div>
        <button onclick="location.reload()" style="background:#334155;">Sair</button>
    </section>

    <section id="scr-orcamento" class="container hidden"
        style="position: fixed; z-index: 101; height: 95vh; overflow-y: auto; top: 2.5vh;">
        <h1>NOVO ORÇAMENTO</h1>
        <div class="form-section">
            <input type="text" placeholder="CNPJ DO FORNECEDOR">
            <input type="text" placeholder="ENDEREÇO COMPLETO">
            <input type="text" placeholder="PLACA DO VEÍCULO">
            <div id="orc-itens">
                <div class="orc-row">
                    <input type="text" placeholder="Item" style="flex:2; margin:0;">
                    <input type="number" class="v-item" placeholder="R$" style="flex:1; margin:0;"
                        oninput="calcTotal()">
                </div>
            </div>
            <button onclick="addItem()" style="background:var(--gray); padding:5px; font-size:9px; margin-top:5px;">+
                Adicionar Peça</button>
            <div class="total-box">TOTAL: R$ <span id="total-orc">0,00</span></div>
            <label class="file-label" for="foto-orc">📸 FOTO DA PEÇA / NOTA</label>
            <input type="file" id="foto-orc">
            <button onclick="alert('Orçamento enviado!'); show('scr-form')" style="background:var(--success)">Enviar
                Orçamento</button>
        </div>
        <button onclick="show('scr-form')" style="background:#334155;">Voltar</button>
    </section>

    <section id="scr-modal-prog" class="container hidden"
        style="position: fixed; z-index: 100; height: 95vh; overflow-y: auto; top: 2.5vh;">
        <h1>SERVIÇOS</h1>
        <div id="prog-list-forn"></div>
        <button onclick="fecharModalProg()" style="background: #334155; margin-top: 15px;">Voltar</button>
    </section>

    <script>
        const DB = { prog: 'l_prog_v7', veic: 'l_veic_v7', forn: 'l_forn_v7', colab: 'l_colab_v7', logs: 'l_logs_v7' };

        function handleLogin() {
            const u = document.getElementById('user').value.toUpperCase();
            const p = document.getElementById('pass').value;
            if (u === 'ADMIN' && p === '1234') { show('scr-admin'); carregarProgAdmin(); return; }
            if (u === 'CLIENTE') { show('scr-cliente'); return; }
            const forn = JSON.parse(localStorage.getItem(DB.forn) || '[]').find(f => f.user.toUpperCase() === u && f.pass === p);
            if (forn) { logar(forn, 'FORNECEDOR'); return; }
            alert("Acesso Negado.");
        }

        function logar(user, tipo) {
            window.sessao = { user, tipo };
            document.getElementById('display-nome').innerText = user.nome;
            show('scr-form');
            if (tipo === 'FORNECEDOR') {
                document.getElementById('btn-container-forn').classList.remove('hidden');
                document.getElementById('filtro-data-forn').value = new Date().toISOString().split('T')[0];
            }
        }

        function carregarProgFornecedor() {
            const dataBusca = document.getElementById('filtro-data-forn').value;
            const dados = JSON.parse(localStorage.getItem(DB.prog) || '[]').filter(x => x.data === dataBusca && x.destino === window.sessao.user.tipo);
            const lista = document.getElementById('prog-list-forn');
            lista.innerHTML = dados.map(i => `
            <div class="prog-item ${i.status.toLowerCase() === 'cancelado' ? 'status-cancelado' : 'status-' + i.status.toLowerCase()}">
                <b>${i.placa} (${i.hora})</b>
                <div class="obs-box">OBS: ${i.obs}</div>
                ${i.status !== 'CANCELADO' && i.status !== 'CONCLUIDO' ? `
                    <div class="photo-area">
                        <label class="file-label" for="f-${i.id}">📸 FOTO OBRIGATÓRIA</label>
                        <input type="file" id="f-${i.id}" onchange="document.getElementById('btn-${i.id}').classList.remove('hidden')">
                        <button id="btn-${i.id}" class="hidden" onclick="alterarStatus(${i.id}, '${i.status}')" style="background:var(--success)">CONFIRMAR</button>
                    </div>
                ` : `<div style="margin-top:10px; font-weight:bold;">${i.status}</div>`}
            </div>
        `).join('');
        }

        function alterarStatus(id, atual) {
            let d = JSON.parse(localStorage.getItem(DB.prog));
            const idx = d.findIndex(x => x.id === id);
            d[idx].status = atual === 'PENDENTE' ? 'EXECUCAO' : 'CONCLUIDO';
            localStorage.setItem(DB.prog, JSON.stringify(d));
            carregarProgFornecedor();
        }

        // FUNÇÕES DA CALCULADORA
        function addItem() {
            const div = document.createElement('div'); div.className = 'orc-row';
            div.innerHTML = `<input type="text" placeholder="Item" style="flex:2; margin:0;"><input type="number" class="v-item" placeholder="R$" style="flex:1; margin:0;" oninput="calcTotal()">`;
            document.getElementById('orc-itens').appendChild(div);
        }
        function calcTotal() {
            let t = 0; document.querySelectorAll('.v-item').forEach(i => t += Number(i.value) || 0);
            document.getElementById('total-orc').innerText = t.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        }

        function show(id) { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function abrirModalProg() { show('scr-modal-prog'); carregarProgFornecedor(); }
        function fecharModalProg() { show('scr-form'); }
        function switchTab(id, e) {
            document.querySelectorAll('[id^="area-"]').forEach(a => a.classList.add('hidden'));
            document.getElementById('area-' + id).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            e.target.classList.add('tab-active');
        }
    </script>
</body>

</html>
