<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOKAMIG | Gestão de Frotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d1122a;
            --bg: #0f172a;
            --text: #f8fafc;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('Faça_uma_montagem_202604121721.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 95%;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #fff;
        }

        .sub {
            font-size: 10px;
            color: #94a3b8;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 11px;
        }

        .hidden {
            display: none !important;
        }

        .form-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: left;
        }

        .prog-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 6px solid var(--warning);
            font-size: 11px;
            text-align: left;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tab-btn {
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            color: #fff;
            cursor: pointer;
            white-space: nowrap;
            flex: 1;
            font-size: 9px;
        }

        .tab-active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .orc-row {
            display: flex;
            gap: 5px;
            margin-bottom: 8px;
        }

        .total-box {
            background: var(--success);
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            margin: 10px 0;
            text-align: center;
        }

        .file-label {
            display: block;
            background: #334155;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 10px;
            margin-bottom: 5px;
            text-align: center;
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>

<body>

    <section id="scr-login" class="container">
        <h1>LOKAMIG</h1>
        <div class="sub">Logística & Programação</div>
        <input type="text" id="user" placeholder="Matrícula / Usuário / Crachá" onclick="ativarNFC('user')">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="handleLogin()">Entrar</button>
        <p id="nfc-status" style="font-size: 8px; margin-top: 10px; color: var(--gray);"></p>
    </section>

    <section id="scr-admin" class="container hidden" style="max-width: 800px;">
        <h1>ADMINISTRAÇÃO</h1>
        <div class="tabs">
            <button class="tab-btn tab-active" onclick="switchTab('prog-view-admin', event)">Programação</button>
            <button class="tab-btn" onclick="switchTab('colab', event)">Equipe</button>
            <button class="tab-btn" onclick="switchTab('forn', event)">Fornecedores</button>
            <button class="tab-btn" onclick="switchTab('veic', event)">Veículos</button>
        </div>

        <div id="area-prog-view-admin">
            <input type="date" id="filtro-data-admin" onchange="carregarProgAdmin()">
            <div id="list-prog-admin"></div>
        </div>

        <div id="area-colab" class="hidden">
            <div class="form-section">
                <input type="text" id="c-mat" placeholder="MATRÍCULA">
                <input type="text" id="c-nome" placeholder="NOME COMPLETO">
                <input type="text" id="c-nfc" placeholder="NFC ID (Clique para ler)" readonly
                    onclick="ativarNFC('c-nfc')">
                <button onclick="salvarColab()" style="background:var(--success)">Cadastrar Colaborador</button>
            </div>
            <div id="list-colab"></div>
        </div>

        <div id="area-forn" class="hidden">
            <div class="form-section">
                <input type="text" id="f-nome" placeholder="EMPRESA">
                <input type="text" id="f-user" placeholder="LOGIN">
                <input type="text" id="f-pass" placeholder="SENHA">
                <select id="f-tipo">
                    <option value="Limpeza">Limpeza</option>
                    <option value="Oficina">Oficina</option>
                </select>
                <button onclick="salvarForn()" style="background:var(--success)">Cadastrar Fornecedor</button>
            </div>
            <div id="list-forn"></div>
        </div>

        <div id="area-veic" class="hidden">
            <div class="form-section">
                <input type="text" id="v-reg-placa" placeholder="PLACA">
                <select id="v-reg-tipo">
                    <option value="Operacional">Operacional</option>
                    <option value="Reserva">Reserva</option>
                </select>
                <button onclick="salvarVeiculo()" style="background:var(--success)">Cadastrar Veículo</button>
            </div>
            <div id="list-veic"></div>
        </div>
        <button onclick="location.reload()" style="background:#334155; margin-top:10px;">Sair</button>
    </section>

    <section id="scr-cliente" class="container hidden">
        <h1>PROGRAMAÇÃO DIÁRIA</h1>
        <div class="sub">Área do Cliente</div>
        <div class="form-section">
            <input type="text" id="p-placa" placeholder="PLACA">
            <select id="p-destino">
                <option value="Limpeza">Limpeza</option>
                <option value="Oficina">Oficina</option>
            </select>
            <textarea id="p-obs" placeholder="Observações..."></textarea>
            <button onclick="lancarProgramacao()" style="background:var(--success)">Lançar Agenda</button>
        </div>
        <div id="lista-programacao-cliente"></div>
        <button onclick="location.reload()" style="background:#334155; margin-top:20px;">Sair</button>
    </section>

    <section id="scr-form" class="container hidden">
        <h1 id="display-nome">---</h1>
        <div id="btn-container-forn" class="hidden">
            <div class="form-section">
                <input type="date" id="filtro-data-forn" onchange="carregarProgFornecedor()">
                <button onclick="abrirModalProg()"
                    style="background: var(--warning); color: #000; margin-bottom: 10px;">📋 ACESSAR VEÍCULOS</button>
                <button onclick="show('scr-orcamento')" style="background: #fff; color: #000;">💰 GERAR
                    ORÇAMENTO</button>
            </div>
        </div>
        <div class="form-section">
            <input type="text" id="v-placa-check" placeholder="PLACA VISTORIA">
            <button onclick="alert('Vistoria salva com sucesso!')" style="background: var(--success)">Salvar
                Checklist</button>
        </div>
        <button onclick="location.reload()" style="background:#334155;">Sair</button>
    </section>

    <section id="scr-orcamento" class="container hidden"
        style="position: fixed; z-index: 101; height: 95vh; overflow-y: auto; top: 2.5vh;">
        <h1>NOVO ORÇAMENTO</h1>
        <div class="form-section">
            <input type="text" id="orc-cnpj" placeholder="CNPJ">
            <input type="text" id="orc-placa" placeholder="PLACA">
            <div id="orc-itens">
                <div class="orc-row"><input type="text" placeholder="Item" style="flex:2; margin:0;"><input
                        type="number" class="v-item" placeholder="R$" style="flex:1; margin:0;" oninput="calcTotal()">
                </div>
            </div>
            <button onclick="addItem()" style="background:var(--gray); padding:5px; margin-top:5px;">+ ITEM</button>
            <div class="total-box">TOTAL: R$ <span id="total-orc">0,00</span></div>
            <label class="file-label" for="foto-orc">📸 FOTO DA PEÇA</label>
            <input type="file" id="foto-orc">
            <button onclick="alert('Orçamento enviado!'); show('scr-form')"
                style="background:var(--success)">Enviar</button>
        </div>
        <button onclick="show('scr-form')" style="background:#334155;">Voltar</button>
    </section>

    <section id="scr-modal-prog" class="container hidden"
        style="position: fixed; z-index: 100; height: 95vh; overflow-y: auto; top: 2.5vh;">
        <h1>SERVIÇOS</h1>
        <div id="prog-list-forn"></div>
        <button onclick="fecharModalProg()" style="background: #334155; margin-top: 15px;">Voltar</button>
    </section>

    <script>
        const DB = { prog: 'l_prog_v7', veic: 'l_veic_v7', forn: 'l_forn_v7', colab: 'l_colab_v7' };

        // NFC
        async function ativarNFC(targetId) {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader(); await ndef.scan();
                    document.getElementById('nfc-status').innerText = "Aproxime o crachá...";
                    ndef.onreading = e => {
                        document.getElementById(targetId).value = e.serialNumber;
                        if (targetId === 'user') handleLogin();
                    };
                } catch (err) { alert("Erro NFC: " + err); }
            } else { alert("NFC não disponível."); }
        }

        // LOGIN
        function handleLogin() {
            const u = document.getElementById('user').value.toUpperCase();
            const p = document.getElementById('pass').value;
            if (u === 'ADMIN' && p === '1234') { show('scr-admin'); carregarProgAdmin(); renderList('colab'); return; }
            if (u === 'CLIENTE') { show('scr-cliente'); carregarProgCliente(); return; }
            const f = JSON.parse(localStorage.getItem(DB.forn) || '[]').find(x => x.user.toUpperCase() === u && x.pass === p);
            if (f) { logar(f, 'FORNECEDOR'); return; }
            alert("Acesso Negado.");
        }

        function logar(user, tipo) {
            window.sessao = { user, tipo };
            document.getElementById('display-nome').innerText = user.nome;
            show('scr-form');
            if (tipo === 'FORNECEDOR') {
                document.getElementById('btn-container-forn').classList.remove('hidden');
                document.getElementById('filtro-data-forn').value = new Date().toISOString().split('T')[0];
            }
        }

        // FUNÇÕES DE CADASTRO (O QUE ESTAVA FALTANDO)
        function salvarColab() {
            const d = { mat: document.getElementById('c-mat').value, nome: document.getElementById('c-nome').value, nfc: document.getElementById('c-nfc').value };
            if (!d.mat || !d.nome) return alert("Preencha tudo");
            let list = JSON.parse(localStorage.getItem(DB.colab) || '[]');
            list.push(d); localStorage.setItem(DB.colab, JSON.stringify(list));
            renderList('colab'); alert("Colaborador salvo!");
        }

        function salvarForn() {
            const d = { nome: document.getElementById('f-nome').value, user: document.getElementById('f-user').value, pass: document.getElementById('f-pass').value, tipo: document.getElementById('f-tipo').value };
            let list = JSON.parse(localStorage.getItem(DB.forn) || '[]');
            list.push(d); localStorage.setItem(DB.forn, JSON.stringify(list));
            renderList('forn'); alert("Fornecedor salvo!");
        }

        function salvarVeiculo() {
            const d = { placa: document.getElementById('v-reg-placa').value.toUpperCase(), tipo: document.getElementById('v-reg-tipo').value };
            let list = JSON.parse(localStorage.getItem(DB.veic) || '[]');
            list.push(d); localStorage.setItem(DB.veic, JSON.stringify(list));
            renderList('veic'); alert("Veículo salvo!");
        }

        function lancarProgramacao() {
            const placa = document.getElementById('p-placa').value.toUpperCase();
            if (!placa) return alert("Placa vazia!");
            const agora = new Date();
            let prog = JSON.parse(localStorage.getItem(DB.prog) || '[]');
            prog.push({
                id: Date.now(),
                data: agora.toISOString().split('T')[0],
                hora: agora.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                placa: placa,
                destino: document.getElementById('p-destino').value,
                obs: document.getElementById('p-obs').value,
                status: 'PENDENTE'
            });
            localStorage.setItem(DB.prog, JSON.stringify(prog));
            carregarProgCliente(); alert("Agenda lançada!");
        }

        // RENDERIZAÇÃO
        function renderList(key) {
            const list = JSON.parse(localStorage.getItem(DB[key]) || '[]');
            document.getElementById(`list-${key}`).innerHTML = list.map((item, idx) => `
            <div class="prog-item">
                ${item.nome || item.placa || item.user} 
                <button onclick="remover('${key}', ${idx})" style="width:30px; float:right; background:var(--danger); padding:2px;">X</button>
            </div>`).join('');
        }

        function remover(key, idx) {
            let list = JSON.parse(localStorage.getItem(DB[key]));
            list.splice(idx, 1); localStorage.setItem(DB[key], JSON.stringify(list));
            renderList(key);
        }

        function carregarProgAdmin() {
            const data = document.getElementById('filtro-data-admin').value;
            const list = JSON.parse(localStorage.getItem(DB.prog) || '[]').filter(x => !data || x.data === data);
            document.getElementById('list-prog-admin').innerHTML = list.map(i => `<div class="prog-item"><b>${i.placa}</b> - ${i.destino} (${i.status})</div>`).join('');
        }

        function carregarProgCliente() {
            const list = JSON.parse(localStorage.getItem(DB.prog) || '[]').reverse();
            document.getElementById('lista-programacao-cliente').innerHTML = list.slice(0, 5).map(i => `<div class="prog-item">${i.placa} -> ${i.destino}</div>`).join('');
        }

        function carregarProgFornecedor() {
            const data = document.getElementById('filtro-data-forn').value;
            const dados = JSON.parse(localStorage.getItem(DB.prog) || '[]').filter(x => x.data === data && x.destino === window.sessao.user.tipo);
            document.getElementById('prog-list-forn').innerHTML = dados.map(i => `
            <div class="prog-item status-${i.status.toLowerCase()}">
                <b>${i.placa} (${i.hora})</b><br>OBS: ${i.obs}
                ${i.status === 'PENDENTE' || i.status === 'EXECUCAO' ? `<br><input type="file" id="f-${i.id}" onchange="this.nextElementSibling.classList.remove('hidden')"><button class="hidden" onclick="alterarStatus(${i.id}, '${i.status}')" style="background:var(--success); margin-top:5px;">CONFIRMAR</button>` : ''}
            </div>`).join('');
        }

        function alterarStatus(id, at) {
            let d = JSON.parse(localStorage.getItem(DB.prog));
            const idx = d.findIndex(x => x.id === id);
            d[idx].status = at === 'PENDENTE' ? 'EXECUCAO' : 'CONCLUIDO';
            localStorage.setItem(DB.prog, JSON.stringify(d)); carregarProgFornecedor();
        }

        // UTILITÁRIOS
        function show(id) { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function switchTab(id, e) {
            document.querySelectorAll('[id^="area-"]').forEach(a => a.classList.add('hidden'));
            document.getElementById('area-' + id).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            e.target.classList.add('tab-active');
            if (id !== 'prog-view-admin') renderList(id.replace('area-', ''));
        }
        function addItem() { const d = document.createElement('div'); d.className = 'orc-row'; d.innerHTML = `<input type="text" placeholder="Item" style="flex:2; margin:0;"><input type="number" class="v-item" placeholder="R$" style="flex:1; margin:0;" oninput="calcTotal()">`; document.getElementById('orc-itens').appendChild(d); }
        function calcTotal() { let t = 0; document.querySelectorAll('.v-item').forEach(i => t += Number(i.value) || 0); document.getElementById('total-orc').innerText = t.toLocaleString('pt-BR', { minFractionDigits: 2 }); }
        function abrirModalProg() { show('scr-modal-prog'); carregarProgFornecedor(); }
        function fecharModalProg() { show('scr-form'); }
    </script>
</body>

</html>
