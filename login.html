<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOKAMIG | Gestão de Frotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d1122a;
            --bg: #0f172a;
            --text: #f8fafc;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)),
                url('Faça_uma_montagem_202604121721.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
            color: #fff;
        }

        .sub {
            font-size: 10px;
            color: #94a3b8;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 12px;
        }

        .hidden {
            display: none !important;
        }

        /* Admin Layout */
        .admin-box {
            max-width: 900px;
            width: 95%;
            height: 90vh;
            overflow-y: auto;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .tab-btn {
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            color: #fff;
            cursor: pointer;
            white-space: nowrap;
            font-size: 10px;
            font-weight: 700;
        }

        .tab-active {
            background: var(--primary);
            border-color: var(--primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }

        th {
            background: #0f172a;
            padding: 10px;
            text-align: left;
            color: var(--primary);
            position: sticky;
            top: 0;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #334155;
            cursor: pointer;
            text-align: left;
        }

        .form-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .form-label {
            font-size: 11px;
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
        }

        .search-box {
            position: relative;
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: #1e293b;
            border-radius: 0 0 10px 10px;
            z-index: 100;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid var(--primary);
            display: none;
        }

        .search-item {
            padding: 10px;
            border-bottom: 1px solid #334155;
            cursor: pointer;
        }

        .modal-detalhes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }

        .photo-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 5px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .photo-card img {
            width: 100%;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <section id="scr-login" class="container">
        <h1>LOKAMIG</h1>
        <div class="sub">Logística e Gestão de Pátio</div>
        <input type="text" id="user" placeholder="Matrícula ou Usuário">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="handleLogin()">Entrar</button>
        <div style="margin: 15px 0; font-size: 10px; color: #64748b;">OU</div>
        <button style="background:#1e293b; border:1px dashed var(--primary);" onclick="lerCrachaNFC('login')">📲 ACESSAR
            VIA CRACHÁ</button>
    </section>

    <section id="scr-admin" class="container admin-box hidden">
        <h1>PAINEL ADMIN</h1>
        <div class="tabs">
            <button class="tab-btn tab-active" onclick="switchTab('mon', event)">Monitoramento</button>
            <button class="tab-btn" onclick="switchTab('cad', event)">Colaboradores</button>
            <button class="tab-btn" onclick="switchTab('veic', event)">Veículos</button>
            <button class="tab-btn" onclick="switchTab('forn', event)">Fornecedores</button>
        </div>

        <div id="area-monitor">
            <table>
                <thead>
                    <tr>
                        <th>HORA</th>
                        <th>PLACA</th>
                        <th>SERVIÇO</th>
                        <th>MOTORISTA</th>
                    </tr>
                </thead>
                <tbody id="logs-body"></tbody>
            </table>
        </div>

        <div id="area-veiculos" class="hidden">
            <div class="form-section">
                <input type="text" id="v-reg-placa" placeholder="PLACA">
                <select id="v-reg-tipo">
                    <option value="Operacional">Operacional</option>
                    <option value="Gerencial">Gerencial</option>
                    <option value="Reserva">Reserva</option>
                </select>
                <button onclick="salvarVeiculo()" style="background:var(--success);">Cadastrar Carro</button>
            </div>
            <table id="tbl-veic">
                <tbody></tbody>
            </table>
        </div>

        <div id="area-forn" class="hidden">
            <div class="form-section">
                <input type="text" id="f-reg-nome" placeholder="NOME DA EMPRESA">
                <input type="text" id="f-reg-user" placeholder="USUÁRIO DE ACESSO">
                <input type="password" id="f-reg-pass" placeholder="SENHA">
                <select id="f-reg-tipo">
                    <option value="Limpeza">Limpeza / Estética</option>
                    <option value="Oficina">Oficina / Manutenção</option>
                </select>
                <button onclick="salvarForn()" style="background:var(--success);">Criar Acesso Fornecedor</button>
            </div>
            <table id="tbl-forn">
                <tbody></tbody>
            </table>
        </div>

        <div id="area-cadastro" class="hidden">
            <div class="form-section">
                <input type="text" id="reg-mat" placeholder="Matrícula">
                <input type="text" id="reg-nome" placeholder="Nome">
                <input type="text" id="reg-id" placeholder="ID NFC" readonly>
                <button onclick="lerCrachaNFC('vincular')" style="background:#3b82f6; margin-bottom:5px;">Ler
                    Crachá</button>
                <button onclick="salvarColab()" style="background:var(--success);">Salvar Colaborador</button>
            </div>
            <table id="tbl-colab">
                <tbody></tbody>
            </table>
        </div>

        <button onclick="location.reload()" style="background:#334155; margin-top:20px;">Sair</button>
    </section>

    <section id="scr-form" class="container hidden">
        <h1 id="display-nome">---</h1>
        <div class="sub" id="display-mat">Perfil: ---</div>

        <div class="form-section" id="box-tipo-servico">
            <span class="form-label">TIPO DE SERVIÇO</span>
            <select id="f-servico-tipo" onchange="ajustarFormulario()">
                <option value="Vistoria">Vistoria de Pátio (Comum)</option>
                <option value="Limpeza">Entrada/Saída de Limpeza</option>
                <option value="Manutenção">Manutenção / Oficina</option>
            </select>
        </div>

        <div class="form-section">
            <span class="form-label">VEÍCULO</span>
            <div class="search-box">
                <input type="text" id="v-search-placa" placeholder="BUSCAR PLACA..." onkeyup="filtrarVeiculos()"
                    autocomplete="off">
                <div id="search-results" class="search-results"></div>
            </div>
            <div id="box-reserva" class="hidden" style="margin-top:10px;">
                <input type="text" id="v-placa-sub" placeholder="PLACA DO CARRO SUBSTITUÍDO">
            </div>
        </div>

        <div id="sec-limpeza" class="form-section hidden">
            <span class="form-label">CHECKLIST DE LIMPEZA</span>
            <div style="font-size:12px; display:flex; flex-direction:column; gap:8px;">
                <label><input type="checkbox" id="l-aspirado"> Aspirado e Higienizado</label>
                <label><input type="checkbox" id="l-vidros"> Vidros sem Manchas</label>
                <label><input type="checkbox" id="l-cheiro"> Odorizador aplicado</label>
            </div>
        </div>

        <div id="sec-manutencao" class="form-section hidden">
            <span class="form-label">DADOS DA OFICINA</span>
            <input type="text" id="m-os" placeholder="Nº DA ORDEM DE SERVIÇO (O.S)">
            <textarea id="m-pecas" placeholder="PEÇAS SUBSTITUÍDAS..."></textarea>
        </div>

        <div class="form-section">
            <span class="form-label">DADOS GERAIS</span>
            <input type="number" id="v-km" placeholder="KM ATUAL">
            <select id="v-comb">
                <option value="Vazio">Tanque: Vazio</option>
                <option value="1/2">1/2</option>
                <option value="Cheio">Cheio</option>
            </select>
            <textarea id="v-obs" placeholder="Observações..."></textarea>
        </div>

        <button onclick="alert('Salvando Fotos...')">Finalizar e Salvar</button>
    </section>

    <script>
        const LOG_DB = 'lokamig_logs_v5';
        const USER_DB = 'lokamig_users_v5';
        const VEIC_DB = 'lokamig_veiculos_v1';
        const FORN_DB = 'lokamig_fornecedores_v1';

        let currentUser = null;

        function show(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function switchTab(t, e) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            e.target.classList.add('tab-active');
            document.getElementById('area-monitor').classList.toggle('hidden', t !== 'mon');
            document.getElementById('area-cadastro').classList.toggle('hidden', t !== 'cad');
            document.getElementById('area-veiculos').classList.toggle('hidden', t !== 'veic');
            document.getElementById('area-forn').classList.toggle('hidden', t !== 'forn');
            if (t === 'veic') carregarListaVeiculos();
            if (t === 'forn') carregarListaForn();
            if (t === 'cad') carregarListaColab();
        }

        function handleLogin() {
            const u = document.getElementById('user').value.toUpperCase();
            const p = document.getElementById('pass').value;

            // Admin
            if (u === 'ADMIN' && p === '1234') { show('scr-admin'); carregarAdmin(); return; }

            // Colaboradores
            const colab = JSON.parse(localStorage.getItem(USER_DB) || '[]').find(x => x.mat.toUpperCase() === u);
            if (colab) { logar(colab, 'colab'); return; }

            // Fornecedores
            const forn = JSON.parse(localStorage.getItem(FORN_DB) || '[]').find(x => x.user.toUpperCase() === u && x.pass === p);
            if (forn) { logar(forn, 'forn'); return; }

            alert("Acesso Negado. Verifique usuário e senha.");
        }

        function logar(user, tipo) {
            currentUser = user;
            document.getElementById('display-nome').innerText = user.nome;
            document.getElementById('display-mat').innerText = tipo === 'colab' ? "Matrícula: " + user.mat : "Fornecedor: " + user.tipo;

            show('scr-form');

            // Se for fornecedor, trava o tipo de serviço dele
            if (tipo === 'forn') {
                document.getElementById('box-tipo-servico').classList.add('hidden');
                document.getElementById('f-servico-tipo').value = user.tipo;
                ajustarFormulario();
            } else {
                document.getElementById('box-tipo-servico').classList.remove('hidden');
            }
        }

        function ajustarFormulario() {
            const tipo = document.getElementById('f-servico-tipo').value;
            document.getElementById('sec-limpeza').classList.toggle('hidden', tipo !== 'Limpeza');
            document.getElementById('sec-manutencao').classList.toggle('hidden', tipo !== 'Manutenção');
        }

        function filtrarVeiculos() {
            const input = document.getElementById('v-search-placa').value.toUpperCase();
            const resBox = document.getElementById('search-results');
            const veics = JSON.parse(localStorage.getItem(VEIC_DB) || '[]').filter(v => v.placa.includes(input));
            if (veics.length > 0 && input !== "") {
                resBox.style.display = 'block';
                resBox.innerHTML = veics.map(v => `<div class="search-item" onclick="selecionarVeic('${v.placa}', '${v.tipo}')">${v.placa}</div>`).join('');
            } else { resBox.style.display = 'none'; }
        }

        function selecionarVeic(p, t) {
            document.getElementById('v-search-placa').value = p;
            document.getElementById('search-results').style.display = 'none';
            document.getElementById('box-reserva').classList.toggle('hidden', t !== 'Reserva');
        }

        // Admin Fornecedores
        function salvarForn() {
            const n = document.getElementById('f-reg-nome').value.toUpperCase();
            const u = document.getElementById('f-reg-user').value.toUpperCase();
            const p = document.getElementById('f-reg-pass').value;
            const t = document.getElementById('f-reg-tipo').value;
            if (!u || !p) return alert("Preencha Usuário e Senha!");
            const f = JSON.parse(localStorage.getItem(FORN_DB) || '[]');
            f.push({ nome: n, user: u, pass: p, tipo: t });
            localStorage.setItem(FORN_DB, JSON.stringify(f));
            carregarListaForn();
        }

        function carregarListaForn() {
            const f = JSON.parse(localStorage.getItem(FORN_DB) || '[]');
            document.getElementById('tbl-forn').innerHTML = f.map((x, i) => `<tr><td>${x.nome}</td><td>${x.user}</td><td>${x.tipo}</td><td onclick="removerItem('${FORN_DB}', ${i}, carregarListaForn)">❌</td></tr>`).join('');
        }

        // Outras funções de Admin (Veículos e Colaboradores) seguem a mesma lógica unificada...
        function salvarVeiculo() {
            const p = document.getElementById('v-reg-placa').value.toUpperCase();
            const t = document.getElementById('v-reg-tipo').value;
            const v = JSON.parse(localStorage.getItem(VEIC_DB) || '[]');
            v.push({ placa: p, tipo: t });
            localStorage.setItem(VEIC_DB, JSON.stringify(v)); carregarListaVeiculos();
        }

        function carregarListaVeiculos() {
            const v = JSON.parse(localStorage.getItem(VEIC_DB) || '[]');
            document.getElementById('tbl-veic').innerHTML = v.map((x, i) => `<tr><td>${x.placa}</td><td>${x.tipo}</td><td onclick="removerItem('${VEIC_DB}', ${i}, carregarListaVeiculos)">❌</td></tr>`).join('');
        }

        function removerItem(db, i, callback) {
            const d = JSON.parse(localStorage.getItem(db)); d.splice(i, 1);
            localStorage.setItem(db, JSON.stringify(d)); callback();
        }

        async function lerCrachaNFC(modo) {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader(); await ndef.scan();
                    ndef.onreading = event => {
                        const id = event.serialNumber.replace(/:/g, "").toUpperCase();
                        if (modo === 'vincular') document.getElementById('reg-id').value = id;
                        else {
                            const user = JSON.parse(localStorage.getItem(USER_DB) || '[]').find(u => u.id === id);
                            if (user) logar(user, 'colab');
                        }
                    };
                } catch (e) { alert("NFC Erro."); }
            }
        }
    </script>
</body>

</html>
