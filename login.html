<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOKAMIG | Gestão de Frotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d1122a;
            --bg: #0f172a;
            --text: #f8fafc;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('Faça_uma_montagem_202604121721.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            width: 95%;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #fff;
        }

        .sub {
            font-size: 10px;
            color: #94a3b8;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.8);
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 11px;
        }

        .hidden {
            display: none !important;
        }

        .form-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: left;
        }

        .prog-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 6px solid var(--warning);
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-pendente {
            border-left-color: var(--warning);
        }

        .status-execucao {
            border-left-color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .status-concluido {
            border-left-color: var(--success);
            background: rgba(16, 185, 129, 0.1);
        }

        .status-cancelado {
            border-left-color: var(--gray);
            background: rgba(100, 116, 139, 0.2);
            opacity: 0.7;
        }

        .badge {
            font-size: 8px;
            padding: 3px 6px;
            border-radius: 4px;
            background: var(--primary);
            color: #fff;
            text-transform: uppercase;
            margin-right: 5px;
        }

        .obs-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 5px;
            margin-top: 5px;
            font-size: 10px;
            color: #cbd5e1;
            border-left: 2px solid var(--primary);
        }

        .photo-area {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            border: 1px dashed #64748b;
            text-align: center;
        }

        .time-label {
            font-size: 9px;
            color: #94a3b8;
            font-weight: bold;
        }

        input[type="file"] {
            display: none;
        }

        .file-label {
            display: block;
            background: #334155;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 10px;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

    <section id="scr-login" class="container">
        <h1>LOKAMIG</h1>
        <div class="sub">Logística & Programação</div>
        <input type="text" id="user" placeholder="Matrícula / Usuário / Clique para Crachá">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="handleLogin()">Entrar</button>
    </section>

    <section id="scr-form" class="container hidden">
        <h1 id="display-nome">---</h1>
        <div id="btn-container-forn" class="hidden">
            <div class="form-section">
                <div class="sub" style="margin-bottom: 5px;">Consultar Programação:</div>
                <input type="date" id="filtro-data-forn" onchange="carregarProgFornecedor()">
                <button onclick="abrirModalProg()" style="background: var(--warning); color: #000;">📋 ACESSAR
                    VEÍCULOS</button>
            </div>
        </div>
        <button onclick="location.reload()" style="background:#334155; margin-top: 10px;">Sair</button>
    </section>

    <section id="scr-modal-prog" class="container hidden"
        style="position: fixed; z-index: 100; height: 95vh; overflow-y: auto; top: 2.5vh;">
        <h1>SERVIÇOS DESIGNADOS</h1>
        <div id="data-selecionada-label" class="sub">DATA: --/--/----</div>
        <div id="prog-list-forn"></div>
        <button onclick="fecharModalProg()" style="background: #334155; margin-top: 15px;">Voltar</button>
    </section>

    <script>
        const DB = { prog: 'l_prog_v7', veic: 'l_veic_v7', forn: 'l_forn_v7', colab: 'l_colab_v7' };

        function handleLogin() {
            const u = document.getElementById('user').value.toUpperCase();
            const p = document.getElementById('pass').value;
            if (u === 'ADMIN') { show('scr-admin'); return; }
            const forn = JSON.parse(localStorage.getItem(DB.forn) || '[]').find(f => f.user.toUpperCase() === u && f.pass === p);
            if (forn) { logar(forn, 'FORNECEDOR'); return; }
            alert("Acesso Negado.");
        }

        function logar(user, tipo) {
            window.sessao = { user, tipo };
            document.getElementById('display-nome').innerText = user.nome;
            show('scr-form');
            if (tipo === 'FORNECEDOR') {
                document.getElementById('btn-container-forn').classList.remove('hidden');
                document.getElementById('filtro-data-forn').value = new Date().toISOString().split('T')[0];
            }
        }

        function abrirModalProg() { show('scr-modal-prog'); carregarProgFornecedor(); }
        function fecharModalProg() { show('scr-form'); }

        function carregarProgFornecedor() {
            const dataBusca = document.getElementById('filtro-data-forn').value;
            const dados = JSON.parse(localStorage.getItem(DB.prog) || '[]').filter(x => x.data === dataBusca && x.destino === window.sessao.user.tipo);
            const lista = document.getElementById('prog-list-forn');

            lista.innerHTML = dados.length === 0 ? "<div class='sub'>Nenhum veículo para hoje.</div>" : dados.map(i => {
                const isCancelado = i.status === 'CANCELADO';
                const corClass = isCancelado ? 'status-cancelado' : (i.status === 'PENDENTE' ? 'status-pendente' : (i.status === 'EXECUCAO' ? 'status-execucao' : 'status-concluido'));

                return `
                <div class="prog-item ${corClass}" style="flex-direction: column; align-items: flex-start;">
                    <div style="width: 100%; display: flex; justify-content: space-between;">
                        <b>${i.placa}</b>
                        <span class="time-label">${i.hora || '--:--'}</span>
                    </div>
                    <div class="obs-box" style="width: 100%;">OBS: ${i.obs || 'Sem observações'}</div>

                    ${!isCancelado && i.status !== 'CONCLUIDO' ? `
                        <div class="photo-area" style="width: 100%;">
                            <div class="sub" style="color:#fff; margin-bottom:8px;">
                                ${i.status === 'PENDENTE' ? '📸 FOTOS OBRIGATÓRIAS: INÍCIO' : '📸 FOTOS OBRIGATÓRIAS: CONCLUSÃO'}
                            </div>
                            
                            <label class="file-label" for="photo-${i.id}">
                                <span id="label-text-${i.id}">Selecionar/Tirar Foto</span>
                            </label>
                            <input type="file" id="photo-${i.id}" accept="image/*" onchange="validarFoto(${i.id})">
                            
                            <button id="btn-action-${i.id}" class="hidden" onclick="prosseguirStatus(${i.id}, '${i.status}')" 
                                style="background: var(--success); margin-top: 10px; padding: 8px;">
                                ${i.status === 'PENDENTE' ? 'CONFIRMAR INÍCIO' : 'CONCLUIR SERVIÇO'}
                            </button>
                        </div>
                    ` : ''}

                    ${i.status === 'CONCLUIDO' ? '<div style="margin-top:10px; color:var(--success); font-weight:bold; font-size:9px;">✓ SERVIÇO FINALIZADO COM FOTOS</div>' : ''}
                    ${isCancelado ? '<div style="margin-top:10px; color:var(--danger); font-size:9px;">⚠️ CANCELADO PELO CLIENTE</div>' : ''}
                </div>
            `;
            }).join('');
        }

        function validarFoto(id) {
            const input = document.getElementById(`photo-${id}`);
            const btn = document.getElementById(`btn-action-${id}`);
            const labelText = document.getElementById(`label-text-${id}`);

            if (input.files && input.files[0]) {
                labelText.innerText = "✅ Foto Carregada: " + input.files[0].name;
                btn.classList.remove('hidden');
            }
        }

        function prosseguirStatus(id, statusAtual) {
            let d = JSON.parse(localStorage.getItem(DB.prog));
            const idx = d.findIndex(x => x.id === id);
            if (idx !== -1) {
                if (statusAtual === 'PENDENTE') d[idx].status = 'EXECUCAO';
                else if (statusAtual === 'EXECUCAO') d[idx].status = 'CONCLUIDO';

                localStorage.setItem(DB.prog, JSON.stringify(d));
                alert("Status atualizado com sucesso!");
                carregarProgFornecedor();
            }
        }

        function show(id) { document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
    </script>
</body>

</html>
