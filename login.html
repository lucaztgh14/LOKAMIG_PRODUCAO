<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOKAMIG | Gestão de Frotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d1122a;
            --bg: #1e293b;
            --text: #f8fafc;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gray: #334155;
            --dark-card: #0f172a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #334155;
            font-family: 'Montserrat', sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            width: 95%;
            max-width: 500px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #fff;
            letter-spacing: 2px;
        }

        .sub-label {
            font-size: 10px;
            color: #94a3b8;
            text-align: left;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        /* Inputs conforme os prints */
        input,
        select,
        textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: none;
            background: #0f172a;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        /* Botões conforme os prints */
        .btn-orange {
            background: var(--warning);
            color: #000;
            font-weight: bold;
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .btn-green {
            background: var(--success);
            color: #fff;
            font-weight: bold;
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .btn-gray {
            background: #334155;
            color: #fff;
            font-weight: bold;
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-white {
            background: #fff;
            color: #000;
            font-weight: bold;
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .hidden {
            display: none !important;
        }

        /* Itens da Programação */
        .prog-item {
            background: #0f172a;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            border-left: 5px solid var(--success);
            text-align: left;
            position: relative;
        }

        .prog-item.cancelado {
            border-left-color: var(--danger);
        }

        .tag-ni {
            position: absolute;
            right: 15px;
            top: 15px;
            background: #000;
            font-size: 8px;
            padding: 2px 5px;
            border-radius: 3px;
        }

        .obs-box {
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 12px;
            color: #94a3b8;
            border: 1px solid #d1122a;
        }

        /* Estilo Calculadora de Orçamento */
        .orc-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .total-display {
            background: var(--success);
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            margin: 15px 0;
        }

        input[type="file"] {
            display: none;
        }

        .file-btn {
            display: block;
            background: #475569;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 11px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

    <section id="scr-login" class="container">
        <h1 id="brand-name">agsn</h1>
        <input type="text" id="user" placeholder="USUÁRIO">
        <input type="password" id="pass" placeholder="SENHA">
        <button class="btn-green" onclick="handleLogin()">Entrar</button>
    </section>

    <section id="scr-forn-home" class="container hidden">
        <h1 id="display-forn-nome">agsn</h1>
        <div style="background: #0f172a; padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: left;">
            <div class="sub-label">Consultar Programação:</div>
            <input type="date" id="filtro-data" value="2026-04-14">

            <button class="btn-orange" onclick="abrirProgramacao()">
                📋 ACESSAR VEÍCULOS
            </button>

            <button class="btn-white" onclick="abrirOrcamento()">
                💰 GERAR ORÇAMENTO
            </button>
        </div>
        <button class="btn-gray" onclick="location.reload()">Sair</button>
    </section>

    <section id="scr-prog-lista" class="container hidden" style="position:fixed; height: 90vh; overflow-y:auto;">
        <h1>SERVIÇOS DESIGNADOS</h1>
        <div class="sub-label" style="text-align:center; margin-bottom: 20px;">STATUS EM TEMPO REAL</div>

        <div id="lista-veiculos">
            <div class="prog-item">
                <span class="tag-ni">N/I</span>
                <div style="font-weight:bold; margin-bottom:5px;">TDA1E14</div>
                <div class="obs-box">OBS: Sem observações</div>
                <div style="color:var(--success); font-size:10px; margin-top:10px; font-weight:bold;">✓ SERVIÇO
                    FINALIZADO</div>
            </div>
        </div>

        <button class="btn-gray" onclick="voltarParaHome()">VOLTAR</button>
    </section>

    <section id="scr-orcamento" class="container hidden" style="position:fixed; height: 90vh; overflow-y:auto;">
        <h1>NOVO ORÇAMENTO</h1>
        <div style="text-align:left;">
            <input type="text" placeholder="CNPJ DO FORNECEDOR">
            <input type="text" placeholder="ENDEREÇO">
            <input type="text" id="orc-placa" placeholder="PLACA DO CARRO">

            <div class="sub-label">Calculadora de Peças:</div>
            <div id="orc-linhas">
                <div class="orc-row">
                    <input type="text" placeholder="Peça/Serviço" style="flex:2; margin-bottom:0;">
                    <input type="number" class="orc-valor" placeholder="R$" style="flex:1; margin-bottom:0;"
                        oninput="somarTudo()">
                </div>
            </div>
            <button class="btn-gray" style="font-size:10px; padding:8px; margin-bottom:15px;" onclick="novaLinhaOrc()">+
                Adicionar Item</button>

            <div class="total-display">TOTAL: R$ <span id="total-final">0,00</span></div>

            <label class="file-btn" for="foto-peca">📸 FOTO DA PEÇA / ORÇAMENTO</label>
            <input type="file" id="foto-peca">

            <button class="btn-green" onclick="alert('Orçamento enviado!')">ENVIAR AGORA</button>
            <button class="btn-gray" onclick="voltarParaHome()">CANCELAR</button>
        </div>
    </section>

    <script>
        // Lógica Simples para teste
        function handleLogin() {
            document.getElementById('scr-login').classList.add('hidden');
            document.getElementById('scr-forn-home').classList.remove('hidden');
        }

        function abrirProgramacao() {
            document.getElementById('scr-forn-home').classList.add('hidden');
            document.getElementById('scr-prog-lista').classList.remove('hidden');
        }

        function abrirOrcamento() {
            document.getElementById('scr-forn-home').classList.add('hidden');
            document.getElementById('scr-orcamento').classList.remove('hidden');
        }

        function voltarParaHome() {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('scr-forn-home').classList.remove('hidden');
        }

        function novaLinhaOrc() {
            const container = document.getElementById('orc-linhas');
            const div = document.createElement('div');
            div.className = 'orc-row';
            div.innerHTML = `<input type="text" placeholder="Item" style="flex:2; margin-bottom:0;">
                         <input type="number" class="orc-valor" placeholder="R$" style="flex:1; margin-bottom:0;" oninput="somarTudo()">`;
            container.appendChild(div);
        }

        function somarTudo() {
            let total = 0;
            document.querySelectorAll('.orc-valor').forEach(input => {
                total += Number(input.value) || 0;
            });
            document.getElementById('total-final').innerText = total.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        }
    </script>
</body>

</html>
