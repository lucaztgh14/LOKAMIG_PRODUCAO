<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOKAMIG | Sistema Integrado</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d1122a;
            --card-bg: rgba(15, 23, 42, 0.7);
            --text: #e9f0f7;
            --muted: #a2b3c9;
        }

        * {
            box-sizing: border-box;
        }

        body {
            /* Usando a imagem que você gerou como fundo */
            background-image: url('Faça_uma_montagem_202604121721.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 35px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            margin: 0;
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        p {
            font-size: 14px;
            margin-bottom: 30px;
            color: var(--muted);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 4px rgba(209, 18, 42, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            background: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:active {
            transform: scale(0.96);
        }

        .hidden {
            display: none;
        }

        .badge {
            background: rgba(209, 18, 42, 0.1);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 12px;
            color: var(--primary);
            border: 1px solid var(--primary);
            font-weight: bold;
        }

        video {
            width: 100%;
            border-radius: 15px;
            background: #000;
            margin-top: 20px;
            border: 2px solid var(--primary);
        }

        .status {
            font-size: 13px;
            color: var(--muted);
            text-align: center;
            margin-top: 20px;
            display: block;
        }
    </style>
</head>

<body>

    <div id="app" style="width: 100%; display: flex; justify-content: center;">
        <section id="screen-login" class="panel">
            <h1>LOKAMIG</h1>
            <p>Acesso Nível Deus</p>
            <div class="input-group">
                <label>Usuário</label>
                <input type="text" id="input-login" placeholder="Digite seu usuário">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="input-password" placeholder="••••••••">
            </div>
            <button id="btn-login">ENTRAR NO SISTEMA</button>
            <span class="status" id="status-public">Aguardando credenciais...</span>
        </section>

        <section id="screen-master" class="panel hidden">
            <h2>Painel Master</h2>
            <div class="input-group">
                <label>Nova Senha Master</label>
                <input type="password" id="admin-password" placeholder="Nova senha">
                <button onclick="mudarSenha()"
                    style="background:#1e293b; font-size: 12px; padding: 10px; margin-top: 10px;">ATUALIZAR
                    SENHA</button>
            </div>
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 25px 0;">
            <button id="btn-nfc-master" style="background:#0f172a; border: 1px solid var(--primary);">💳 CADASTRAR
                CRACHÁ (NFC)</button>
            <div style="margin: 15px 0;">
                <span class="badge" id="badge-count">Crachás: 0</span>
            </div>
            <button onclick="irParaVistoria()" style="background:#059669;">IR PARA VISTORIA</button>
            <button onclick="location.reload()"
                style="background:transparent; color:#94a3b8; font-size: 12px;">Desconectar</button>
        </section>

        <section id="screen-activate" class="panel hidden">
            <h2>Ativação</h2>
            <div id="nfc-area">
                <p>Aproxime o crachá no celular para liberar a câmera.</p>
                <button id="btn-scan-nfc">ESCANEAR CRACHÁ</button>
            </div>
            <div id="camera-section" class="hidden">
                <video id="video" autoplay playsinline></video>
                <span class="status" id="status-ai">IA: Analisando frames em tempo real...</span>
                <button onclick="location.reload()" style="background:#1e293b;">FINALIZAR</button>
            </div>
        </section>
    </div>

    <script>
        const ADMIN_KEY = 'lokamig_pw_master';
        const NFC_KEY = 'lokamig_nfc_db';

        if (!localStorage.getItem(ADMIN_KEY)) localStorage.setItem(ADMIN_KEY, '1234');

        function show(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        document.getElementById('btn-login').addEventListener('click', () => {
            const u = document.getElementById('input-login').value.toLowerCase().trim();
            const p = document.getElementById('input-password').value;
            const masterP = localStorage.getItem(ADMIN_KEY);

            if (u === 'admin' && p === masterP) {
                show('screen-master');
                atualizarContador();
            } else if (u !== '') {
                show('screen-activate');
            } else {
                alert("Por favor, preencha os campos.");
            }
        });

        function mudarSenha() {
            const nova = document.getElementById('admin-password').value;
            if (nova.length >= 4) {
                localStorage.setItem(ADMIN_KEY, nova);
                alert("Senha Master atualizada!");
            }
        }

        function atualizarContador() {
            const arr = JSON.parse(localStorage.getItem(NFC_KEY) || '[]');
            document.getElementById('badge-count').textContent = 'Crachás Cadastrados: ' + arr.length;
        }

        function irParaVistoria() { show('screen-activate'); }

        document.getElementById('btn-nfc-master').addEventListener('click', async () => {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    alert("NFC Ativo! Aproxime o crachá do Admin.");
                    ndef.onreading = (event) => {
                        const arr = JSON.parse(localStorage.getItem(NFC_KEY) || '[]');
                        if (!arr.includes(event.serialNumber)) {
                            arr.push(event.serialNumber);
                            localStorage.setItem(NFC_KEY, JSON.stringify(arr));
                            atualizarContador();
                            alert("Crachá vinculado com sucesso!");
                        }
                    };
                } catch (e) { alert("Erro NFC: " + e); }
            } else { alert("NFC não suportado neste dispositivo."); }
        });

        document.getElementById('btn-scan-nfc').addEventListener('click', async () => {
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    alert("Aguardando crachá para liberar câmera...");
                    ndef.onreading = () => iniciarCamera();
                } catch (e) { alert("Erro: " + e); }
            } else {
                if (confirm("Simular leitura de crachá para teste?")) iniciarCamera();
            }
        });

        async function iniciarCamera() {
            document.getElementById('nfc-area').classList.add('hidden');
            document.getElementById('camera-section').classList.remove('hidden');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                document.getElementById('video').srcObject = stream;
            } catch (err) {
                alert("Erro ao abrir câmera: " + err);
            }
        }
    </script>
</body>

</html>
