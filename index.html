<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vistoria LOKAMIG | Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        .app-layout {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px;
        }

        .header-swap {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .stepper-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
        }

        .stepper-header::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            height: 2px;
            background: #e2e8f0;
            z-index: 1;
        }

        .step-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid #cbd5e1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 13px;
            color: #cbd5e1;
            z-index: 2;
            position: relative;
            transition: all 0.3s;
        }

        .step-circle.active {
            border-color: var(--primary-color);
            color: white;
            background: var(--primary-color);
        }

        .step-circle.done {
            border-color: #10b981;
            color: white;
            background: #10b981;
        }

        .camera-viewport {
            width: 100%;
            height: 50vh;
            background: #000;
            border-radius: 16px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .camera-overlay {
            position: absolute;
            border: 2px dashed rgba(255, 255, 255, 0.5);
            width: 80%;
            height: 60%;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>

<body style="background:var(--bg-dark);">

    <div class="app-layout">
        <div class="header-swap">
            <div style="display:flex; align-items:center;">
                <img src="https://img.icons8.com/color/64/000000/car-rental.png"
                    style="height:32px; margin-right:10px;" />
                <div>
                    <h1 style="margin:0; font-size:18px; color:var(--primary-color);">LOKAMIG</h1>
                    <p style="margin:0; font-size:12px; color:var(--text-muted);" id="user-badge">Carregando...</p>
                </div>
            </div>
            <div style="display:flex; gap:10px;">
                <button onclick="window.location.href='admin.html'" class="btn-alt" id="admin-btn"
                    style="display:none;">⚙️ ADM</button>
                <button onclick="logout()" class="btn-secondary" style="padding:8px 12px; font-size:12px;">Sair</button>
            </div>
        </div>

        <div class="glass-panel" style="flex:1; display:flex; flex-direction:column; padding: 25px;">
            <div class="stepper-header">
                <div class="step-circle active" id="st-1">1</div>
                <div class="step-circle" id="st-2">2</div>
                <div class="step-circle" id="st-3">3</div>
                <div class="step-circle" id="st-4">4</div>
                <div class="step-circle" id="st-5">5</div>
                <div class="step-circle" id="st-6">6</div>
            </div>

            <h2 id="step-title" style="margin:0; text-align:center;">Foto Frontal / Placa</h2>
            <p id="step-desc" style="font-size:13px; color:var(--text-muted); text-align:center;">Toque no quadro abaixo
                para iniciar.</p>

            <div class="camera-viewport" id="cam-view" onclick="startCamera()">
                <span id="cam-text" style="font-size:40px;">📸</span>
            </div>

            <div id="ocr-results"
                style="display:none; background:#fff; padding:15px; border-radius:8px; border-left: 4px solid var(--primary-color);">
                <input type="text" id="final-plate" class="premium-input" placeholder="Placa">
                <input type="number" id="final-km" class="premium-input" placeholder="KM">
                <button class="btn-primary" onclick="submitFinalVistoria()"
                    style="width:100%; margin-top:10px;">Transmitir Laudo</button>
            </div>

            <button id="btn-fallback" class="btn-secondary" style="width:100%; margin-top:10px;"
                onclick="triggerManualFallback()">Usar Galeria</button>
            <input type="file" id="fake-gallery" accept="image/*" style="display:none;" onchange="galleryUploaded()">
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if (!localStorage.getItem('session_username')) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('user-badge').innerText = localStorage.getItem('session_username');
            if (localStorage.getItem('user_role') === 'ADMIN') {
                document.getElementById('admin-btn').style.display = 'block';
            }
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>

</html>
